<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bliss Farm</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/effects.css">
<link rel="stylesheet" href="css/farm.css">
<link rel="stylesheet" href="css/ui.css">
</head>
<body>

<div id="clouds">
  <div class="cloud cl1"></div><div class="cloud cl2"></div><div class="cloud cl3"></div>
  <div class="cloud cl4"></div><div class="cloud cl5"></div>
</div>

<div id="topbar">
  <div id="coins"><span class="coin"></span> <span id="coin-count">10</span></div>
</div>
<div id="stage-display"></div><span id="tod-icon" style="position:fixed;top:38px;left:50%;transform:translateX(-50%);font-size:16px;pointer-events:none;z-index:10"></span>

<div id="topbar-right">
  <button id="menu-btn" class="topbar-btn" title="Menu">🌾</button>
  <button id="ach-btn" class="topbar-btn" title="Achievements">🏆</button>
  <button id="mute-btn" class="topbar-btn" title="Toggle sound">🔊</button>
  <button id="settings-btn" class="topbar-btn" title="Settings">⚙️</button>
</div>
<div id="ach-backdrop"></div>
<div id="ach-modal">
  <div id="ach-modal-header">
    <span>🏆 Achievements</span>
    <button id="ach-close-btn">✕</button>
  </div>
  <div id="ach-modal-body">
    <div id="achievements-list"></div>
  </div>
</div>
<div id="settings-backdrop"></div>
<div id="settings-panel">
  <h2>Settings</h2>
  <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer;font-size:13px;font-weight:600">
    <input type="checkbox" id="hide-bought-toggle" style="width:15px;height:15px;cursor:pointer">
    Hide purchased upgrades
  </label>
  <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer;font-size:13px;font-weight:600">
    <input type="checkbox" id="debug-mode-toggle" style="width:15px;height:15px;cursor:pointer">
    Debug Mode
  </label>
  <button id="reset-btn">Reset Data</button>
</div>

<div id="panel-backdrop"></div>
<div id="panel">
  <div id="panel-resize-handle"></div>
  <button id="panel-close-btn">✕</button>
  <div id="panel-content">
    <div class="panel-label">Seeds</div>
    <div id="seeds-list"></div>
    <div class="panel-divider"></div>
    <div class="panel-label">Seed Bags 🎒</div>
    <div id="bags-list"></div>
    <div class="panel-divider"></div>
    <div class="panel-label">Items</div>
    <div id="items-list"></div>
    <div class="panel-divider"></div>
    <div class="panel-label">Upgrades</div>
    <div id="upgrades-list"></div>
    <div class="panel-divider"></div>
    <div class="panel-label">Crafting</div>
    <div id="crafting-list"></div>
    <div class="panel-divider"></div>
    <div class="panel-label">Inventory</div>
    <div id="inv-grid"></div>
  </div>
</div>

<div id="game-area">
  <div id="grass"><div id="farm-grid"></div></div>
</div>

<div id="sell-box">
  <div id="sell-queue-row"></div>
  <div id="sell-center">SELL</div>
  <span id="sell-cd"></span>
</div>

<div id="crank-box">
  <div id="crank-label">⚙️ 1.00x</div>
  <svg id="crank-svg" viewBox="0 0 90 60" width="90" height="60" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="gearGrad" cx="38%" cy="33%" r="60%"><stop offset="0%" stop-color="#c8885a"/><stop offset="100%" stop-color="#6B4432"/></radialGradient>
      <radialGradient id="knobGrad" cx="35%" cy="30%" r="65%"><stop offset="0%" stop-color="#b07848"/><stop offset="100%" stop-color="#7B4E2A"/></radialGradient>
    </defs>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(0   30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(45  30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(90  30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(135 30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(180 30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(225 30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(270 30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(315 30 30)"/>
    <circle cx="30" cy="30" r="20" fill="url(#gearGrad)" stroke="#3d2010" stroke-width="2"/>
    <line x1="30" y1="13" x2="30" y2="47" stroke="rgba(0,0,0,.22)" stroke-width="2.5"/>
    <line x1="13" y1="30" x2="47" y2="30" stroke="rgba(0,0,0,.22)" stroke-width="2.5"/>
    <line x1="18" y1="18" x2="42" y2="42" stroke="rgba(0,0,0,.16)" stroke-width="2"/>
    <line x1="42" y1="18" x2="18" y2="42" stroke="rgba(0,0,0,.16)" stroke-width="2"/>
    <circle cx="30" cy="30" r="7" fill="#3d2010" stroke="#5a3d20" stroke-width="1.5"/>
    <circle cx="30" cy="30" r="3" fill="#6B4432"/>
    <rect x="50" y="26" width="22" height="8" rx="4" fill="#8B5E3C" stroke="#3d2010" stroke-width="2"/>
    <circle cx="74" cy="30" r="9" fill="url(#knobGrad)" stroke="#3d2010" stroke-width="2"/>
    <circle cx="71" cy="27" r="3" fill="rgba(255,255,255,.22)"/>
  </svg>
</div>

<div id="well">
  <svg viewBox="0 0 54 58" width="54" height="58" xmlns="http://www.w3.org/2000/svg" style="cursor:pointer">
    <ellipse cx="27" cy="49" rx="22" ry="6" fill="#6a6a6a"/>
    <rect x="5" y="30" width="44" height="19" fill="#888"/>
    <ellipse cx="27" cy="30" rx="22" ry="6" fill="#b8b8b8"/>
    <ellipse id="well-water" cx="27" cy="30" rx="15" ry="4" fill="#3A8FD4" opacity=".9"/>
    <rect x="9"  y="11" width="5" height="23" rx="2" fill="#8B6343" stroke="#5a3d20" stroke-width="1"/>
    <rect x="40" y="11" width="5" height="23" rx="2" fill="#8B6343" stroke="#5a3d20" stroke-width="1"/>
    <rect x="5"  y="8"  width="44" height="5" rx="2" fill="#6B4432"/>
    <polygon points="27,0 3,10 51,10" fill="#8B5E3C"/>
    <polygon points="27,1 4,10 50,10" fill="#7a5030" opacity=".4"/>
  </svg>
  <div id="well-label">💧 Full</div>
</div>

<div id="log-panel"><div id="log-inner"></div></div>
<div id="mode-ind"></div>
<div id="tile-menu"></div>
<div id="ghost"></div>

<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/save.js"></script>
<script src="js/upgrades.js"></script>
<script src="js/crafting.js"></script>
<script src="js/engine.js"></script>
<script src="js/achievements.js"></script>
<script src="js/render/log.js"></script>
<script src="js/events/sellTick.js"></script>
<script src="js/events/crowHawk.js"></script>
<script src="js/events/mole.js"></script>
<script src="js/events/blight.js"></script>
<script src="js/events/fungal.js"></script>
<script src="js/events/weeds.js"></script>
<script src="js/events/index.js"></script>
<script src="js/drag.js"></script>
<script src="js/audio.js"></script>
<script src="js/particles.js"></script>
<script src="js/render/hud.js"></script>
<script src="js/render/farm.js"></script>
<script src="js/render/panel.js"></script>
<script src="js/render/sellbox.js"></script>
<script src="js/render/environment.js"></script>
<script src="js/debug.js"></script>
<script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bliss Farm</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #87CEEB;
  min-height: 100vh;
  width: 100vw;
  overflow: hidden;
  font-family: system-ui, sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

/* Coins */
#coins {
  position: fixed;
  top: 12px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(0,0,0,0.18);
  border-radius: 20px;
  padding: 5px 12px 5px 8px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  z-index: 100;
}
#coins .ci { font-size: 17px; }

/* Farm wrapper — centered */
#farm-wrapper {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* 3x3 grid */
#farm-grid {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  grid-template-rows: repeat(3, 100px);
  gap: 6px;
}

.tile {
  width: 100px;
  height: 100px;
  background: #8B5E3C;
  border-radius: 7px;
  position: relative;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}

.tile.drop-target {
  background: #a57048;
  outline: 2px dashed rgba(255,255,255,0.45);
  outline-offset: -2px;
}

.tile.selected {
  outline: 2px solid rgba(255,255,255,0.6);
  outline-offset: -2px;
}

.tile .crop-icon {
  font-size: 36px;
  line-height: 1;
  pointer-events: none;
}

.tile .timer {
  font-size: 11px;
  color: rgba(255,255,255,0.9);
  font-weight: 700;
  margin-top: 3px;
  pointer-events: none;
}

.tile.ready-tile {
  animation: glow 1.1s ease-in-out infinite;
}

@keyframes glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.55); }
  50%       { box-shadow: 0 0 0 9px rgba(255, 215, 0, 0); }
}

.tile .x-btn {
  position: absolute;
  top: 5px;
  right: 5px;
  width: 20px;
  height: 20px;
  background: rgba(180, 40, 40, 0.85);
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 11px;
  line-height: 20px;
  text-align: center;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
  pointer-events: all;
}

/* Ground strip */
#ground {
  min-width: 318px;
  min-height: 64px;
  background: #7a5230;
  border-radius: 7px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
}

.h-crop {
  font-size: 28px;
  cursor: grab;
  padding: 5px;
  border-radius: 5px;
  background: rgba(255,255,255,0.1);
  line-height: 1;
  transition: background 0.1s;
}
.h-crop:active { cursor: grabbing; }

/* Sell box */
#sell-box {
  position: fixed;
  bottom: 28px;
  left: 28px;
  background: #8B5E3C;
  border-radius: 9px;
  padding: 10px 18px;
  color: rgba(255,255,255,0.9);
  font-size: 13px;
  font-weight: 700;
  z-index: 50;
  text-align: center;
  cursor: default;
  letter-spacing: 0.5px;
}
#sell-box.drag-over {
  background: #a06838;
  outline: 2px dashed rgba(255,255,255,0.5);
  outline-offset: -2px;
}

/* Market panel */
#market-panel {
  position: fixed;
  right: -210px;
  top: 0;
  width: 210px;
  height: 100%;
  background: #8B5E3C;
  z-index: 150;
  transition: right 0.28s ease;
  display: flex;
  flex-direction: column;
  padding: 50px 14px 20px;
  gap: 10px;
  overflow-y: auto;
}
#market-panel.open { right: 0; }

#market-tab {
  position: absolute;
  left: -34px;
  top: 50%;
  transform: translateY(-50%);
  background: #8B5E3C;
  color: rgba(255,255,255,0.9);
  border-radius: 7px 0 0 7px;
  padding: 14px 8px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 700;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.seed-card {
  background: rgba(0,0,0,0.18);
  border-radius: 8px;
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: grab;
  color: #fff;
}
.seed-card:active { cursor: grabbing; }
.seed-card .si { font-size: 30px; }
.seed-card .sn { font-size: 13px; font-weight: 700; }
.seed-card .sd { font-size: 11px; opacity: 0.8; }

/* Drag ghost */
#drag-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 38px;
  transform: translate(-50%, -50%);
  display: none;
  line-height: 1;
}

/* Float popup */
.fpop {
  position: fixed;
  font-size: 15px;
  font-weight: 700;
  pointer-events: none;
  z-index: 9999;
  animation: floatUp 1.2s ease forwards;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  transform: translateX(-50%);
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-55px); }
}
</style>
</head>
<body>

<div id="coins"><span class="ci">🪙</span><span id="coin-count">10</span></div>

<div id="farm-wrapper">
  <div id="farm-grid"></div>
  <div id="ground"></div>
</div>

<div id="sell-box">🛒 Sell Here</div>

<div id="market-panel">
  <div id="market-tab">MARKET</div>
  <div class="seed-card" data-seed="potato">
    <span class="si">🥔</span>
    <span class="sn">Potato</span>
    <span class="sd">🪙 2 &nbsp;·&nbsp; 15s</span>
  </div>
  <div class="seed-card" data-seed="carrot">
    <span class="si">🥕</span>
    <span class="sn">Carrot</span>
    <span class="sd">🪙 4 &nbsp;·&nbsp; 30s</span>
  </div>
  <div class="seed-card" data-seed="wheat">
    <span class="si">🌾</span>
    <span class="sn">Wheat</span>
    <span class="sd">🪙 8 &nbsp;·&nbsp; 60s</span>
  </div>
</div>

<div id="drag-ghost"></div>

<script>
// ── SEED DATA ──────────────────────────────────────────────
const SEEDS = {
  potato: { name: 'Potato', icon: '🥔', cost: 2,  grow: 15, sell: 6  },
  carrot: { name: 'Carrot', icon: '🥕', cost: 4,  grow: 30, sell: 12 },
  wheat:  { name: 'Wheat',  icon: '🌾', cost: 8,  grow: 60, sell: 25 },
};

// ── STATE ──────────────────────────────────────────────────
let state = {
  coins: 10,
  tiles: Array(9).fill(null),  // null | { seed, plantedAt }
  ground: [],                  // [{ seed, id }]
};
let nextId = 0;
let selectedTile = null;

// ── SAVE / LOAD ────────────────────────────────────────────
const SAVE_KEY = 'blissfarm_v1';

function saveState() {
  localStorage.setItem(SAVE_KEY, JSON.stringify({ ...state, nextId }));
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    state.coins  = d.coins  ?? 10;
    state.tiles  = d.tiles  ?? Array(9).fill(null);
    state.ground = d.ground ?? [];
    nextId       = d.nextId ?? 0;
  } catch(e) { /* ignore */ }
}

// ── HELPERS ────────────────────────────────────────────────
function rem(tileData) {
  return Math.max(0, SEEDS[tileData.seed].grow - (Date.now() - tileData.plantedAt) / 1000);
}
function isReady(tileData) { return rem(tileData) <= 0; }
function fmt(s) { return s <= 0 ? 'Ready!' : Math.ceil(s) + 's'; }

// ── COIN DISPLAY ───────────────────────────────────────────
function updateCoins() {
  document.getElementById('coin-count').textContent = state.coins;
}

// ── GRID ───────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('farm-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const el = document.createElement('div');
    el.className = 'tile';
    el.dataset.idx = i;
    el.addEventListener('mousedown', onTileDown);
    grid.appendChild(el);
  }
}

function renderTile(idx) {
  const el = document.querySelectorAll('.tile')[idx];
  const td = state.tiles[idx];
  el.innerHTML = '';
  el.className = 'tile';

  if (!td) return;

  const seed = SEEDS[td.seed];
  const ready = isReady(td);

  if (ready)              el.classList.add('ready-tile');
  if (selectedTile===idx) el.classList.add('selected');

  const icon = document.createElement('div');
  icon.className = 'crop-icon';
  icon.textContent = seed.icon;
  el.appendChild(icon);

  const timer = document.createElement('div');
  timer.className = 'timer';
  timer.textContent = ready ? 'Harvest!' : fmt(rem(td));
  el.appendChild(timer);

  if (selectedTile === idx && !ready) {
    const xb = document.createElement('div');
    xb.className = 'x-btn';
    xb.textContent = '✕';
    xb.addEventListener('mousedown', e => {
      e.stopPropagation();
      state.tiles[idx] = null;
      selectedTile = null;
      renderTile(idx);
      saveState();
    });
    el.appendChild(xb);
  }
}

function renderAllTiles() {
  for (let i = 0; i < 9; i++) renderTile(i);
}

// ── GROUND ─────────────────────────────────────────────────
function renderGround() {
  const ground = document.getElementById('ground');
  ground.innerHTML = '';
  state.ground.forEach(item => {
    const el = document.createElement('div');
    el.className = 'h-crop';
    el.textContent = SEEDS[item.seed].icon;
    el.dataset.id = item.id;
    el.addEventListener('mousedown', onGroundDown);
    ground.appendChild(el);
  });
}

// ── DRAG SYSTEM ────────────────────────────────────────────
const ghost = document.getElementById('drag-ghost');
let drag = null; // { type: 'seed'|'ground', seed, id? }

function startDrag(type, seed, id, e) {
  // cancel tile selection on any drag
  if (selectedTile !== null) {
    const prev = selectedTile;
    selectedTile = null;
    renderTile(prev);
  }
  drag = { type, seed, id };
  ghost.textContent = SEEDS[seed].icon;
  ghost.style.display = 'block';
  moveGhost(e.clientX, e.clientY);
}

function moveGhost(x, y) {
  ghost.style.left = x + 'px';
  ghost.style.top  = y + 'px';
}

function stopDrag() {
  drag = null;
  ghost.style.display = 'none';
  document.querySelectorAll('.tile.drop-target').forEach(t => t.classList.remove('drop-target'));
  document.getElementById('sell-box').classList.remove('drag-over');
}

function hitTest(x, y, el) {
  const r = el.getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

document.addEventListener('mousemove', e => {
  if (!drag) return;
  moveGhost(e.clientX, e.clientY);

  // highlight tiles
  document.querySelectorAll('.tile').forEach(t => {
    t.classList.toggle('drop-target', hitTest(e.clientX, e.clientY, t));
  });

  // highlight sell box
  const sb = document.getElementById('sell-box');
  sb.classList.toggle('drag-over', hitTest(e.clientX, e.clientY, sb));
});

document.addEventListener('mouseup', e => {
  if (!drag) return;

  // sell box?
  const sb = document.getElementById('sell-box');
  if (drag.type === 'ground' && hitTest(e.clientX, e.clientY, sb)) {
    sellCrop(drag.id, e.clientX, e.clientY);
    stopDrag();
    return;
  }

  // tile drop (seed only)?
  if (drag.type === 'seed') {
    document.querySelectorAll('.tile').forEach(t => {
      if (hitTest(e.clientX, e.clientY, t)) {
        plantSeed(drag.seed, parseInt(t.dataset.idx));
      }
    });
  }

  stopDrag();
});

// ── ACTIONS ────────────────────────────────────────────────
function plantSeed(seedKey, idx) {
  if (state.tiles[idx]) return;
  const seed = SEEDS[seedKey];
  if (state.coins < seed.cost) {
    showPop('Not enough 🪙', window.innerWidth/2, window.innerHeight/2, '#ff8888');
    return;
  }
  state.coins -= seed.cost;
  state.tiles[idx] = { seed: seedKey, plantedAt: Date.now() };
  updateCoins();
  renderTile(idx);
  saveState();
}

function harvestTile(idx) {
  const td = state.tiles[idx];
  if (!td) return;
  state.tiles[idx] = null;
  state.ground.push({ seed: td.seed, id: nextId++ });
  renderTile(idx);
  renderGround();
  saveState();
}

function sellCrop(id, x, y) {
  const i = state.ground.findIndex(g => g.id === id);
  if (i === -1) return;
  const item = state.ground.splice(i, 1)[0];
  state.coins += SEEDS[item.seed].sell;
  updateCoins();
  renderGround();
  showPop('+🪙' + SEEDS[item.seed].sell, x, y, '#FFD700');
  saveState();
}

// ── TILE CLICK ─────────────────────────────────────────────
function onTileDown(e) {
  if (drag) return;
  const idx = parseInt(e.currentTarget.dataset.idx);
  const td = state.tiles[idx];
  if (!td) return;

  if (isReady(td)) {
    harvestTile(idx);
    return;
  }

  // toggle selection
  const prev = selectedTile;
  selectedTile = (selectedTile === idx) ? null : idx;
  if (prev !== null && prev !== idx) renderTile(prev);
  renderTile(idx);
}

// ── GROUND CROP DRAG ───────────────────────────────────────
function onGroundDown(e) {
  const id = parseInt(e.currentTarget.dataset.id);
  const item = state.ground.find(g => g.id === id);
  if (!item) return;
  startDrag('ground', item.seed, id, e);
  e.preventDefault();
}

// ── SEED DRAG FROM PANEL ───────────────────────────────────
document.querySelectorAll('.seed-card').forEach(card => {
  card.addEventListener('mousedown', e => {
    startDrag('seed', card.dataset.seed, null, e);
    e.preventDefault();
  });
});

// ── MARKET PANEL TOGGLE ────────────────────────────────────
document.getElementById('market-tab').addEventListener('click', () => {
  document.getElementById('market-panel').classList.toggle('open');
});

// ── FLOAT POPUP ────────────────────────────────────────────
function showPop(text, x, y, color) {
  const el = document.createElement('div');
  el.className = 'fpop';
  el.textContent = text;
  el.style.left  = x + 'px';
  el.style.top   = y + 'px';
  el.style.color = color;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1250);
}

// ── GAME LOOP ──────────────────────────────────────────────
setInterval(renderAllTiles, 1000);
setInterval(saveState, 10000);

// ── INIT ───────────────────────────────────────────────────
loadState();
buildGrid();
renderAllTiles();
renderGround();
updateCoins();
</script>
</body>
</html>

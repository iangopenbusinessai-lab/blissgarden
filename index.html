<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bliss Farm</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  --pw: 172px;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #87CEEB;
  font-family: system-ui, sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

/* ── TOP BAR ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 44px;
  z-index: 300;
  display: flex;
  align-items: center;
  padding: 0 12px;
  pointer-events: none;
}
#coins {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(0,0,0,0.18);
  border-radius: 20px;
  padding: 4px 12px 4px 8px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  pointer-events: all;
}

/* ── RIGHT PANEL ── */
#panel {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: var(--pw);
  background: #8B5E3C;
  z-index: 200;
  display: flex;
  flex-direction: row;
  transition: width 0.25s ease;
  overflow: hidden;
}

/* Left-edge toggle bar */
#panel-tab {
  width: 24px;
  min-width: 24px;
  background: #6e4626;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  flex-shrink: 0;
}
#panel-tab:hover { background: #613e20; }

/* Scrollable content */
#panel-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* Shop / Upgrades tab bar */
#panel-tabs {
  display: flex;
  margin-top: 44px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  flex-shrink: 0;
}
.ptab {
  flex: 1;
  padding: 9px 0;
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  text-transform: uppercase;
}
.ptab.active {
  color: #fff;
  border-bottom: 2px solid rgba(255,255,255,0.75);
  margin-bottom: -1px;
}
.ptab:hover:not(.active) { color: rgba(255,255,255,0.65); }

/* Panel labels */
.panel-label {
  color: rgba(255,255,255,0.45);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 11px 13px 5px;
}
.panel-divider {
  height: 1px;
  background: rgba(255,255,255,0.1);
  margin: 8px 0 4px;
}

/* Shop seed rows */
.seed-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 13px;
  cursor: grab;
  color: #fff;
}
.seed-row:hover { background: rgba(0,0,0,0.12); }
.seed-row:active { cursor: grabbing; }
.seed-row .sr-icon { font-size: 19px; line-height: 1; }
.seed-row .sr-info { display: flex; flex-direction: column; }
.seed-row .sr-name { font-size: 12px; font-weight: 700; }
.seed-row .sr-meta { font-size: 10px; opacity: 0.6; margin-top: 1px; }

/* Inventory icon grid */
#inv-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 9px 13px;
}
.inv-icon {
  position: relative;
  width: 42px;
  height: 42px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  cursor: grab;
}
.inv-icon:active { cursor: grabbing; }
.inv-badge {
  position: absolute;
  top: -5px;
  right: -5px;
  background: #b03020;
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  border-radius: 10px;
  padding: 1px 4px;
  min-width: 15px;
  text-align: center;
  line-height: 13px;
  pointer-events: none;
}
/* Tooltip */
.inv-icon::after {
  content: attr(data-name);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.78);
  color: #fff;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 999;
}
.inv-icon:hover::after { opacity: 1; }

#inv-empty {
  color: rgba(255,255,255,0.28);
  font-size: 11px;
  font-style: italic;
  padding: 6px 13px;
}

/* Upgrades */
.coming-soon {
  color: rgba(255,255,255,0.28);
  font-size: 11px;
  font-style: italic;
  padding: 14px 13px;
}

/* Panel drop highlight */
#panel.drop-hi { background: #7a5030; }

/* ── GAME AREA ── */
#game-area {
  position: fixed;
  top: 44px;
  left: 0;
  right: var(--pw);
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: right 0.25s ease;
}

/* Green grass patch */
#grass {
  background: #5A8A3C;
  border-radius: 10px;
  padding: 22px;
}

/* Farm grid — individual outlined tiles, close together */
#farm-grid {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  grid-template-rows: repeat(3, 100px);
  gap: 3px;
}

.tile {
  width: 100px;
  height: 100px;
  background: #8B5E3C;
  border: 2px solid #5A8A3C;
  border-radius: 6px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: default;
}

/* Ready — green pulse on border */
.tile.ready {
  animation: gpulse 1.1s ease-in-out infinite;
}
@keyframes gpulse {
  0%, 100% { border-color: #5A8A3C; box-shadow: none; }
  50%       { border-color: #7FD160; box-shadow: 0 0 6px rgba(127,209,96,0.45); }
}

/* Drop target when dragging seed */
.tile.drop-hi { background: #a07040; }

.tile .t-icon {
  font-size: 36px;
  line-height: 1;
  pointer-events: none;
}
.tile .t-timer {
  font-size: 11px;
  color: rgba(255,255,255,0.85);
  font-weight: 700;
  margin-top: 3px;
  pointer-events: none;
}

/* Floating X for selected non-ready tile */
.tile .t-xbtn {
  position: absolute;
  top: -13px;
  left: 50%;
  transform: translateX(-50%);
  width: 22px;
  height: 22px;
  background: rgba(180,35,35,0.9);
  color: #fff;
  border-radius: 50%;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 10;
}

/* ── SELL BOX ── */
#sell-box {
  position: fixed;
  bottom: 0;
  left: calc((100vw - var(--pw)) / 2);
  transform: translateX(-50%);
  background: #8B6343;
  border-radius: 0;
  z-index: 250;
  min-width: 190px;
  padding: 7px 14px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: left 0.25s ease;
}
#sell-queue-row {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  min-height: 22px;
  align-items: center;
}
.sq-icon { font-size: 17px; line-height: 1; }
#sell-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: #fff;
}
#sell-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}
#sell-cd {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
}
#sell-box.drop-hi { background: #a07848; }

/* ── DRAG GHOST ── */
#ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 38px;
  line-height: 1;
  transform: translate(-50%, -50%);
  display: none;
}

/* ── FLOAT POPUP ── */
.fpop {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 15px;
  font-weight: 700;
  color: #FFD700;
  text-shadow: 0 1px 4px rgba(0,0,0,0.45);
  animation: floatUp 1.2s ease forwards;
  transform: translateX(-50%);
  white-space: nowrap;
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-52px); }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="coins">🪙 <span id="coin-count">10</span></div>
</div>

<!-- RIGHT PANEL -->
<div id="panel">
  <!-- Left-edge toggle bar -->
  <div id="panel-tab"><span id="panel-arrow">›</span></div>

  <!-- Scrollable content -->
  <div id="panel-content">

    <!-- Tab bar -->
    <div id="panel-tabs">
      <div class="ptab active" data-view="shop">Shop</div>
      <div class="ptab" data-view="upgrades">Upgrades</div>
    </div>

    <!-- SHOP + INVENTORY VIEW -->
    <div id="view-shop">
      <div class="panel-label">Seeds</div>
      <div class="seed-row" data-seed="potato">
        <span class="sr-icon">🌱</span>
        <div class="sr-info">
          <span class="sr-name">Potato</span>
          <span class="sr-meta">🪙2 · 15s</span>
        </div>
      </div>
      <div class="seed-row" data-seed="carrot">
        <span class="sr-icon">🌿</span>
        <div class="sr-info">
          <span class="sr-name">Carrot</span>
          <span class="sr-meta">🪙4 · 30s</span>
        </div>
      </div>
      <div class="seed-row" data-seed="wheat">
        <span class="sr-icon">🌾</span>
        <div class="sr-info">
          <span class="sr-name">Wheat</span>
          <span class="sr-meta">🪙8 · 60s</span>
        </div>
      </div>

      <div class="panel-divider"></div>
      <div class="panel-label">Inventory</div>
      <div id="inv-grid"></div>
    </div>

    <!-- UPGRADES VIEW -->
    <div id="view-upgrades" style="display:none">
      <div class="panel-label">Upgrades</div>
      <div class="coming-soon">Coming soon...</div>
    </div>

  </div>
</div>

<!-- GAME AREA -->
<div id="game-area">
  <div id="grass">
    <div id="farm-grid"></div>
  </div>
</div>

<!-- SELL BOX -->
<div id="sell-box">
  <div id="sell-queue-row"></div>
  <div id="sell-foot">
    <span id="sell-label">SELL</span>
    <span id="sell-cd"></span>
  </div>
</div>

<!-- DRAG GHOST -->
<div id="ghost"></div>

<script>
// ════════════════════════════════════
// DATA
// ════════════════════════════════════
const SEEDS = {
  potato: { name: 'Potato', icon: '🥔', cost: 2,  grow: 15, sell: 6  },
  carrot: { name: 'Carrot', icon: '🥕', cost: 4,  grow: 30, sell: 12 },
  wheat:  { name: 'Wheat',  icon: '🌾', cost: 8,  grow: 60, sell: 25 },
};

// ════════════════════════════════════
// STATE
// ════════════════════════════════════
let state = {
  coins:      10,
  tiles:      Array(9).fill(null), // null | { seed, plantedAt }
  inventory:  {},                  // { seedKey: count }
  sellQueue:  [],                  // seed keys FIFO
  sellNextAt: 0,                   // timestamp of next auto-sell
};
let nextId = 0;
let selectedTile = null;
let panelExpanded = true;

// ════════════════════════════════════
// DRAG STATE
// ════════════════════════════════════
let drag = null; // null | { seed, source }
const ghost = document.getElementById('ghost');

function startDrag(seed, source) {
  drag = { seed, source };
  ghost.textContent = SEEDS[seed].icon;
  ghost.style.display = 'block';
  deselect();
}

function endDrag() {
  drag = null;
  ghost.style.display = 'none';
  clearHighlights();
}

function moveGhost(x, y) {
  ghost.style.left = x + 'px';
  ghost.style.top  = y + 'px';
}

function clearHighlights() {
  tileEls().forEach(t => t.classList.remove('drop-hi'));
  document.getElementById('panel').classList.remove('drop-hi');
  document.getElementById('sell-box').classList.remove('drop-hi');
}

function hit(x, y, el) {
  const r = el.getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

function tileEls() { return document.querySelectorAll('.tile'); }

// ════════════════════════════════════
// SAVE / LOAD
// ════════════════════════════════════
const KEY = 'blissfarm4';

function save() {
  localStorage.setItem(KEY, JSON.stringify({ ...state, nextId, panelExpanded }));
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (!d) return;
    state.coins      = d.coins      ?? 10;
    state.tiles      = d.tiles      ?? Array(9).fill(null);
    state.inventory  = d.inventory  ?? {};
    state.sellQueue  = d.sellQueue  ?? [];
    state.sellNextAt = d.sellNextAt ?? 0;
    nextId           = d.nextId     ?? 0;
    panelExpanded    = d.panelExpanded ?? true;
  } catch (_) {}
}

// ════════════════════════════════════
// HELPERS
// ════════════════════════════════════
function remSec(td) {
  return Math.max(0, SEEDS[td.seed].grow - (Date.now() - td.plantedAt) / 1000);
}
function isReady(td) { return remSec(td) <= 0; }
function fmt(s)      { return Math.ceil(s) + 's'; }

// ════════════════════════════════════
// COIN UI
// ════════════════════════════════════
function updateCoins() {
  document.getElementById('coin-count').textContent = state.coins;
}

// ════════════════════════════════════
// TILE RENDER
// ════════════════════════════════════
function buildGrid() {
  const grid = document.getElementById('farm-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const el = document.createElement('div');
    el.className = 'tile';
    el.dataset.idx = i;
    el.addEventListener('mousedown', onTileDown);
    grid.appendChild(el);
  }
}

function renderTile(idx) {
  const el = [...tileEls()][idx];
  const td = state.tiles[idx];
  el.innerHTML = '';
  el.className = 'tile';
  if (!td) return;

  const rdy = isReady(td);
  if (rdy) el.classList.add('ready');

  const icon = document.createElement('div');
  icon.className = 't-icon';
  icon.textContent = SEEDS[td.seed].icon;
  el.appendChild(icon);

  if (!rdy) {
    const timer = document.createElement('div');
    timer.className = 't-timer';
    timer.textContent = fmt(remSec(td));
    el.appendChild(timer);

    if (selectedTile === idx) {
      const xb = document.createElement('div');
      xb.className = 't-xbtn';
      xb.textContent = '✕';
      xb.addEventListener('mousedown', e => {
        e.stopPropagation();
        state.tiles[idx] = null;
        deselect();
        renderTile(idx);
        save();
      });
      el.appendChild(xb);
    }
  }
}

function renderAllTiles() {
  for (let i = 0; i < 9; i++) renderTile(i);
}

// ════════════════════════════════════
// INVENTORY
// ════════════════════════════════════
function renderInventory() {
  const grid = document.getElementById('inv-grid');
  grid.innerHTML = '';
  const keys = Object.keys(state.inventory).filter(k => (state.inventory[k] || 0) > 0);

  if (!keys.length) {
    const emp = document.createElement('div');
    emp.id = 'inv-empty';
    emp.textContent = 'Empty';
    grid.appendChild(emp);
    return;
  }

  keys.forEach(k => {
    const el = document.createElement('div');
    el.className = 'inv-icon';
    el.dataset.name = SEEDS[k].name;
    el.innerHTML = `<span style="pointer-events:none">${SEEDS[k].icon}</span>
                    <span class="inv-badge">${state.inventory[k]}</span>`;
    el.addEventListener('mousedown', e => {
      e.stopPropagation();
      if ((state.inventory[k] || 0) < 1) return;
      state.inventory[k]--;
      if (state.inventory[k] <= 0) delete state.inventory[k];
      renderInventory();
      save();
      startDrag(k, 'inventory');
      moveGhost(e.clientX, e.clientY);
    });
    grid.appendChild(el);
  });
}

function addInventory(seed) {
  state.inventory[seed] = (state.inventory[seed] || 0) + 1;
}

// ════════════════════════════════════
// SELL BOX QUEUE
// ════════════════════════════════════
function addToSellQueue(seed) {
  state.sellQueue.push(seed);
  if (state.sellQueue.length === 1) {
    state.sellNextAt = Date.now() + 10000;
  }
  renderSellBox();
  save();
}

function renderSellBox() {
  const qRow = document.getElementById('sell-queue-row');
  qRow.innerHTML = '';
  state.sellQueue.forEach(seed => {
    const s = document.createElement('span');
    s.className = 'sq-icon';
    s.textContent = SEEDS[seed].icon;
    qRow.appendChild(s);
  });
  updateSellTimer();
}

function updateSellTimer() {
  const cd = document.getElementById('sell-cd');
  if (!state.sellQueue.length || !state.sellNextAt) {
    cd.textContent = '';
    return;
  }
  const rem = Math.max(0, Math.ceil((state.sellNextAt - Date.now()) / 1000));
  cd.textContent = rem + 's';
}

function tickSellBox() {
  if (!state.sellQueue.length) return;
  if (Date.now() >= state.sellNextAt) {
    const seed = state.sellQueue.shift();
    state.coins += SEEDS[seed].sell;
    updateCoins();
    state.sellNextAt = state.sellQueue.length ? Date.now() + 10000 : 0;
    const sb = document.getElementById('sell-box');
    const r  = sb.getBoundingClientRect();
    showPop('+🪙' + SEEDS[seed].sell, r.left + r.width / 2, r.top - 6);
    renderSellBox();
    save();
  } else {
    updateSellTimer();
  }
}

// ════════════════════════════════════
// SELECTION
// ════════════════════════════════════
function deselect() {
  if (selectedTile !== null) {
    const prev = selectedTile;
    selectedTile = null;
    renderTile(prev);
  }
}

// ════════════════════════════════════
// TILE INTERACTION
// ════════════════════════════════════
function onTileDown(e) {
  const idx = parseInt(e.currentTarget.dataset.idx);
  const td  = state.tiles[idx];

  if (!td) { deselect(); return; }

  if (isReady(td)) {
    e.stopPropagation();
    const seed = td.seed;
    state.tiles[idx] = null;
    renderTile(idx);
    save();
    startDrag(seed, 'tile');
    moveGhost(e.clientX, e.clientY);
    return;
  }

  // non-ready: toggle selection
  e.stopPropagation();
  if (selectedTile === idx) {
    deselect();
  } else {
    deselect();
    selectedTile = idx;
    renderTile(idx);
  }
}

// ════════════════════════════════════
// SHOP DRAG
// ════════════════════════════════════
document.querySelectorAll('.seed-row').forEach(row => {
  row.addEventListener('mousedown', e => {
    e.stopPropagation();
    startDrag(row.dataset.seed, 'shop');
    moveGhost(e.clientX, e.clientY);
  });
});

// ════════════════════════════════════
// PANEL TOGGLE
// ════════════════════════════════════
function applyPanelState() {
  document.body.style.setProperty('--pw', panelExpanded ? '172px' : '24px');
  document.getElementById('panel-arrow').textContent = panelExpanded ? '›' : '‹';
}

document.getElementById('panel-tab').addEventListener('click', () => {
  panelExpanded = !panelExpanded;
  applyPanelState();
  save();
});

// ════════════════════════════════════
// PANEL TABS (Shop / Upgrades)
// ════════════════════════════════════
document.querySelectorAll('.ptab').forEach(tab => {
  tab.addEventListener('click', e => {
    e.stopPropagation();
    document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const v = tab.dataset.view;
    document.getElementById('view-shop').style.display     = v === 'shop'     ? '' : 'none';
    document.getElementById('view-upgrades').style.display = v === 'upgrades' ? '' : 'none';
  });
});

// ════════════════════════════════════
// GLOBAL MOUSE EVENTS
// ════════════════════════════════════
document.addEventListener('mousemove', e => {
  if (!drag) return;
  moveGhost(e.clientX, e.clientY);
  clearHighlights();

  const panel   = document.getElementById('panel');
  const sellBox = document.getElementById('sell-box');

  if (drag.source === 'shop') {
    tileEls().forEach(t => {
      const i = parseInt(t.dataset.idx);
      if (!state.tiles[i] && hit(e.clientX, e.clientY, t)) t.classList.add('drop-hi');
    });
  } else {
    if (hit(e.clientX, e.clientY, sellBox)) {
      sellBox.classList.add('drop-hi');
    } else if (panelExpanded && hit(e.clientX, e.clientY, panel)) {
      panel.classList.add('drop-hi');
    }
  }
});

document.addEventListener('mouseup', e => {
  if (!drag) return;

  const { seed, source } = drag;
  const panel   = document.getElementById('panel');
  const sellBox = document.getElementById('sell-box');

  if (source === 'shop') {
    tileEls().forEach(t => {
      const i = parseInt(t.dataset.idx);
      if (!state.tiles[i] && hit(e.clientX, e.clientY, t)) {
        const cost = SEEDS[seed].cost;
        if (state.coins >= cost) {
          state.coins -= cost;
          state.tiles[i] = { seed, plantedAt: Date.now() };
          updateCoins();
          renderTile(i);
          save();
        }
      }
    });
  } else {
    // crop from tile / inventory — sell queue, inventory, or inventory fallback
    if (hit(e.clientX, e.clientY, sellBox)) {
      addToSellQueue(seed);
    } else if (panelExpanded && hit(e.clientX, e.clientY, panel)) {
      addInventory(seed);
      renderInventory();
      save();
    } else {
      // no ground strip — goes to inventory as fallback
      addInventory(seed);
      renderInventory();
      save();
    }
  }

  endDrag();
});

// Click background to deselect
document.addEventListener('mousedown', () => {
  if (!drag) deselect();
});

// ════════════════════════════════════
// FLOAT POPUP
// ════════════════════════════════════
function showPop(text, x, y) {
  const el = document.createElement('div');
  el.className = 'fpop';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1250);
}

// ════════════════════════════════════
// GAME LOOP + AUTO-SAVE
// ════════════════════════════════════
setInterval(() => {
  renderAllTiles();
  tickSellBox();
}, 1000);
setInterval(save, 10000);

// ════════════════════════════════════
// INIT
// ════════════════════════════════════
load();
buildGrid();
renderAllTiles();
renderInventory();
renderSellBox();
updateCoins();
applyPanelState();
</script>
</body>

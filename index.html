<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bliss Farm</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #87CEEB;
  font-family: system-ui, sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

/* ── TOP BAR ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 44px;
  z-index: 300;
  display: flex;
  align-items: center;
  padding: 0 12px;
  pointer-events: none;
}
#coins {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(0,0,0,0.18);
  border-radius: 20px;
  padding: 4px 12px 4px 8px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  pointer-events: all;
}

/* ── RIGHT PANEL ── */
#panel {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 172px;
  background: #8B5E3C;
  z-index: 200;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}

.panel-section { padding-top: 50px; }
.panel-label {
  color: rgba(255,255,255,0.55);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 10px 14px 6px;
}
.panel-divider {
  height: 1px;
  background: rgba(255,255,255,0.12);
  margin: 10px 0 4px;
}

/* Shop seeds */
.seed-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 14px;
  cursor: grab;
  color: #fff;
}
.seed-row:hover { background: rgba(0,0,0,0.12); }
.seed-row:active { cursor: grabbing; }
.seed-row .sr-icon { font-size: 22px; line-height: 1; }
.seed-row .sr-info { display: flex; flex-direction: column; }
.seed-row .sr-name { font-size: 12px; font-weight: 700; }
.seed-row .sr-meta { font-size: 10px; opacity: 0.7; margin-top: 1px; }

/* Inventory */
.inv-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 14px;
  cursor: grab;
  color: #fff;
}
.inv-row:hover { background: rgba(0,0,0,0.12); }
.inv-row:active { cursor: grabbing; }
.inv-row .ir-icon { font-size: 20px; line-height: 1; }
.inv-row .ir-name { font-size: 12px; font-weight: 700; flex: 1; }
.inv-row .ir-count {
  font-size: 12px;
  background: rgba(0,0,0,0.22);
  border-radius: 10px;
  min-width: 22px;
  text-align: center;
  padding: 1px 6px;
}
#inv-empty {
  color: rgba(255,255,255,0.3);
  font-size: 11px;
  font-style: italic;
  padding: 8px 14px;
}

/* Panel drop highlight */
#panel.drop-hi { background: #7d5430; }

/* ── GAME AREA (left of panel) ── */
#game-area {
  position: fixed;
  top: 44px;
  left: 0;
  right: 172px;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Green grass patch */
#grass {
  background: #5A8A3C;
  border-radius: 10px;
  padding: 22px 22px 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

/* Farm grid — seamless */
#farm-grid {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  grid-template-rows: repeat(3, 100px);
  gap: 1px;
  background: #5a3a1a; /* line color shows through 1px gaps */
}

.tile {
  width: 100px;
  height: 100px;
  background: #8B5E3C;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: default;
}

/* Ready pulse — inner green border */
.tile.ready {
  animation: gpulse 1.1s ease-in-out infinite;
}
@keyframes gpulse {
  0%, 100% { box-shadow: inset 0 0 0 0 rgba(80, 200, 80, 0); }
  50%       { box-shadow: inset 0 0 0 3px rgba(80, 200, 80, 0.85); }
}

/* Tile drop highlight when dragging seed */
.tile.drop-hi { background: #a07040; }

.tile .t-icon {
  font-size: 36px;
  line-height: 1;
  pointer-events: none;
}
.tile .t-timer {
  font-size: 11px;
  color: rgba(255,255,255,0.85);
  font-weight: 700;
  margin-top: 3px;
  pointer-events: none;
}

/* Floating X for selected non-ready tile */
.tile .t-xbtn {
  position: absolute;
  top: -13px;
  left: 50%;
  transform: translateX(-50%);
  width: 22px;
  height: 22px;
  background: rgba(180, 35, 35, 0.9);
  color: #fff;
  border-radius: 50%;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 10;
}

/* Ground strip */
#ground {
  min-width: 302px; /* 3×100 + 2×1 */
  min-height: 56px;
  background: rgba(0,0,0,0.09);
  border-radius: 6px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 5px;
  padding: 8px 8px;
}

.loose {
  font-size: 28px;
  line-height: 1;
  cursor: grab;
  padding: 3px;
  border-radius: 4px;
}
.loose:active { cursor: grabbing; }

/* ── SELL BOX ── */
#sell-box {
  position: fixed;
  bottom: 22px;
  /* centered in the area left of panel */
  left: calc((100vw - 172px) / 2);
  transform: translateX(-50%);
  background: #8B5E3C;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 11px 30px;
  border-radius: 8px;
  z-index: 250;
  cursor: default;
}
#sell-box.drop-hi { background: #a07040; }

/* ── DRAG GHOST ── */
#ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 38px;
  line-height: 1;
  transform: translate(-50%, -50%);
  display: none;
}

/* ── FLOAT POPUP ── */
.fpop {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 15px;
  font-weight: 700;
  color: #FFD700;
  text-shadow: 0 1px 4px rgba(0,0,0,0.45);
  animation: floatUp 1.2s ease forwards;
  transform: translateX(-50%);
  white-space: nowrap;
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-52px); }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="coins">🪙 <span id="coin-count">10</span></div>
</div>

<!-- RIGHT PANEL -->
<div id="panel">
  <div class="panel-section">
    <div class="panel-label">Shop</div>
    <div class="seed-row" data-seed="potato">
      <span class="sr-icon">🥔</span>
      <div class="sr-info">
        <span class="sr-name">Potato</span>
        <span class="sr-meta">🪙2 · 15s</span>
      </div>
    </div>
    <div class="seed-row" data-seed="carrot">
      <span class="sr-icon">🥕</span>
      <div class="sr-info">
        <span class="sr-name">Carrot</span>
        <span class="sr-meta">🪙4 · 30s</span>
      </div>
    </div>
    <div class="seed-row" data-seed="wheat">
      <span class="sr-icon">🌾</span>
      <div class="sr-info">
        <span class="sr-name">Wheat</span>
        <span class="sr-meta">🪙8 · 60s</span>
      </div>
    </div>

    <div class="panel-divider"></div>
    <div class="panel-label">Inventory</div>
    <div id="inv-list"></div>
  </div>
</div>

<!-- GAME AREA -->
<div id="game-area">
  <div id="grass">
    <div id="farm-grid"></div>
    <div id="ground"></div>
  </div>
</div>

<!-- SELL BOX -->
<div id="sell-box">Sell</div>

<!-- DRAG GHOST -->
<div id="ghost"></div>

<script>
// ════════════════════════════════════
// DATA
// ════════════════════════════════════
const SEEDS = {
  potato: { name: 'Potato', icon: '🥔', cost: 2,  grow: 15, sell: 6  },
  carrot: { name: 'Carrot', icon: '🥕', cost: 4,  grow: 30, sell: 12 },
  wheat:  { name: 'Wheat',  icon: '🌾', cost: 8,  grow: 60, sell: 25 },
};

// ════════════════════════════════════
// STATE
// ════════════════════════════════════
let state = {
  coins:     10,
  tiles:     Array(9).fill(null), // null | { seed, plantedAt }
  ground:    [],                  // [{ seed, id }]
  inventory: {},                  // { seedKey: count }
};
let nextId = 0;
let selectedTile = null; // tile index | null

// ════════════════════════════════════
// DRAG STATE
// ════════════════════════════════════
// drag = null | { seed, source: 'shop'|'tile'|'ground'|'inventory' }
let drag = null;
const ghost = document.getElementById('ghost');

function startDrag(seed, source) {
  drag = { seed, source };
  ghost.textContent = SEEDS[seed].icon;
  ghost.style.display = 'block';
  deselect();
}

function endDrag() {
  drag = null;
  ghost.style.display = 'none';
  clearHighlights();
}

function moveGhost(x, y) {
  ghost.style.left = x + 'px';
  ghost.style.top  = y + 'px';
}

function clearHighlights() {
  tiles().forEach(t => t.classList.remove('drop-hi'));
  document.getElementById('panel').classList.remove('drop-hi');
  document.getElementById('sell-box').classList.remove('drop-hi');
}

function hit(x, y, el) {
  const r = el.getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

function tiles() { return document.querySelectorAll('.tile'); }

// ════════════════════════════════════
// SAVE / LOAD
// ════════════════════════════════════
const KEY = 'blissfarm3';

function save() {
  localStorage.setItem(KEY, JSON.stringify({ ...state, nextId }));
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (!d) return;
    state.coins     = d.coins     ?? 10;
    state.tiles     = d.tiles     ?? Array(9).fill(null);
    state.ground    = d.ground    ?? [];
    state.inventory = d.inventory ?? {};
    nextId          = d.nextId    ?? 0;
  } catch (_) {}
}

// ════════════════════════════════════
// HELPERS
// ════════════════════════════════════
function remSec(td) {
  return Math.max(0, SEEDS[td.seed].grow - (Date.now() - td.plantedAt) / 1000);
}
function ready(td) { return remSec(td) <= 0; }
function fmt(s)    { return Math.ceil(s) + 's'; }

// ════════════════════════════════════
// COIN UI
// ════════════════════════════════════
function updateCoins() {
  document.getElementById('coin-count').textContent = state.coins;
}

// ════════════════════════════════════
// TILE RENDER
// ════════════════════════════════════
function buildGrid() {
  const grid = document.getElementById('farm-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const el = document.createElement('div');
    el.className = 'tile';
    el.dataset.idx = i;
    el.addEventListener('mousedown', onTileDown);
    grid.appendChild(el);
  }
}

function renderTile(idx) {
  const el = [...tiles()][idx];
  const td = state.tiles[idx];
  el.innerHTML = '';
  el.className = 'tile';
  if (!td) return;

  const rdy = ready(td);
  if (rdy) el.classList.add('ready');

  const icon = document.createElement('div');
  icon.className = 't-icon';
  icon.textContent = SEEDS[td.seed].icon;
  el.appendChild(icon);

  if (!rdy) {
    const timer = document.createElement('div');
    timer.className = 't-timer';
    timer.textContent = fmt(remSec(td));
    el.appendChild(timer);

    if (selectedTile === idx) {
      const xb = document.createElement('div');
      xb.className = 't-xbtn';
      xb.textContent = '✕';
      xb.addEventListener('mousedown', e => {
        e.stopPropagation();
        state.tiles[idx] = null;
        deselect();
        renderTile(idx);
        save();
      });
      el.appendChild(xb);
    }
  }
}

function renderAllTiles() {
  for (let i = 0; i < 9; i++) renderTile(i);
}

// ════════════════════════════════════
// GROUND RENDER
// ════════════════════════════════════
function renderGround() {
  const area = document.getElementById('ground');
  area.innerHTML = '';
  state.ground.forEach(item => {
    const el = document.createElement('div');
    el.className = 'loose';
    el.textContent = SEEDS[item.seed].icon;
    el.dataset.id = item.id;
    el.addEventListener('mousedown', e => {
      e.stopPropagation();
      pickFromGround(parseInt(el.dataset.id), e.clientX, e.clientY);
    });
    area.appendChild(el);
  });
}

function pickFromGround(id, x, y) {
  const i = state.ground.findIndex(g => g.id === id);
  if (i === -1) return;
  const seed = state.ground[i].seed;
  state.ground.splice(i, 1);
  renderGround();
  save();
  startDrag(seed, 'ground');
  moveGhost(x, y);
}

// ════════════════════════════════════
// INVENTORY RENDER
// ════════════════════════════════════
function renderInventory() {
  const list = document.getElementById('inv-list');
  list.innerHTML = '';
  const keys = Object.keys(state.inventory).filter(k => state.inventory[k] > 0);

  if (keys.length === 0) {
    const emp = document.createElement('div');
    emp.id = 'inv-empty';
    emp.textContent = 'Empty';
    list.appendChild(emp);
    return;
  }

  keys.forEach(k => {
    const el = document.createElement('div');
    el.className = 'inv-row';
    el.innerHTML = `
      <span class="ir-icon">${SEEDS[k].icon}</span>
      <span class="ir-name">${SEEDS[k].name}</span>
      <span class="ir-count">${state.inventory[k]}</span>
    `;
    el.addEventListener('mousedown', e => {
      e.stopPropagation();
      if ((state.inventory[k] || 0) < 1) return;
      state.inventory[k]--;
      if (state.inventory[k] <= 0) delete state.inventory[k];
      renderInventory();
      save();
      startDrag(k, 'inventory');
      moveGhost(e.clientX, e.clientY);
    });
    list.appendChild(el);
  });
}

function addInventory(seed) {
  state.inventory[seed] = (state.inventory[seed] || 0) + 1;
}

// ════════════════════════════════════
// SELECTION
// ════════════════════════════════════
function deselect() {
  if (selectedTile !== null) {
    const prev = selectedTile;
    selectedTile = null;
    renderTile(prev);
  }
}

// ════════════════════════════════════
// TILE INTERACTION
// ════════════════════════════════════
function onTileDown(e) {
  const idx = parseInt(e.currentTarget.dataset.idx);
  const td = state.tiles[idx];

  if (!td) { deselect(); return; }

  const rdy = ready(td);

  if (rdy) {
    // pick up ready crop
    e.stopPropagation();
    const seed = td.seed;
    state.tiles[idx] = null;
    renderTile(idx);
    save();
    startDrag(seed, 'tile');
    moveGhost(e.clientX, e.clientY);
    return;
  }

  // non-ready: toggle selection
  e.stopPropagation();
  if (selectedTile === idx) {
    deselect();
  } else {
    deselect();
    selectedTile = idx;
    renderTile(idx);
  }
}

// ════════════════════════════════════
// SHOP DRAG
// ════════════════════════════════════
document.querySelectorAll('.seed-row').forEach(row => {
  row.addEventListener('mousedown', e => {
    e.stopPropagation();
    startDrag(row.dataset.seed, 'shop');
    moveGhost(e.clientX, e.clientY);
  });
});

// ════════════════════════════════════
// GLOBAL MOUSE EVENTS
// ════════════════════════════════════
document.addEventListener('mousemove', e => {
  if (!drag) return;
  moveGhost(e.clientX, e.clientY);
  clearHighlights();

  const panel = document.getElementById('panel');
  const sellBox = document.getElementById('sell-box');

  if (drag.source === 'shop') {
    // highlight valid (empty) tiles
    tiles().forEach(t => {
      const i = parseInt(t.dataset.idx);
      if (!state.tiles[i] && hit(e.clientX, e.clientY, t)) {
        t.classList.add('drop-hi');
      }
    });
  } else {
    // crop drag: highlight sell box or inventory panel
    if (hit(e.clientX, e.clientY, sellBox)) {
      sellBox.classList.add('drop-hi');
    } else if (hit(e.clientX, e.clientY, panel)) {
      panel.classList.add('drop-hi');
    }
  }
});

document.addEventListener('mouseup', e => {
  if (!drag) return;

  const { seed, source } = drag;
  const panel   = document.getElementById('panel');
  const sellBox = document.getElementById('sell-box');

  if (source === 'shop') {
    // drop onto empty tile
    tiles().forEach(t => {
      const i = parseInt(t.dataset.idx);
      if (!state.tiles[i] && hit(e.clientX, e.clientY, t)) {
        const cost = SEEDS[seed].cost;
        if (state.coins >= cost) {
          state.coins -= cost;
          state.tiles[i] = { seed, plantedAt: Date.now() };
          updateCoins();
          renderTile(i);
          save();
        }
      }
    });
    // if nowhere valid, seed vanishes (came from shop, not from world)
  } else {
    // crop drag (tile/ground/inventory)
    if (hit(e.clientX, e.clientY, sellBox)) {
      state.coins += SEEDS[seed].sell;
      updateCoins();
      save();
      showPop('+🪙' + SEEDS[seed].sell, e.clientX, e.clientY);
    } else if (hit(e.clientX, e.clientY, panel)) {
      addInventory(seed);
      renderInventory();
      save();
    } else {
      state.ground.push({ seed, id: nextId++ });
      renderGround();
      save();
    }
  }

  endDrag();
});

// click background to deselect
document.addEventListener('mousedown', () => {
  if (!drag) deselect();
});

// ════════════════════════════════════
// FLOAT POPUP
// ════════════════════════════════════
function showPop(text, x, y) {
  const el = document.createElement('div');
  el.className = 'fpop';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1250);
}

// ════════════════════════════════════
// GAME LOOP + AUTO-SAVE
// ════════════════════════════════════
setInterval(renderAllTiles, 1000);
setInterval(save, 10000);

// ════════════════════════════════════
// INIT
// ════════════════════════════════════
load();
buildGrid();
renderAllTiles();
renderGround();
renderInventory();
updateCoins();
</script>
</body>
</html>

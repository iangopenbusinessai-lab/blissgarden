<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bliss Farm</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  --pw: 220px;
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: #87CEEB;
  font-family: system-ui, sans-serif;
  user-select: none; -webkit-user-select: none;
}

/* ── CLOUDS ── */
#clouds { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
.cloud { position:absolute; background:#fff; border-radius:60px; opacity:.78; animation:cloudDrift linear infinite; }
.cloud::before,.cloud::after { content:''; position:absolute; background:#fff; border-radius:50%; }
.cl1 { width:130px; height:42px; top:7%;  animation-duration:88s;  animation-delay:-22s; }
.cl1::before { width:72px; height:72px; top:-38px; left:14px; }
.cl1::after  { width:52px; height:52px; top:-26px; left:60px; }
.cl2 { width:90px;  height:30px; top:20%; animation-duration:130s; animation-delay:-70s; }
.cl2::before { width:52px; height:52px; top:-28px; left:10px; }
.cl2::after  { width:36px; height:36px; top:-18px; left:44px; }
.cl3 { width:170px; height:54px; top:11%; animation-duration:105s; animation-delay:-45s; }
.cl3::before { width:88px; height:88px; top:-50px; left:24px; }
.cl3::after  { width:66px; height:66px; top:-36px; left:84px; }
.cl4 { width:110px; height:36px; top:26%; animation-duration:75s;  animation-delay:-58s; }
.cl4::before { width:62px; height:62px; top:-34px; left:12px; }
.cl4::after  { width:44px; height:44px; top:-22px; left:52px; }
.cl5 { width:150px; height:48px; top:5%;  animation-duration:155s; animation-delay:-105s; }
.cl5::before { width:80px; height:80px; top:-44px; left:20px; }
.cl5::after  { width:58px; height:58px; top:-30px; left:74px; }
@keyframes cloudDrift { from{transform:translateX(-280px)} to{transform:translateX(calc(100vw + 280px))} }

/* ── TOP BAR ── */
#topbar { position:fixed; top:0; left:0; right:0; height:44px; z-index:300; display:flex; align-items:center; padding:0 12px; pointer-events:none; }
#coins { display:flex; align-items:center; gap:5px; background:rgba(0,0,0,.2); border-radius:20px; padding:4px 12px 4px 8px; color:#fff; font-size:15px; font-weight:700; pointer-events:all; }

/* ── WORLD BANNER ── */
.world-banner { position:fixed; top:44px; left:0; right:var(--pw); z-index:290; pointer-events:none; background:rgba(0,0,0,0.72); color:#fff; font-size:14px; font-weight:700; text-align:center; padding:8px 16px; animation:bannerFade 4s forwards; }
@keyframes bannerFade { 0%{opacity:0;transform:translateY(-10px)} 12%{opacity:1;transform:translateY(0)} 75%{opacity:1} 100%{opacity:0} }

/* ── RIGHT PANEL ── */
#panel { position:fixed; right:0; top:0; bottom:0; width:var(--pw); background:#8B5E3C; z-index:200; display:flex; flex-direction:row; transition:width .22s ease; overflow:hidden; }
#panel.resizing { transition:none !important; }
#panel-tab { width:24px; min-width:24px; background:#6e4626; cursor:ew-resize; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.55); font-size:13px; flex-shrink:0; z-index:1; }
#panel-tab:hover { background:#623e20; }
#panel-content { flex:1; overflow-y:auto; overflow-x:hidden; display:flex; flex-direction:column; min-width:0; padding-top:44px; }
.panel-label { color:rgba(255,255,255,.45); font-size:9px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; padding:12px 12px 5px; }
.panel-divider { height:1px; background:rgba(255,255,255,.1); margin:10px 0 2px; }

/* ── UPGRADE / ITEM CARDS ── */
.upgrade-card { margin:4px 10px; background:rgba(0,0,0,.15); border-radius:6px; padding:8px 10px; color:#fff; }
.upgrade-card.bought { opacity:.45; }
.ug-name { font-size:12px; font-weight:700; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ug-desc { font-size:10px; opacity:.6; margin-bottom:6px; line-height:1.35; }
.ug-bottom { display:flex; align-items:center; justify-content:space-between; gap:6px; }
.ug-cost { font-size:11px; opacity:.8; }
.ug-btn { background:#5A8A3C; color:#fff; border:none; border-radius:4px; padding:3px 10px; font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap; }
.ug-btn:hover:not(:disabled) { background:#4a7a2c; }
.ug-btn:disabled { background:rgba(0,0,0,.22); color:rgba(255,255,255,.35); cursor:default; }
.ug-btn.active { background:#3a6aac; }

/* ── SEED ROWS ── */
.seed-row { display:flex; align-items:center; gap:9px; padding:9px 12px; cursor:grab; color:#fff; }
.seed-row:hover { background:rgba(0,0,0,.12); }
.seed-row:active { cursor:grabbing; }
.seed-row .sr-icon { font-size:19px; line-height:1; }
.seed-row .sr-info { display:flex; flex-direction:column; }
.seed-row .sr-name { font-size:12px; font-weight:700; }
.seed-row .sr-meta { font-size:10px; opacity:.6; margin-top:1px; }

/* ── INVENTORY ── */
#inv-grid { display:flex; flex-wrap:wrap; gap:8px; padding:8px 12px 14px; }
.inv-icon { position:relative; width:42px; height:42px; background:rgba(0,0,0,.2); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:grab; }
.inv-icon:active { cursor:grabbing; }
.inv-badge { position:absolute; top:-5px; right:-5px; background:#b03020; color:#fff; font-size:9px; font-weight:700; border-radius:10px; padding:1px 4px; min-width:15px; text-align:center; line-height:13px; pointer-events:none; }
.inv-icon::after { content:attr(data-name); position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:rgba(0,0,0,.8); color:#fff; font-size:11px; padding:3px 8px; border-radius:4px; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .15s; z-index:999; }
.inv-icon:hover::after { opacity:1; }
#inv-empty { color:rgba(255,255,255,.28); font-size:11px; font-style:italic; padding:6px 12px; }
#panel.drop-hi { background:#7a5030; }

/* ── GAME AREA ── */
#game-area { position:fixed; top:44px; left:0; right:var(--pw); bottom:0; display:flex; align-items:center; justify-content:center; transition:right .22s ease; z-index:10; }
#grass { background:#5A8A3C; border-radius:10px; padding:22px; position:relative; z-index:2; }
#farm-grid { display:grid; grid-template-columns:repeat(3,100px); gap:3px; }

/* ── TILES ── */
.tile { width:100px; height:100px; background-color:#8B5E3C; background-image:radial-gradient(rgba(0,0,0,.13) 1px,transparent 1px),radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px),radial-gradient(rgba(0,0,0,.07) 1px,transparent 1px); background-size:9px 9px,14px 14px,6px 6px; background-position:0 0,5px 5px,2px 7px; border:2px solid #5A8A3C; border-radius:6px; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:default; }
.tile.ready { animation:gpulse 1.1s ease-in-out infinite; }
@keyframes gpulse { 0%,100%{border-color:#5A8A3C;box-shadow:none} 50%{border-color:#7FD160;box-shadow:0 0 7px rgba(127,209,96,.5)} }
.tile.drop-hi { background-color:#a07040; }
.tile.tile-watered { border-color:#4A9FD4; }
.tile.tile-caged { box-shadow:inset 0 0 0 2px rgba(160,160,200,.55); }
.tile.tile-drowned { filter:brightness(0.65); }
.tile.tile-weed { background-color:#3a6a20; cursor:pointer; }
.tile.tile-weed:hover { background-color:#4a7a28; }
.tile .t-icon  { font-size:36px; line-height:1; pointer-events:none; }
.tile .t-timer { font-size:11px; color:rgba(255,255,255,.85); font-weight:700; margin-top:3px; pointer-events:none; }
.tile .t-xbtn  { position:absolute; top:-13px; left:50%; transform:translateX(-50%); width:22px; height:22px; background:rgba(180,35,35,.9); color:#fff; border-radius:50%; font-size:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:10; }
.tile .t-cage-rm { position:absolute; top:-13px; right:2px; width:22px; height:22px; background:rgba(30,60,140,.9); color:#fff; border-radius:50%; font-size:11px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:10; }
.tile .t-cage-icon { position:absolute; bottom:2px; right:3px; font-size:12px; opacity:.7; pointer-events:none; }
.tile .t-water-icon { position:absolute; bottom:2px; left:3px; font-size:12px; opacity:.7; pointer-events:none; }
.tile .t-drown-icon { position:absolute; bottom:2px; left:3px; font-size:12px; pointer-events:none; }
.tile .t-fert-icon { position:absolute; top:2px; right:3px; font-size:11px; opacity:.85; pointer-events:none; }
.tile .t-weed-icon { font-size:36px; line-height:1; pointer-events:none; }
.tile .t-weed-count { font-size:11px; color:rgba(255,255,255,.85); font-weight:700; margin-top:3px; pointer-events:none; }

/* ── SELL BOX ── */
#sell-box { position:fixed; bottom:0; left:calc((100vw - var(--pw)) / 2); transform:translateX(-50%); z-index:250; min-width:200px; height:84px; background-color:#8B6343; background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 17px,rgba(0,0,0,.22) 17px,rgba(0,0,0,.22) 19px); border:2px solid #5a3d20; border-bottom:none; display:flex; align-items:center; justify-content:center; }
#sell-box.drop-hi { background-color:#a07848; }
#sell-box.iron { background-color:#3a424e; background-image:radial-gradient(circle at 8px 8px,#4a5460 5px,transparent 6px),radial-gradient(circle at calc(100% - 8px) 8px,#4a5460 5px,transparent 6px),radial-gradient(circle at 8px calc(100% - 8px),#4a5460 5px,transparent 6px),radial-gradient(circle at calc(100% - 8px) calc(100% - 8px),#4a5460 5px,transparent 6px),repeating-linear-gradient(to bottom,transparent 0,transparent 17px,rgba(0,0,0,.3) 17px,rgba(0,0,0,.3) 19px); border-color:#252c38; }
#sell-box.iron #sell-center { color:#a8bcc8; text-shadow:0 1px 3px rgba(0,0,0,.6); }
#sell-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:13px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:#f5e6ce; white-space:nowrap; pointer-events:none; }
#sell-queue-row { position:absolute; top:6px; left:50%; transform:translateX(-50%); display:flex; gap:2px; align-items:center; max-width:92%; flex-wrap:nowrap; overflow:hidden; }
.sq-icon { font-size:16px; line-height:1; cursor:grab; }
.sq-icon:active { cursor:grabbing; }
#sell-cd { position:absolute; bottom:7px; right:10px; font-size:10px; color:rgba(255,255,255,.5); pointer-events:none; }

/* ── CRANK ── */
#crank-box { position:fixed; bottom:0; height:84px; z-index:250; display:none; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:0 6px; }
#crank-label { font-size:12px; font-weight:700; color:#f5e6ce; text-shadow:0 1px 3px rgba(0,0,0,.5); white-space:nowrap; }
#crank-svg { cursor:pointer; display:block; filter:drop-shadow(0 3px 6px rgba(0,0,0,.4)); transform-origin:30px 30px; transition:filter .1s; }
#crank-svg:hover { filter:drop-shadow(0 3px 8px rgba(0,0,0,.55)) brightness(1.12); }
#crank-svg:active { filter:drop-shadow(0 1px 3px rgba(0,0,0,.35)) brightness(.88); }

/* ── WELL ── */
#well { position:fixed; bottom:20px; right:calc(var(--pw) + 20px); z-index:240; display:none; flex-direction:column; align-items:center; gap:4px; transition:right .22s ease; }
#well:hover { filter:brightness(1.1); }
#well.well-active svg { filter:drop-shadow(0 0 6px #4ab8ff); }
#well-label { font-size:11px; font-weight:700; color:#6cf; text-shadow:0 1px 3px rgba(0,0,0,.5); white-space:nowrap; }

/* ── LOG PANEL ── */
#log-panel { position:fixed; bottom:0; left:0; width:250px; max-height:164px; background:rgba(0,0,0,.48); border-radius:0 8px 0 0; z-index:190; display:flex; flex-direction:column; overflow:hidden; }
#log-inner { overflow-y:auto; flex:1; padding:5px 8px 6px; display:flex; flex-direction:column; gap:1px; }
#log-inner::-webkit-scrollbar { width:3px; }
#log-inner::-webkit-scrollbar-thumb { background:rgba(255,255,255,.2); border-radius:3px; }
.log-line { font-size:10.5px; color:rgba(255,255,255,.82); line-height:1.45; }

/* ── MODE INDICATOR ── */
#mode-ind { position:fixed; bottom:172px; left:8px; background:rgba(0,0,0,.65); color:#fff; font-size:11px; padding:4px 9px; border-radius:5px; display:none; z-index:270; pointer-events:none; }

/* ── LOOSE CROPS ── */
.loose-crop { position:fixed; font-size:30px; line-height:1; cursor:grab; z-index:50; transform:translate(-50%,-50%); pointer-events:all; filter:drop-shadow(0 2px 4px rgba(0,0,0,.3)); }
.loose-crop:active { cursor:grabbing; }

/* ── GHOST ── */
#ghost { position:fixed; pointer-events:none; z-index:9999; font-size:38px; line-height:1; transform:translate(-50%,-50%); display:none; }

/* ── FLOAT POP ── */
.fpop { position:fixed; pointer-events:none; z-index:9999; font-size:15px; font-weight:700; color:#FFD700; text-shadow:0 1px 4px rgba(0,0,0,.45); animation:floatUp 1.2s ease forwards; transform:translateX(-50%); white-space:nowrap; }
@keyframes floatUp { 0%{opacity:1;transform:translateX(-50%) translateY(0)} 100%{opacity:0;transform:translateX(-50%) translateY(-52px)} }

/* ── CROW ── */
.crow-anim { position:fixed; font-size:30px; z-index:9990; pointer-events:none; animation:crowFly 3s linear forwards; left:-60px; }
@keyframes crowFly { from{left:-60px} to{left:calc(100vw + 60px)} }

/* ── FERTILIZED TILE ── */
.tile.tile-fertilized { background-color:#6e3d18; }

/* ── TILE CONTEXT MENU ── */
#tile-menu { position:fixed; z-index:500; background:#5e3018; border:2px solid #3d2010; border-radius:6px; padding:5px; display:none; min-width:148px; }
.tmenu-btn { display:block; width:100%; background:rgba(0,0,0,.18); border:none; border-radius:4px; color:#f5e6ce; font-size:11px; font-weight:700; padding:6px 10px; cursor:pointer; text-align:left; white-space:nowrap; margin-bottom:3px; }
.tmenu-btn:last-child { margin-bottom:0; }
.tmenu-btn:hover { background:rgba(0,0,0,.35); }

/* ── IRON CRANK ── */
#crank-box.iron #crank-svg { filter:drop-shadow(0 3px 7px rgba(0,0,0,.55)) grayscale(.9) brightness(.72); }
#crank-box.iron #crank-svg:hover { filter:drop-shadow(0 3px 9px rgba(0,0,0,.65)) grayscale(.9) brightness(.88); }
#crank-box.iron #crank-svg:active { filter:drop-shadow(0 1px 3px rgba(0,0,0,.4)) grayscale(.9) brightness(.55); }
#crank-box.iron #crank-label { color:#b0bcc8; }
</style>
</head>
<body>

<div id="clouds">
  <div class="cloud cl1"></div><div class="cloud cl2"></div><div class="cloud cl3"></div>
  <div class="cloud cl4"></div><div class="cloud cl5"></div>
</div>

<div id="topbar">
  <div id="coins">🪙 <span id="coin-count">10</span></div>
</div>

<div id="panel">
  <div id="panel-tab"><span id="panel-arrow">›</span></div>
  <div id="panel-content">
    <div class="panel-label">Seeds</div>
    <div id="seeds-list"></div>
    <div class="panel-divider"></div>
    <div class="panel-label">Items</div>
    <div id="items-list"></div>
    <div class="panel-divider"></div>
    <div class="panel-label">Upgrades</div>
    <div id="upgrades-list"></div>
    <div class="panel-divider"></div>
    <div class="panel-label">Inventory</div>
    <div id="inv-grid"></div>
  </div>
</div>

<div id="game-area">
  <div id="grass"><div id="farm-grid"></div></div>
</div>

<div id="sell-box">
  <div id="sell-queue-row"></div>
  <div id="sell-center">SELL</div>
  <span id="sell-cd"></span>
</div>

<div id="crank-box">
  <div id="crank-label">⚙️ 1.00x</div>
  <svg id="crank-svg" viewBox="0 0 90 60" width="90" height="60" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="gearGrad" cx="38%" cy="33%" r="60%"><stop offset="0%" stop-color="#c8885a"/><stop offset="100%" stop-color="#6B4432"/></radialGradient>
      <radialGradient id="knobGrad" cx="35%" cy="30%" r="65%"><stop offset="0%" stop-color="#b07848"/><stop offset="100%" stop-color="#7B4E2A"/></radialGradient>
    </defs>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(0   30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(45  30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(90  30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(135 30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(180 30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(225 30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(270 30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(315 30 30)"/>
    <circle cx="30" cy="30" r="20" fill="url(#gearGrad)" stroke="#3d2010" stroke-width="2"/>
    <line x1="30" y1="13" x2="30" y2="47" stroke="rgba(0,0,0,.22)" stroke-width="2.5"/>
    <line x1="13" y1="30" x2="47" y2="30" stroke="rgba(0,0,0,.22)" stroke-width="2.5"/>
    <line x1="18" y1="18" x2="42" y2="42" stroke="rgba(0,0,0,.16)" stroke-width="2"/>
    <line x1="42" y1="18" x2="18" y2="42" stroke="rgba(0,0,0,.16)" stroke-width="2"/>
    <circle cx="30" cy="30" r="7" fill="#3d2010" stroke="#5a3d20" stroke-width="1.5"/>
    <circle cx="30" cy="30" r="3" fill="#6B4432"/>
    <rect x="50" y="26" width="22" height="8" rx="4" fill="#8B5E3C" stroke="#3d2010" stroke-width="2"/>
    <circle cx="74" cy="30" r="9" fill="url(#knobGrad)" stroke="#3d2010" stroke-width="2"/>
    <circle cx="71" cy="27" r="3" fill="rgba(255,255,255,.22)"/>
  </svg>
</div>

<div id="well">
  <svg viewBox="0 0 54 58" width="54" height="58" xmlns="http://www.w3.org/2000/svg" style="cursor:pointer">
    <ellipse cx="27" cy="49" rx="22" ry="6" fill="#6a6a6a"/>
    <rect x="5" y="30" width="44" height="19" fill="#888"/>
    <ellipse cx="27" cy="30" rx="22" ry="6" fill="#b8b8b8"/>
    <ellipse id="well-water" cx="27" cy="30" rx="15" ry="4" fill="#3A8FD4" opacity=".9"/>
    <rect x="9"  y="11" width="5" height="23" rx="2" fill="#8B6343" stroke="#5a3d20" stroke-width="1"/>
    <rect x="40" y="11" width="5" height="23" rx="2" fill="#8B6343" stroke="#5a3d20" stroke-width="1"/>
    <rect x="5"  y="8"  width="44" height="5" rx="2" fill="#6B4432"/>
    <polygon points="27,0 3,10 51,10" fill="#8B5E3C"/>
    <polygon points="27,1 4,10 50,10" fill="#7a5030" opacity=".4"/>
  </svg>
  <div id="well-label">💧 Full</div>
</div>

<div id="log-panel"><div id="log-inner"></div></div>
<div id="mode-ind"></div>
<div id="tile-menu"></div>
<div id="ghost"></div>

<script>
// ══════════════════════════════
// SEED DATA
// ══════════════════════════════
const SEEDS = {
  potato:    { name:'Potato',        icon:'🥔', seedIcon:'🌰', cost:2,   grow:15,  sell:6    },
  carrot:    { name:'Carrot',        icon:'🥕', seedIcon:'🌱', cost:4,   grow:45,   sell:12   },
  wheat:     { name:'Wheat',         icon:'🌾', seedIcon:'🌾', cost:8,   grow:90,   sell:25   },
  sunflower: { name:'Sunflower',     icon:'🌻', seedIcon:'🌻', cost:15,  grow:180,  sell:45   },
  pumpkin:   { name:'Pumpkin',       icon:'🎃', seedIcon:'🎃', cost:30,  grow:480,  sell:90   },
  chard:     { name:'Rainbow Chard', icon:'🌈', seedIcon:'🌿', cost:60,  grow:1200, sell:200  },
  moonbloom: { name:'Moonbloom',     icon:'🌕', seedIcon:'🌑', cost:120, grow:2700, sell:520  },
  starfruit: { name:'Starfruit',     icon:'⭐', seedIcon:'💫', cost:250, grow:7200, sell:1100 },
};

// ══════════════════════════════
// UPGRADE DATA
// ══════════════════════════════
const UPGRADES = [
  { id:'quickRoots',     name:'Quick Roots',          desc:'Crops grow 25% faster',                         cost:15,   type:'speed',        mult:0.75, chain:null           },
  { id:'goldenHarvest',  name:'Golden Harvest',        desc:'Crops sell for 50% more',                       cost:40,   type:'value',        mult:1.50, chain:null           },

// ══════════════════════════════
// SAVE / LOAD
// ══════════════════════════════
const KEY = 'blissfarm9';
const KEY_OLD = 'blissfarm8';

function save() {
  localStorage.setItem(KEY, JSON.stringify({ ...state, nextId, panelExpanded, panelWidth }));
}

function load() {
  try {
    let raw = localStorage.getItem(KEY);
    if (!raw) raw = localStorage.getItem(KEY_OLD); // fallback migration
    const d = JSON.parse(raw || 'null');
    if (!d) return;
    state.coins          = d.coins          ?? 10;
    state.coinsEarned    = d.coinsEarned    ?? 0;
    state.gameStartTime  = d.gameStartTime  ?? Date.now();
    state.milestones     = d.milestones     ?? {};
    state.mature         = d.mature         ?? false;
    state.tiles          = d.tiles          ?? Array(9).fill(null);
    state.inventory      = d.inventory      ?? {};
    // migrate sellQueue: string[] → [{seed,bonus}], add drowned flag
    state.sellQueue      = (d.sellQueue || []).map(item => {
      if (typeof item === 'string') return { seed: item, bonus: 1, drowned: false };
      return { seed: item.seed, bonus: item.bonus ?? 1, drowned: item.drowned ?? false };
    });
    state.sellNextAt     = d.sellNextAt     ?? 0;
    state.upgrades       = d.upgrades       ?? {};
    // migrate loose items: add drowned flag
    state.loose          = (d.loose || []).map(item => ({
      seed: item.seed, id: item.id, x: item.x, y: item.y,
      bonus: item.bonus ?? 1.0, drowned: item.drowned ?? false
    }));
    state.expanded       = d.expanded       ?? false;
    state.expandedBottom = d.expandedBottom ?? false;
    state.items          = d.items          ?? {};
    state.cageCount      = d.cageCount      ?? 0;
    state.cages          = d.cages          ?? [];
    state.wellFull       = d.wellFull       ?? true;
    state.wellRefillAt   = d.wellRefillAt   ?? 0;
    state.tilesWatered   = d.tilesWatered   ?? {};
    state.fertCharges    = d.fertCharges    ?? 0;
    state.weeds            = d.weeds            ?? {};
    state.fertilizedTiles  = d.fertilizedTiles  ?? {};
    state.firstWeedEver    = d.firstWeedEver    ?? false;
    state.firstCrowEver    = d.firstCrowEver    ?? false;
    nextId               = d.nextId         ?? 0;
    panelExpanded        = d.panelExpanded  ?? true;
    panelWidth           = d.panelWidth     ?? 220;
  } catch (_) {}
}

// ══════════════════════════════
// MULTIPLIERS
// ══════════════════════════════
function getGrowMult() {
  let m = 1;
  UPGRADES.forEach(u => { if (u.type === 'speed' && state.upgrades[u.id]) m *= u.mult; });
  return m;
}
function getSellMult() {
  let m = 1;
  UPGRADES.forEach(u => { if (u.type === 'value' && state.upgrades[u.id]) m *= u.mult; });
  return m;
}
function getSellSpeedMult() {
  let m = 1;
  UPGRADES.forEach(u => { if (u.type === 'sellSpeed' && state.upgrades[u.id]) m *= u.mult; });
  return m;
}
function getSellInterval() {
  return 10000 * getSellSpeedMult() / crankMult;
}
function getCrankClickMult() {
  return state.upgrades.crankUpI ? 1.025 : 1.015;
}

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function waterFactor(idx) {
  return (idx !== undefined && state.tilesWatered && state.tilesWatered[idx]) ? 0.75 : 1.0;
}
function fertFactor(idx) {
  return (idx !== undefined && state.fertilizedTiles && state.fertilizedTiles[idx]) ? 0.75 : 1.0;
}
function remSec(td, idx) {
  const gt = SEEDS[td.seed].grow * getGrowMult() * waterFactor(idx) * fertFactor(idx);
  return Math.max(0, gt - (Date.now() - td.plantedAt) / 1000);
}
function isReady(td, idx) { return remSec(td, idx) <= 0; }
function fmt(s) {
  if (s <= 0) return '0s';
  if (s < 1)  return s.toFixed(1) + 's';
  return Math.ceil(s) + 's';
}
function fmtElapsed(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h > 0) return `${h}h ${m}m ${sec}s`;
  if (m > 0) return `${m}m ${sec}s`;
  return `${sec}s`;
}

const logEntries = [];
function log(msg) {
  logEntries.push(msg);
  if (logEntries.length > 60) logEntries.shift();
  const inner = document.getElementById('log-inner');
  const line = document.createElement('div');

}

// ══════════════════════════════
// COINS & MILESTONES
// ══════════════════════════════
const MILESTONE_VALS = [100, 1000, 10000, 100000, 1000000];

function addCoins(amount) {
  state.coins += amount;
  state.coinsEarned = (state.coinsEarned || 0) + amount;
  checkMilestones();
  checkMaturity();
  updateCoins();
}

function checkMilestones() {
  MILESTONE_VALS.forEach(m => {
    if (state.coinsEarned >= m && !state.milestones[m]) {
      state.milestones[m] = true;
      const elapsed = Date.now() - state.gameStartTime;
      log(`⏱️ Reached 🪙${m.toLocaleString()} — ${fmtElapsed(elapsed)}`);
    }
  });
}

function checkMaturity() {
  if (!state.mature && state.coinsEarned >= 1000) {
    state.mature = true;
    log('🌿 The farm has matured. Nature has taken notice...');
    showBanner('🌿 The farm has matured. Nature is watching.');
    lastCrowCheck = Date.now();
    lastWeedCheck = Date.now();
  }
}

function updateCoins() {
  document.getElementById('coin-count').textContent = state.coins;
  renderUpgrades();
  renderItems();
  renderSeeds();
}

// ══════════════════════════════
// PROPORTIONAL GROW ADJUST
// ══════════════════════════════
function adjustGrowTimes(oldMult, newMult) {
  const now = Date.now();
  for (let i = 0; i < tileCount(); i++) {
    const td = state.tiles[i];
    if (!td) continue;
    const wf = waterFactor(i);
    const ff = fertFactor(i);
    const base = SEEDS[td.seed].grow;
    const oldGT = base * oldMult * wf * ff;
    const newGT = base * newMult * wf * ff;
    if (oldGT <= 0) continue;
    const elapsed     = (now - td.plantedAt) / 1000;
    const oldRem      = Math.max(0, oldGT - elapsed);
    const newRem      = oldRem * (newGT / oldGT);
    td.plantedAt      = now - (newGT - newRem) * 1000;
  }
}

// ══════════════════════════════
// GRID
// ══════════════════════════════
function tileCount() {
  if (state.expandedBottom) return 16;
  if (state.expanded) return 12;
  return 9;
}

function buildGrid() {
  const grid = document.getElementById('farm-grid');
  const cols = (state.expanded || state.expandedBottom) ? 4 : 3;
  const rows = state.expandedBottom ? 4 : 3;
  grid.style.gridTemplateColumns = `repeat(${cols}, 100px)`;
  grid.style.gridTemplateRows = `repeat(${rows}, 100px)`;
  while (state.tiles.length < tileCount()) state.tiles.push(null);
  grid.innerHTML = '';
  for (let i = 0; i < tileCount(); i++) {
    const el = document.createElement('div');
    el.className = 'tile'; el.dataset.idx = i;
    el.addEventListener('mousedown', onTileDown);
    grid.appendChild(el);
  }
}

// ══════════════════════════════
// TILE RENDER
// ══════════════════════════════
function renderTile(idx) {
  const el = [...tileEls()][idx];
  if (!el) return;
  el.innerHTML = '';
  el.className = 'tile';

  // Weed check — takes priority
  if (state.weeds && state.weeds[idx] !== undefined) {
    el.classList.add('tile-weed');
    const wIcon = mk('div','t-weed-icon'); wIcon.textContent = '🌿'; el.appendChild(wIcon);
    const wCount = mk('div','t-weed-count'); wCount.textContent = `${state.weeds[idx].clicks}/${WEED_CLICKS}`; el.appendChild(wCount);
    return;
  }

  const td           = state.tiles[idx];
  const isCaged      = state.cages && state.cages.includes(idx);
  const isWatered    = !!(state.tilesWatered && state.tilesWatered[idx]);
  const isFertilized = !!(state.fertilizedTiles && state.fertilizedTiles[idx]);

  if (isCaged)      el.classList.add('tile-caged');
  if (isFertilized) el.classList.add('tile-fertilized');

  if (!td) {
    if (isCaged)      { const c = mk('div','t-cage-icon'); c.textContent='🔒'; el.appendChild(c); }
    if (isFertilized) { const f = mk('div','t-fert-icon'); f.textContent='🌿'; el.appendChild(f); }
    return;
  }

  const rdy = isReady(td, idx);
  if (rdy) {
    el.classList.add('ready');
    // Only show watered border when NOT ready
  } else {
    if (isWatered) el.classList.add('tile-watered');
    if (td.drowned) el.classList.add('tile-drowned');
  }

  const icon = mk('div','t-icon'); icon.textContent = SEEDS[td.seed].icon; el.appendChild(icon);

  if (!rdy) {
    const timer = mk('div','t-timer'); timer.textContent = fmt(remSec(td, idx)); el.appendChild(timer);
    if (isWatered && !td.drowned) { const w = mk('div','t-water-icon'); w.textContent='💧'; el.appendChild(w); }
    if (td.drowned) { const d = mk('div','t-drown-icon'); d.textContent='💀'; el.appendChild(d); }

    if (selectedTile === idx) {
      const xb = mk('div','t-xbtn'); xb.textContent = '✕';
      xb.addEventListener('mousedown', e => {
        e.stopPropagation();
        state.tiles[idx] = null;
        if (state.tilesWatered) delete state.tilesWatered[idx];
        deselect(); renderTile(idx); save();
      });
      el.appendChild(xb);

      if (isCaged) {
        const cb = mk('div','t-cage-rm'); cb.textContent = '🔒'; cb.title = 'Remove cage';
        cb.addEventListener('mousedown', e => {
          e.stopPropagation();
          const ci = state.cages.indexOf(idx);
          if (ci !== -1) { state.cages.splice(ci, 1); state.cageCount = (state.cageCount||0) + 1; }
          renderTile(idx); renderItems(); log('🔒 Cage removed, returned to inventory'); save();
        });
        el.appendChild(cb);
      }
    }
  }

  if (isFertilized) { const f = mk('div','t-fert-icon'); f.textContent='🌿'; el.appendChild(f); }
  if (isCaged) { const c = mk('div','t-cage-icon'); c.textContent='🔒'; el.appendChild(c); }
}

function mk(tag, cls) { const el = document.createElement(tag); if (cls) el.className = cls; return el; }

function renderAllTiles() { for (let i = 0; i < tileCount(); i++) renderTile(i); }

function renderInventory() {
  const grid = document.getElementById('inv-grid');
  grid.innerHTML = '';
  const keys = Object.keys(state.inventory).filter(k => (state.inventory[k]||0) > 0);
  if (!keys.length) {
    const e = mk('div'); e.id = 'inv-empty'; e.textContent = 'Empty'; grid.appendChild(e); return;
  }
  keys.forEach(k => {
    const el = mk('div','inv-icon'); el.dataset.name = SEEDS[k].name;
    el.innerHTML = `<span style="pointer-events:none">${SEEDS[k].icon}</span><span class="inv-badge">${state.inventory[k]}</span>`;
    el.addEventListener('mousedown', e => {
      e.stopPropagation();
      if ((state.inventory[k]||0) < 1) return;

      if (state.inventory[k] <= 0) delete state.inventory[k];
      renderInventory(); save();
      startDrag(k, 'inventory'); moveGhost(e.clientX, e.clientY);
    });
    grid.appendChild(el);
  });
}

  cageCard.querySelector('.cage-buy-btn').addEventListener('click', e => {
    e.stopPropagation();

  const sorted = [...UPGRADES].sort((a,b) => a.cost - b.cost);
  sorted.forEach(u => {
    // Chain visibility: only show if chain is null or prerequisite is bought
    if (u.chain !== null && u.chain !== undefined && !state.upgrades[u.chain]) return;
    const bought    = !!state.upgrades[u.id];
    const canAfford = state.coins >= u.cost && !bought;
    const card = mk('div','upgrade-card' + (bought ? ' bought' : ''));
    card.innerHTML = `<div class="ug-name">${u.name}</div><div class="ug-desc">${u.desc}</div><div class="ug-bottom"><span class="ug-cost">🪙${u.cost}</span><button class="ug-btn"${bought||!canAfford?' disabled':''}>${bought?'Owned':'Buy'}</button></div>`;
    if (!bought) {
      card.querySelector('.ug-btn').addEventListener('click', e => {
        e.stopPropagation();
        if (state.upgrades[u.id] || state.coins < u.cost) return;
        if (u.type === 'speed') {
          const oldMult = getGrowMult();
          state.coins -= u.cost;
          state.upgrades[u.id] = true;
          adjustGrowTimes(oldMult, getGrowMult());
        } else {
          state.coins -= u.cost;
          state.upgrades[u.id] = true;
        }
        if (u.type === 'expand') {
          state.expanded = true; buildGrid(); renderAllTiles();
          showBanner('🌱 The farm has expanded.');
        }
        if (u.type === 'expandBottom') {
          state.expandedBottom = true; buildGrid(); renderAllTiles();
          showBanner('🌱 The farm has expanded.');
        }
        if (u.type === 'ironSellBox') {
          updateSellBoxStyle();
          showBanner('⚙️ The sell box has been reinforced with iron.');
        }
        log(`⬆️ ${u.name} purchased`);
        updateCoins();
        renderAllTiles();
        if (u.type === 'crank' || u.type === 'crankUpI') updateCrankDisplay();
        save();
      });
    }
    container.appendChild(card);
  });
}

// ══════════════════════════════
// SELL BOX
// ══════════════════════════════
function addToSellQueue(seed, bonus = 1.0, drowned = false) {
  state.sellQueue.push({ seed, bonus, drowned });
  if (state.sellQueue.length === 1) state.sellNextAt = Date.now() + getSellInterval();
  renderSellBox(); save();
}

function renderSellBox() {
  const qRow = document.getElementById('sell-queue-row');
  qRow.innerHTML = '';
  state.sellQueue.forEach((item, idx) => {
    const s = mk('span','sq-icon');
    s.textContent = SEEDS[item.seed].icon;
    s.addEventListener('mousedown', e => {
      if (drag) return;
      e.stopPropagation();
      state.sellQueue.splice(idx, 1);
      if (idx === 0 && state.sellQueue.length > 0) state.sellNextAt = Date.now() + getSellInterval();
      else if (state.sellQueue.length === 0)        state.sellNextAt = 0;
      renderSellBox(); save();
      startDrag(item.seed, 'sell-queue', item.bonus || 1.0, item.drowned || false);
      moveGhost(e.clientX, e.clientY);
    });
    qRow.appendChild(s);
  });
  updateSellTimer();
}

function updateSellTimer() {
  const cd = document.getElementById('sell-cd');
  if (!state.sellQueue.length || !state.sellNextAt) { cd.textContent = ''; return; }
  cd.textContent = fmt(Math.max(0, (state.sellNextAt - Date.now()) / 1000));
}

function tickSellBox() {
  if (!state.sellQueue.length) return;
  if (Date.now() >= state.sellNextAt) {
    const maxSell = state.upgrades.ironSellBox ? 2 : 1;
    let totalCoins = 0;
    let sold = 0;
    for (let s = 0; s < maxSell && state.sellQueue.length > 0; s++) {
      const item = state.sellQueue.shift();
      let coins;
      if (item.drowned) {
        coins = Math.round(SEEDS[item.seed].sell * (item.bonus || 1));
      } else {
        coins = Math.round(SEEDS[item.seed].sell * getSellMult() * (item.bonus || 1));
      }
      log(`${SEEDS[item.seed].icon} ${SEEDS[item.seed].name} sold for 🪙${coins}`);
      totalCoins += coins;
      sold++;
    }
    if (sold > 0) {
      const sb = document.getElementById('sell-box');
      const r  = sb.getBoundingClientRect();
      showPop('+🪙' + totalCoins, r.left + r.width / 2, r.top - 6);
      addCoins(totalCoins);
    }
    state.sellNextAt = state.sellQueue.length ? Date.now() + getSellInterval() : 0;
    renderSellBox(); save();
  }
}

// ══════════════════════════════
// WELL & WATERING
// ══════════════════════════════
function updateWell() {
  const well      = document.getElementById('well');
  const waterEl   = document.getElementById('well-water');
  const labelEl   = document.getElementById('well-label');
  if (!state.items || !state.items.wateringCan) { well.style.display = 'none'; return; }
  well.style.display = 'flex';
  if (state.wellFull) {
    waterEl.setAttribute('fill','#3A8FD4'); waterEl.setAttribute('opacity','0.9');
    labelEl.textContent = '💧 Full'; labelEl.style.color = '#6cf';
    well.style.cursor = 'pointer';
    well.classList.toggle('well-active', itemMode === 'water');
  } else {
    waterEl.setAttribute('fill','#888'); waterEl.setAttribute('opacity','0.3');
    const rem = Math.max(0, (state.wellRefillAt - Date.now()) / 1000);
    labelEl.textContent = fmt(rem); labelEl.style.color = 'rgba(255,255,255,.5)';
    well.style.cursor = 'default';
    well.classList.remove('well-active');
  }
}

function updateWellTick() {
  if (!state.items || !state.items.wateringCan) return;
  if (!state.wellFull && state.wellRefillAt && Date.now() >= state.wellRefillAt) {
    state.wellFull = true; state.wellRefillAt = 0;
    updateWell(); renderItems(); save();
    return;
  }
  // Just update the countdown label
  if (!state.wellFull) {
    const labelEl = document.getElementById('well-label');
    const rem = Math.max(0, (state.wellRefillAt - Date.now()) / 1000);
    labelEl.textContent = fmt(rem);
  }
}

document.getElementById('well').addEventListener('mousedown', e => {
  e.stopPropagation();
  if (!state.items || !state.items.wateringCan || !state.wellFull) return;
  itemMode = itemMode === 'water' ? null : 'water';
  updateModeIndicator(); updateWell();
});

function applyWater(idx) {
  const td = state.tiles[idx];
  if (!td || isReady(td, idx)) return;
  // If already watered → drown
  if (state.tilesWatered && state.tilesWatered[idx]) {
    drownTile(idx);
    return;
  }
  const baseGT   = SEEDS[td.seed].grow * getGrowMult() * fertFactor(idx);
  const newGT    = baseGT * 0.75;
  const elapsed  = (Date.now() - td.plantedAt) / 1000;
  const oldRem   = Math.max(0, baseGT - elapsed);
  const newRem   = oldRem * 0.75;
  td.plantedAt   = Date.now() - (newGT - newRem) * 1000;
  td.sellBonus   = 1.25;
  if (!state.tilesWatered) state.tilesWatered = {};
  state.tilesWatered[idx] = true;
  state.wellFull     = false;
  state.wellRefillAt = Date.now() + 20000;
  renderTile(idx); updateWell(); renderItems();
  log(`💧 ${SEEDS[td.seed].name} watered (+25% value, +25% speed)`);
  save();
}

function drownTile(idx) {
  const td = state.tiles[idx];
  if (!td) return;
  const growMult = getGrowMult();
  const base = SEEDS[td.seed].grow;
  const ff = fertFactor(idx);
  const currentGT = base * growMult * ff * 0.75; // was watered
  const drownedGT = base * growMult * ff;         // fertilized speed (water removed)
  const elapsed = (Date.now() - td.plantedAt) / 1000;
  const currentRem = Math.max(0, currentGT - elapsed);
  const newRem = currentRem * (drownedGT / currentGT);
  td.plantedAt = Date.now() - (drownedGT - newRem) * 1000;
  td.drowned = true;
  td.sellBonus = 0.25;
  delete state.tilesWatered[idx];
  state.wellFull = false;
  state.wellRefillAt = Date.now() + 20000;
  renderTile(idx); updateWell(); renderItems();
  log(`💀 ${SEEDS[td.seed].name} was drowned! Value severely reduced.`);
  save();
}

function updateModeIndicator() {
  const el = document.getElementById('mode-ind');

// LOOSE CROPS
// ══════════════════════════════
function dropLoose(seed, x, y, bonus = 1.0, drowned = false) {
  state.loose.push({ seed, id: nextId++, x, y, bonus, drowned });
  renderLoose(); save();
}

function renderLoose() {
  document.querySelectorAll('.loose-crop').forEach(el => el.remove());
  state.loose.forEach(item => {
    const el = mk('div','loose-crop');
    el.textContent = SEEDS[item.seed].icon;
    el.style.left = item.x + 'px'; el.style.top = item.y + 'px';
    el.dataset.id = item.id;
    el.addEventListener('mousedown', e => {
      e.stopPropagation();
      const i = state.loose.findIndex(g => g.id === item.id);
      if (i === -1) return;
      const s = state.loose[i].seed, b = state.loose[i].bonus || 1.0, dr = state.loose[i].drowned || false;
      state.loose.splice(i, 1); renderLoose(); save();
      startDrag(s, 'loose', b, dr); moveGhost(e.clientX, e.clientY);
    });
    document.body.appendChild(el);
  });
}

// ══════════════════════════════
// CROW
// ══════════════════════════════
function crowTick() {
  if (!state.mature) return;
  const now = Date.now();
  if (now - lastCrowCheck < 10000) return;
  lastCrowCheck = now;
  if (Math.random() < 0.05) crowAttack();
}

function crowAttack() {
  let target = null;
  if (state.loose.length > 0) {
    const sorted = [...state.loose].sort((a,b) => SEEDS[b.seed].sell - SEEDS[a.seed].sell);
    target = { type:'loose', item: sorted[0] };
  }
  if (!target) {
    const cands = [];
    for (let i = 0; i < tileCount(); i++) {
      if (!state.tiles[i] || !isReady(state.tiles[i], i)) continue;
      if (state.cages.includes(i) && Math.random() < 0.75) continue;
      cands.push(i);
    }
    if (cands.length) target = { type:'tile', idx: cands[Math.floor(Math.random()*cands.length)] };
  }
  if (!target) {
    const cands = [];
    for (let i = 0; i < tileCount(); i++) {
      if (!state.tiles[i] || isReady(state.tiles[i], i)) continue;
      if (state.cages.includes(i) && Math.random() < 0.75) continue;
      cands.push(i);
    }
    if (cands.length) target = { type:'tile', idx: cands[Math.floor(Math.random()*cands.length)] };
  }
  if (!target) return;

  if (!state.firstCrowEver) {
    state.firstCrowEver = true;
    showBanner('🐦‍⬛ A crow has found your farm.');
  }

  let cropName;
  if (target.type === 'loose') {
    cropName = SEEDS[target.item.seed].name;
    const i = state.loose.findIndex(l => l.id === target.item.id);
    if (i !== -1) state.loose.splice(i, 1);
    renderLoose();
  } else {
    cropName = SEEDS[state.tiles[target.idx].seed].name;
    state.tiles[target.idx] = null;
    if (state.tilesWatered) delete state.tilesWatered[target.idx];
    renderTile(target.idx);
  }
  log(`🐦 A crow snatched a ${cropName}!`);
  animateCrow(); save();
}

function animateCrow() {
  const el = mk('div','crow-anim');
  el.textContent = '🐦‍⬛';
  el.style.top = (15 + Math.random() * 55) + 'vh';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ══════════════════════════════
// WEEDS
// ══════════════════════════════
function weedTick() {
  if (!state.mature) return;
  const now = Date.now();
  if (now - lastWeedCheck < 8000) return;
  lastWeedCheck = now;
  if (Math.random() < 0.12) weedSpawn();
}

function weedSpawn() {
  const tc = tileCount();
  const empty = [];
  for (let i = 0; i < tc; i++) {
    if (!state.tiles[i] && !(state.weeds && state.weeds[i] !== undefined)) {
      empty.push(i);
    }
  }
  if (!empty.length) return;
  const idx = empty[Math.floor(Math.random() * empty.length)];
  if (!state.weeds) state.weeds = {};
  state.weeds[idx] = { clicks: 0 };
  if (!state.firstWeedEver) {
    state.firstWeedEver = true;
    showBanner('🌿 Weeds are beginning to appear.');
  }
  log('🌿 A weed sprouted!');
  renderTile(idx); save();
}

// SELECTION

function deselect() {
  if (selectedTile !== null) { const p = selectedTile; selectedTile = null; renderTile(p); }

// ══════════════════════════════
// TILE CONTEXT MENU
// ══════════════════════════════
function showTileMenu(idx, x, y) {
  const isCaged = state.cages && state.cages.includes(idx);
  const isFert  = !!(state.fertilizedTiles && state.fertilizedTiles[idx]);
  if (!isCaged && !isFert) return;
  const menu = document.getElementById('tile-menu');
  menu.innerHTML = '';
  if (isCaged) {
    const btn = mk('button');
    btn.className = 'tmenu-btn';
    btn.textContent = '🔓 Remove Cage';
    btn.addEventListener('mousedown', e => {
      e.stopPropagation();
      const ci = state.cages.indexOf(idx);
      if (ci !== -1) { state.cages.splice(ci, 1); state.cageCount = (state.cageCount||0) + 1; }
      renderTile(idx); renderItems();
      log('🔒 Cage removed, returned to inventory');
      save(); hideTileMenu();
    });
    menu.appendChild(btn);
  }
  if (isFert) {
    const btn = mk('button');
    btn.className = 'tmenu-btn';
    btn.textContent = '🌿 Remove Fertilizer';
    btn.addEventListener('mousedown', e => {
      e.stopPropagation();
      delete state.fertilizedTiles[idx];
      renderTile(idx); save(); hideTileMenu();
    });
    menu.appendChild(btn);
  }
  menu.style.left = Math.min(x, window.innerWidth  - 170) + 'px';
  menu.style.top  = Math.min(y, window.innerHeight - 90)  + 'px';
  menu.style.display = 'block';
}
function hideTileMenu() {
  document.getElementById('tile-menu').style.display = 'none';
}

// ══════════════════════════════
// TILE INTERACTION
// ══════════════════════════════
function onTileDown(e) {
  const idx = parseInt(e.currentTarget.dataset.idx);

  // Weed click — highest priority
  if (state.weeds && state.weeds[idx] !== undefined) {
    e.stopPropagation();
    state.weeds[idx].clicks++;
    if (state.weeds[idx].clicks >= WEED_CLICKS) {
      delete state.weeds[idx];
      log('✅ Weed cleared!');
    }
    renderTile(idx); save();
    return;
  }

  const td = state.tiles[idx];

  if (itemMode === 'water') {
    e.stopPropagation();
    if (td && !isReady(td, idx)) applyWater(idx);
    itemMode = null; updateModeIndicator(); updateWell();
    return;
  }
  if (itemMode === 'cage') {
    e.stopPropagation();
    if (!state.cages.includes(idx) && state.cageCount > 0) {
      state.cages.push(idx); state.cageCount--;
      renderTile(idx); renderItems(); save();
    }
    itemMode = null; updateModeIndicator();
    return;
  }
  if (itemMode === 'fertilizer') {
    e.stopPropagation();
    const alreadyFert = !!(state.fertilizedTiles && state.fertilizedTiles[idx]);
    if (state.fertCharges > 0 && !alreadyFert) {
      if (!state.fertilizedTiles) state.fertilizedTiles = {};
      state.fertilizedTiles[idx] = true;
      state.fertCharges--;
      // If a crop is actively growing, proportionally speed it up
      if (td && !isReady(td, idx)) {
        const growMult = getGrowMult();
        const wf = waterFactor(idx);
        const base = SEEDS[td.seed].grow;
        const oldGT = base * growMult * wf;
        const newGT = oldGT * 0.75;
        const elapsed = (Date.now() - td.plantedAt) / 1000;
        const oldRem = Math.max(0, oldGT - elapsed);
        const newRem = oldRem * 0.75;
        td.plantedAt = Date.now() - (newGT - newRem) * 1000;
      }
      log(`🌿 Plot fertilized — all future crops here grow faster`);
      renderTile(idx); renderItems(); save();
    }
    itemMode = null; updateModeIndicator();
    return;
  }

  if (!td) {
    deselect();
    const _caged = state.cages && state.cages.includes(idx);
    const _fert  = !!(state.fertilizedTiles && state.fertilizedTiles[idx]);
    if (_caged || _fert) showTileMenu(idx, e.clientX + 4, e.clientY + 4);
    return;
  }

  if (isReady(td, idx)) {
    e.stopPropagation();
    const seed    = td.seed;
    const bonus   = td.sellBonus || 1.0;
    const drowned = td.drowned || false;
    state.tiles[idx] = null;
    if (state.tilesWatered) delete state.tilesWatered[idx];
    renderTile(idx); save();
    log(`${SEEDS[seed].icon} ${SEEDS[seed].name} harvested`);
    startDrag(seed, 'tile', bonus, drowned); moveGhost(e.clientX, e.clientY);
    return;
  }

  e.stopPropagation();
  if (selectedTile === idx) deselect();
  else { deselect(); selectedTile = idx; renderTile(idx); }
}

// ══════════════════════════════
// PANEL TOGGLE & RESIZE
// ══════════════════════════════
function applyPanelState() {
  const w = panelExpanded ? panelWidth + 'px' : '24px';
  document.body.style.setProperty('--pw', w);
  document.getElementById('panel-arrow').textContent = panelExpanded ? '›' : '‹';
  if (state.upgrades.windUpCrank) positionCrank();
}

const panelTabEl = document.getElementById('panel-tab');
const panelEl    = document.getElementById('panel');

panelTabEl.addEventListener('mousedown', e => {
  resizing = true; resizeStartX = e.clientX; resizeStartW = panelWidth; resizeMoved = false;
  panelEl.classList.add('resizing'); e.preventDefault(); e.stopPropagation();
});

// ══════════════════════════════
// GLOBAL MOUSE
// ══════════════════════════════
document.addEventListener('mousemove', e => {
  if (resizing) {
    const dx = resizeStartX - e.clientX;
    if (Math.abs(dx) > 4) resizeMoved = true;
    if (resizeMoved && panelExpanded) {
      panelWidth = Math.max(160, Math.min(400, resizeStartW + dx));
      document.body.style.setProperty('--pw', panelWidth + 'px');
      if (state.upgrades.windUpCrank) positionCrank();
    }
    return;
  }
  if (!drag) return;
  moveGhost(e.clientX, e.clientY);
  clearHighlights();
  const panel   = document.getElementById('panel');
  const sellBox = document.getElementById('sell-box');
  if (drag.source === 'shop') {
    tileEls().forEach(t => {
      const i = parseInt(t.dataset.idx);
      if (!state.tiles[i] && !(state.weeds && state.weeds[i] !== undefined) && hit(e.clientX, e.clientY, t)) t.classList.add('drop-hi');
    });
  } else {
    if (hit(e.clientX, e.clientY, sellBox))                           sellBox.classList.add('drop-hi');
    else if (panelExpanded && hit(e.clientX, e.clientY, panel))       panel.classList.add('drop-hi');
  }
});

document.addEventListener('mouseup', e => {
  if (resizing) {
    resizing = false; panelEl.classList.remove('resizing');
    if (!resizeMoved) { panelExpanded = !panelExpanded; applyPanelState(); }
    save(); return;
  }
  if (!drag) return;
  const { seed, source, bonus, drowned } = drag;
  const panel   = document.getElementById('panel');
  const sellBox = document.getElementById('sell-box');

  if (source === 'shop') {
    let planted = false;
    tileEls().forEach(t => {
      if (planted) return;
      const i = parseInt(t.dataset.idx);
      if (!state.tiles[i] && !(state.weeds && state.weeds[i] !== undefined) && hit(e.clientX, e.clientY, t)) {
        const cost = SEEDS[seed].cost;
        if (state.coins >= cost) {
          state.coins -= cost;
          state.tiles[i] = { seed, plantedAt: Date.now() };
          updateCoins(); renderTile(i); save();
        }
        planted = true;
      }
    });
  } else {
    if (hit(e.clientX, e.clientY, sellBox)) {
      addToSellQueue(seed, bonus || 1.0, drowned || false);
    } else if (panelExpanded && hit(e.clientX, e.clientY, panel)) {
      addInventory(seed); renderInventory(); save();
    } else {
      dropLoose(seed, e.clientX, e.clientY, bonus || 1.0, drowned || false);
    }
  }
  endDrag();
});

document.addEventListener('mousedown', () => { if (!drag && !resizing) deselect(); hideTileMenu(); });
window.addEventListener('resize', () => {
  if (state.upgrades.windUpCrank) positionCrank();
});

// ══════════════════════════════
// FLOAT POP
// ══════════════════════════════
function showPop(text, x, y) {
  const el = mk('div','fpop'); el.textContent = text;
  el.style.left = x + 'px'; el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1250);

// ══════════════════════════════
// FAST TIMER UPDATE (50ms)
// ══════════════════════════════
function updateTimers() {
  const els = [...tileEls()];
  for (let i = 0; i < tileCount(); i++) {
    const td = state.tiles[i];
    if (!td) continue;
    const wasReady = prevReadyState[i] || false;
    const nowReady = isReady(td, i);
    if (!wasReady && nowReady) {
      // Transition: growing → ready — do full re-render
      prevReadyState[i] = true;
      renderTile(i);
    } else if (!nowReady) {
      // Still growing — just update timer text
      const el = els[i];
      if (!el) continue;
      const timerEl = el.querySelector('.t-timer');
      if (timerEl) timerEl.textContent = fmt(remSec(td, i));
      prevReadyState[i] = false;
    }
    // If already ready and was already ready — no action needed
  }
}

// ══════════════════════════════
// GAME LOOPS
// ══════════════════════════════

// 50ms loop — timers, sell timer, crank label, well countdown, sell box tick
setInterval(() => {
  updateTimers();
  updateSellTimer();
  updateCrankLabel();
  updateWellTick();
  tickSellBox();
}, 50);

// 1000ms loop — full tile render, crank decay, crow, weeds
setInterval(() => {
  renderAllTiles();
  // Crank decay
  if (state.upgrades.windUpCrank && crankMult > 1.0) {
    const excess = crankMult - 1;
    crankMult = Math.max(1.0, 1 + excess / (1 + excess * 0.08));
    updateCrankLabel();
  }
  crowTick();
  weedTick();
}, 1000);

setInterval(save, 10000);

// ══════════════════════════════
// INIT
// ══════════════════════════════
load();
lastCrowCheck = Date.now();
lastWeedCheck = Date.now();
buildGrid();
renderAllTiles();
renderInventory();
renderSeeds();
renderItems();
renderUpgrades();
renderSellBox();
renderLoose();
updateCoins();
applyPanelState();
updateCrankDisplay();
updateWell();
updateModeIndicator();
updateSellBoxStyle();
// Init prevReadyState
for (let i = 0; i < tileCount(); i++) {
  const td = state.tiles[i];
  prevReadyState[i] = td ? isReady(td, i) : false;
}
</script>
</body>
</html>

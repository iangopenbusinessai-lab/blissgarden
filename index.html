}

// ══════════════════════════════
// TILE CONTEXT MENU
// ══════════════════════════════
function showTileMenu(idx, x, y) {
  const isCaged = state.cages && state.cages.includes(idx);
  const isFert  = !!(state.fertilizedTiles && state.fertilizedTiles[idx]);
  if (!isCaged && !isFert) return;
  const menu = document.getElementById('tile-menu');
  menu.innerHTML = '';
  if (isCaged) {
    const btn = mk('button'); btn.className = 'tmenu-btn'; btn.textContent = '🔓 Remove Cage';
    btn.addEventListener('mousedown', e => {
      e.stopPropagation();
      const ci = state.cages.indexOf(idx);
      if (ci !== -1) { state.cages.splice(ci, 1); state.cageCount = (state.cageCount||0) + 1; }
      renderTile(idx); renderItems(); log('🔒 Cage removed, returned to inventory'); save(); hideTileMenu();
    });
    menu.appendChild(btn);
  }
  if (isFert) {
    const btn = mk('button'); btn.className = 'tmenu-btn'; btn.textContent = '🌿 Remove Fertilizer';
    btn.addEventListener('mousedown', e => {
      e.stopPropagation();
      delete state.fertilizedTiles[idx];
      renderTile(idx); save(); hideTileMenu();
    });
    menu.appendChild(btn);
  }
  menu.style.left = Math.min(x, window.innerWidth  - 170) + 'px';
  menu.style.top  = Math.min(y, window.innerHeight - 90)  + 'px';
  menu.style.display = 'block';
}
function hideTileMenu() { document.getElementById('tile-menu').style.display = 'none'; }

function showRotCureMenu(idx, cost, x, y) {
  const menu = document.getElementById('tile-menu');
  menu.innerHTML = '';
  const header = mk('div');
  header.style.cssText = 'color:rgba(255,180,60,.8);font-size:10px;font-weight:700;padding:4px 8px 2px';
  header.textContent = '🍂 Root Rot — cure or harvest fast';
  menu.appendChild(header);
  const btn = mk('button'); btn.className = 'tmenu-btn';
  btn.textContent = `💊 Cure — 🪙${cost}`;
  if (state.coins < cost) { btn.disabled = true; btn.style.opacity = '0.4'; }
  btn.addEventListener('mousedown', e => {
    e.stopPropagation();
    const td = state.tiles[idx];
    if (!td || state.coins < cost) return;
    state.coins -= cost;
    const oldRF = rotFactor(idx);
    delete state.rotTiles[idx];
    const newRF = rotFactor(idx);
    if (oldRF !== newRF) {
      const base = SEEDS[td.seed].grow, gm = getGrowMult(), wf = waterFactor(idx), ff = fertFactor(idx);
      const oldGT = base * gm * wf * ff * oldRF;
      const newGT = base * gm * wf * ff * newRF;
      if (oldGT > 0) {
        const elapsed = (Date.now() - td.plantedAt) / 1000;
        const oldRem = Math.max(0, oldGT - elapsed);
        const newRem = oldRem * (newGT / oldGT);
        td.plantedAt = Date.now() - (newGT - newRem) * 1000;
      }
    }
    log('💊 Root rot cured.');
    updateCoins(); renderTile(idx); save(); hideTileMenu();
  });
  menu.appendChild(btn);
  menu.style.left = Math.min(x, window.innerWidth  - 200) + 'px';
  menu.style.top  = Math.min(y, window.innerHeight - 80)  + 'px';
  menu.style.display = 'block';
}

function showFungalCureMenu(idx, cost, x, y) {
  const menu = document.getElementById('tile-menu');
  menu.innerHTML = '';
  const header = mk('div');
  header.style.cssText = 'color:rgba(190,100,255,.9);font-size:10px;font-weight:700;padding:4px 8px 2px';
  header.textContent = '🍄 Fungal Bloom';
  menu.appendChild(header);
  const btn = mk('button'); btn.className = 'tmenu-btn';
  btn.textContent = `🧹 Clear — 🪙${cost}`;
  if (state.coins < cost) { btn.disabled = true; btn.style.opacity = '0.4'; }
  btn.addEventListener('mousedown', e => {
    e.stopPropagation();
    if (state.coins < cost) return;
    state.coins -= cost;
    if (state.fungalTiles) delete state.fungalTiles[idx];
    if (state.tiles[idx]) {
      state.tiles[idx] = null;
      if (state.tilesWatered) delete state.tilesWatered[idx];
      if (state.rotTiles)     delete state.rotTiles[idx];
    }
    log('✅ Fungal tile cleared.');
    updateCoins(); renderTile(idx); save(); hideTileMenu();
  });
  menu.appendChild(btn);
  menu.style.left = Math.min(x, window.innerWidth  - 200) + 'px';
  menu.style.top  = Math.min(y, window.innerHeight - 80)  + 'px';
  menu.style.display = 'block';
}

// ══════════════════════════════
// TILE INTERACTION
// ══════════════════════════════
function onTileDown(e) {
  const idx = parseInt(e.currentTarget.dataset.idx);

  if (state.rotTiles && state.rotTiles[idx] && state.rotTiles[idx].deadAt !== undefined) {
    e.stopPropagation();
    return;
  }

  if (state.mounds && state.mounds[idx] !== undefined) {
    e.stopPropagation();
    state.mounds[idx] = Math.min(state.mounds[idx], Date.now() + 5000);
    renderTile(idx); save();
    return;
  }

  if (state.thornedWeeds && state.thornedWeeds[idx] !== undefined) {
    e.stopPropagation();
    state.thornedWeeds[idx].clicks++;
    if (state.thornedWeeds[idx].clicks >= THORNED_WEED_CLICKS) {
      delete state.thornedWeeds[idx];
      log('✅ Thorned weed cleared!');
    }
    renderTile(idx); save();
    return;
  }

  if (state.weeds && state.weeds[idx] !== undefined) {
    e.stopPropagation();
    state.weeds[idx].clicks++;
    if (state.weeds[idx].clicks >= WEED_CLICKS) {
      delete state.weeds[idx];
      log('✅ Weed cleared!');
    }
    renderTile(idx); save();
    return;
  }

  const td = state.tiles[idx];

  const _isFungal = !!(state.fungalTiles && state.fungalTiles[idx] !== undefined);

  if (!td) {
    deselect();
    const _caged = state.cages && state.cages.includes(idx);
    const _fert  = !!(state.fertilizedTiles && state.fertilizedTiles[idx]);
    if (_caged || _fert) showTileMenu(idx, e.clientX + 4, e.clientY + 4);
    else if (_isFungal) showFungalCureMenu(idx, 50, e.clientX + 4, e.clientY + 4);
    return;
  }

  if (isReady(td, idx)) {
    e.stopPropagation();
    const seed    = td.seed;
    const rotInf  = !!(state.rotTiles && state.rotTiles[idx] && state.rotTiles[idx].infectedAt !== undefined && state.rotTiles[idx].deadAt === undefined);
    const bonus   = rotInf ? 0.5 : (td.sellBonus || 1.0);
    const drowned = rotInf || (td.drowned || false);
    if (state.rotTiles) delete state.rotTiles[idx];
    state.tiles[idx] = null;
    if (state.tilesWatered) delete state.tilesWatered[idx];
    renderTile(idx); save();
    log(`${SEEDS[seed].icon} ${SEEDS[seed].name} harvested${_isFungal ? ' (fungal — 0 coins)' : ''}`);
    if (rotInf) log('🍂 Infected — sells for 50% base value');
    startDrag(seed, 'tile', bonus, drowned, _isFungal); moveGhost(e.clientX, e.clientY);
    return;
  }

  e.stopPropagation();
  if (selectedTile === idx) deselect();
  else { deselect(); selectedTile = idx; renderTile(idx); }

  // Show cure menu if tile is rot-infected
  if (state.rotTiles && state.rotTiles[idx] && state.rotTiles[idx].infectedAt !== undefined && state.rotTiles[idx].deadAt === undefined) {
    const baseCost  = Math.ceil(SEEDS[td.seed].sell * 0.10);
    const cureCost  = state.upgrades.fastCure ? Math.ceil(baseCost * 0.40) : baseCost;
    if (state.upgrades.fastCure) {
      if (state.coins >= cureCost) {
        state.coins -= cureCost;
        const oldRF = rotFactor(idx);
        delete state.rotTiles[idx];
        const newRF = rotFactor(idx);
        if (oldRF !== newRF) {
          const base = SEEDS[td.seed].grow, gm = getGrowMult(), wf = waterFactor(idx), ff = fertFactor(idx);
          const oldGT = base * gm * wf * ff * oldRF, newGT = base * gm * wf * ff * newRF;
          if (oldGT > 0) {
            const elapsed = (Date.now() - td.plantedAt) / 1000;
            const oldRem = Math.max(0, oldGT - elapsed);
            td.plantedAt = Date.now() - (newGT - oldRem * (newGT / oldGT)) * 1000;
          }
        }
        log('💊 Root rot cured.');
        updateCoins(); renderTile(idx); save();
      } else {
        log(`💊 Need 🪙${cureCost} to cure root rot.`);
      }
    } else {
      showRotCureMenu(idx, cureCost, e.clientX + 4, e.clientY + 4);
    }
  } else if (_isFungal) {
    const clearCost = Math.ceil(SEEDS[td.seed].sell * 0.10);
    showFungalCureMenu(idx, clearCost, e.clientX + 4, e.clientY + 4);
  }
}

// ══════════════════════════════
// PANEL TOGGLE & RESIZE
// ══════════════════════════════
function applyPanelState() {
  const w = panelExpanded ? panelWidth + 'px' : '24px';
  document.body.style.setProperty('--pw', w);
  document.getElementById('panel-arrow').textContent = panelExpanded ? '›' : '‹';
  if (state.upgrades.windUpCrank) positionCrank();
}

const panelTabEl = document.getElementById('panel-tab');
const panelEl    = document.getElementById('panel');

panelTabEl.addEventListener('mousedown', e => {
  resizing = true; resizeStartX = e.clientX; resizeStartW = panelWidth; resizeMoved = false;
  panelEl.classList.add('resizing'); e.preventDefault(); e.stopPropagation();
});

// ══════════════════════════════
// GLOBAL MOUSE
// ══════════════════════════════
document.addEventListener('mousemove', e => {
  if (resizing) {
    const dx = resizeStartX - e.clientX;
    if (Math.abs(dx) > 4) resizeMoved = true;
    if (resizeMoved && panelExpanded) {
      panelWidth = Math.max(160, Math.min(400, resizeStartW + dx));
      document.body.style.setProperty('--pw', panelWidth + 'px');
      if (state.upgrades.windUpCrank) positionCrank();
    }
    return;
  }
  if (!drag) return;
  moveGhost(e.clientX, e.clientY);
  clearHighlights();
  const panel   = document.getElementById('panel');
  const sellBox = document.getElementById('sell-box');
  if (drag.source === 'shop' || drag.source === 'seedInventory') {
    tileEls().forEach(t => {
      const i = parseInt(t.dataset.idx);
      if (!state.tiles[i] && !(state.weeds && state.weeds[i] !== undefined) && !(state.thornedWeeds && state.thornedWeeds[i] !== undefined) && !(state.mounds && state.mounds[i] !== undefined) && !(state.rotTiles && state.rotTiles[i] && state.rotTiles[i].deadAt !== undefined) && hit(e.clientX, e.clientY, t))
        t.classList.add('drop-hi');
    });
  } else if (drag.source === 'item') {
    tileEls().forEach(t => {
      if (!hit(e.clientX, e.clientY, t)) return;
      const i = parseInt(t.dataset.idx);
      const weed = (state.weeds && state.weeds[i] !== undefined) || (state.thornedWeeds && state.thornedWeeds[i] !== undefined) || (state.mounds && state.mounds[i] !== undefined) || (state.rotTiles && state.rotTiles[i] && state.rotTiles[i].deadAt !== undefined);
      if (weed) return;
      const td = state.tiles[i];
      const it = drag.itemType;
      let valid = false;
      if (it === 'water')       valid = !!(td && !isReady(td, i));
      if (it === 'cage')        valid = !state.cages.includes(i);
      if (it === 'fertilizer')  valid = !(state.fertilizedTiles && state.fertilizedTiles[i]);
      if (it === 'uncommonFert')valid = !(state.uncommonFertilizedTiles && state.uncommonFertilizedTiles[i]);
      if (valid) t.classList.add('drop-hi');
    });
  } else {
    if (hit(e.clientX, e.clientY, sellBox))                          sellBox.classList.add('drop-hi');
    else if (panelExpanded && hit(e.clientX, e.clientY, panel))      panel.classList.add('drop-hi');
  }
});

document.addEventListener('mouseup', e => {
  if (resizing) {
    resizing = false; panelEl.classList.remove('resizing');
    if (!resizeMoved) { panelExpanded = !panelExpanded; applyPanelState(); }
    save(); return;
  }
  if (!drag) return;
  const { seed, source, bonus, drowned } = drag;
  const panel   = document.getElementById('panel');
  const sellBox = document.getElementById('sell-box');

  if (source === 'item') {
    const it = drag.itemType;
    let applied = false;
    tileEls().forEach(t => {
      if (applied) return;
      if (!hit(e.clientX, e.clientY, t)) return;
      const i = parseInt(t.dataset.idx);
      if ((state.weeds && state.weeds[i] !== undefined) || (state.thornedWeeds && state.thornedWeeds[i] !== undefined) || (state.mounds && state.mounds[i] !== undefined) || (state.rotTiles && state.rotTiles[i] && state.rotTiles[i].deadAt !== undefined)) return;
      const td = state.tiles[i];

      if (it === 'water') {
        if (td && !isReady(td, i)) { applyWater(i); applied = true; }

      } else if (it === 'cage') {
        if (!state.cages.includes(i)) {
          state.cages.push(i);
          log('🔒 Cage placed on tile');
          renderTile(i); renderInventory(); renderItems(); save();
          applied = true;
        }

      } else if (it === 'fertilizer') {
        if (!(state.fertilizedTiles && state.fertilizedTiles[i])) {
          if (!state.fertilizedTiles) state.fertilizedTiles = {};
          const oldFF = fertFactor(i);
          state.fertilizedTiles[i] = true;
          const newFF = fertFactor(i);
          if (td && !isReady(td, i)) {
            const base = SEEDS[td.seed].grow, gm = getGrowMult(), wf = waterFactor(i);
            const oldGT = base * gm * wf * oldFF, newGT = base * gm * wf * newFF;
            if (oldGT > 0) {
              const el2 = (Date.now() - td.plantedAt) / 1000;
              const newRem = Math.max(0, oldGT - el2) * (newGT / oldGT);
              td.plantedAt = Date.now() - (newGT - newRem) * 1000;
            }
          }
          log('🌿 Plot fertilized — crops grow 25% faster here');
          renderTile(i); renderInventory(); renderItems(); save();
          applied = true;
        }

      } else if (it === 'uncommonFert') {
        if (!(state.uncommonFertilizedTiles && state.uncommonFertilizedTiles[i])) {
          if (!state.uncommonFertilizedTiles) state.uncommonFertilizedTiles = {};
          const oldFF = fertFactor(i);
          state.uncommonFertilizedTiles[i] = true;
          const newFF = fertFactor(i);
          if (td && !isReady(td, i)) {
            const base = SEEDS[td.seed].grow, gm = getGrowMult(), wf = waterFactor(i);
            const oldGT = base * gm * wf * oldFF, newGT = base * gm * wf * newFF;
            if (oldGT > 0) {
              const el2 = (Date.now() - td.plantedAt) / 1000;
              const newRem = Math.max(0, oldGT - el2) * (newGT / oldGT);
              td.plantedAt = Date.now() - (newGT - newRem) * 1000;
            }
          }
          log('⚗️ Plot uncommon fertilized — crops grow 40% faster here');
          renderTile(i); renderInventory(); renderItems(); save();
          applied = true;
        }
      }
    });

    // Return item to inventory on invalid/missed drop
    if (!applied) {
      if (it === 'water')        state.canCharges++;
      else if (it === 'cage')    state.cageCount++;
      else if (it === 'fertilizer')   state.fertCharges++;
      else if (it === 'uncommonFert') state.uncommonFertCharges++;
      renderInventory(); renderItems();
    }
    endDrag(); return;
  }

  if (source === 'seedInventory') {
    // Drag seed from inventory → drop on empty tile to plant (free, cost already paid)
    let planted = false;
    tileEls().forEach(t => {
      if (planted) return;
      const i = parseInt(t.dataset.idx);
      if (!state.tiles[i] && !(state.weeds && state.weeds[i] !== undefined) && !(state.thornedWeeds && state.thornedWeeds[i] !== undefined) && !(state.mounds && state.mounds[i] !== undefined) && !(state.rotTiles && state.rotTiles[i] && state.rotTiles[i].deadAt !== undefined) && hit(e.clientX, e.clientY, t)) {
        state.tiles[i] = { seed, plantedAt: Date.now() };
        renderTile(i); save();
        log(`🌱 Planted ${SEEDS[seed].name}`);
        planted = true;
      }
    });
    if (!planted) {
      // Return to seed inventory
      if (!state.seedInventory) state.seedInventory = {};
      state.seedInventory[seed] = (state.seedInventory[seed] || 0) + 1;
      renderInventory(); save();
    }
  } else if (source === 'shop') {
    // Legacy path — shop drag no longer triggered but kept for safety
    let planted = false;
    tileEls().forEach(t => {
      if (planted) return;
      const i = parseInt(t.dataset.idx);
      if (!state.tiles[i] && !(state.weeds && state.weeds[i] !== undefined) && !(state.thornedWeeds && state.thornedWeeds[i] !== undefined) && !(state.mounds && state.mounds[i] !== undefined) && !(state.rotTiles && state.rotTiles[i] && state.rotTiles[i].deadAt !== undefined) && hit(e.clientX, e.clientY, t)) {
        const cost = SEEDS[seed].cost || 0;
        if (state.coins >= cost) {
          state.coins -= cost;
          state.tiles[i] = { seed, plantedAt: Date.now() };
          updateCoins(); renderTile(i); save();
        }
        planted = true;
      }
    });
  } else {
    if (hit(e.clientX, e.clientY, sellBox)) {
      addToSellQueue(seed, bonus || 1.0, drowned || false, drag.fungal || false);
    } else if (panelExpanded && hit(e.clientX, e.clientY, panel)) {
      addInventory(seed); renderInventory(); save();
    } else {
      dropLoose(seed, e.clientX, e.clientY, bonus || 1.0, drowned || false, drag.fungal || false);
    }
  }
  endDrag();
});

document.addEventListener('mousedown', () => { if (!drag && !resizing) deselect(); hideTileMenu(); });
window.addEventListener('resize', () => {
  if (state.upgrades.windUpCrank) positionCrank();
});

function showPop(text, x, y) {

// ══════════════════════════════
// FAST TIMER UPDATE (50ms)
// ══════════════════════════════
function updateTimers() {
  const els = [...tileEls()];
  for (let i = 0; i < tileCount(); i++) {
    const td = state.tiles[i];
    if (!td) continue;
    const wasReady = prevReadyState[i] || false;
    const nowReady = isReady(td, i);
    if (!wasReady && nowReady) {
      prevReadyState[i] = true;
      renderTile(i);
    } else if (!nowReady) {
      const el = els[i];
      if (!el) continue;
      const timerEl = el.querySelector('.t-timer');
      if (timerEl) timerEl.textContent = fmt(remSec(td, i));
      prevReadyState[i] = false;
    }
  }
  document.querySelectorAll('.t-mound-timer').forEach(timerEl => {
    const mIdx = parseInt(timerEl.dataset.moundIdx);
    if (state.mounds && state.mounds[mIdx] !== undefined) {
      timerEl.textContent = fmt(Math.max(0, (state.mounds[mIdx] - Date.now()) / 1000));
    }
  });
  document.querySelectorAll('.t-rot-timer').forEach(timerEl => {
    const rIdx = parseInt(timerEl.dataset.rotTimerIdx);
    const rot = state.rotTiles && state.rotTiles[rIdx];
    if (rot && rot.infectedAt !== undefined) {
      timerEl.textContent = fmt(Math.max(0, 90 - (Date.now() - rot.infectedAt) / 1000));
    }
  });
  document.querySelectorAll('.t-rotdead-timer').forEach(timerEl => {
    const rIdx = parseInt(timerEl.dataset.rotDeadIdx);
    const rot = state.rotTiles && state.rotTiles[rIdx];
    if (rot && rot.deadAt !== undefined) {
      timerEl.textContent = fmt(Math.max(0, (rot.deadAt - Date.now()) / 1000));
    }
  });
}

  crowTick();
  weedTick();
  hawkTick();
  moleTick();
  thornedWeedTick();
  moundTick();
  rotTick();
  rootRotSpawnTick();
  locustTick();
  blightTick();
  fungalSpawnTick();
  fungalSpreadTick();
  masterFarmerTick();
}, 1000);

setInterval(save, 10000);

// ══════════════════════════════
// INIT
// ══════════════════════════════
load();
lastCrowCheck = Date.now();
lastWeedCheck = Date.now();
lastHawkCheck = Date.now();
lastMoleCheck = Date.now();
lastRotCheck = Date.now();
lastLocustCheck = Date.now();
lastBlightCheck = Date.now();
lastFungalCheck = Date.now();
lastFungalSpreadCheck = Date.now();
buildGrid();
renderAllTiles();
renderInventory();
renderSeeds();
renderSeedBags();
renderItems();
renderUpgrades();
renderSellBox();
renderLoose();
updateCoins();
updateStageDisplay();
applyPanelState();
updateCrankDisplay();
updateWell();
updateModeIndicator();
updateSellBoxStyle();
for (let i = 0; i < tileCount(); i++) {
  const td = state.tiles[i];
  prevReadyState[i] = td ? isReady(td, i) : false;
}

// ══════════════════════════════
// SETTINGS
// ══════════════════════════════
(function () {
  const btn             = document.getElementById('settings-btn');
  const backdrop        = document.getElementById('settings-backdrop');
  const panel           = document.getElementById('settings-panel');
  const resetBtn        = document.getElementById('reset-btn');
  const hideBoughtToggle = document.getElementById('hide-bought-toggle');
  let confirmed  = false;

  function openSettings() {
    confirmed = false;
    resetBtn.textContent = 'Reset Data';
    hideBoughtToggle.checked = !!state.hideBoughtUpgrades;
    backdrop.style.display = 'block';
    panel.style.display    = 'block';
  }

  hideBoughtToggle.addEventListener('change', () => {
    state.hideBoughtUpgrades = hideBoughtToggle.checked;
    renderUpgrades();
    save();
  });

  function closeSettings() {
    confirmed = false;
    resetBtn.textContent   = 'Reset Data';
    backdrop.style.display = 'none';
    panel.style.display    = 'none';
  }

  btn.addEventListener('click', e => { e.stopPropagation(); openSettings(); });

  backdrop.addEventListener('click', closeSettings);

  // Prevent panel clicks from bubbling to backdrop
  panel.addEventListener('click', e => e.stopPropagation());

  resetBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (!confirmed) {
      confirmed = true;
      resetBtn.textContent = 'Are you sure?';
    } else {
      localStorage.clear();
      location.reload();
    }
  });
}());
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bliss Farm</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  --pw: 220px;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #87CEEB;
  font-family: system-ui, sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

/* ── CLOUDS ── */
#clouds {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}
.cloud {
  position: absolute;
  background: #fff;
  border-radius: 60px;
  opacity: 0.78;
  animation: cloudDrift linear infinite;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: #fff;
  border-radius: 50%;
}
.cl1 { width:130px; height:42px; top:7%;  animation-duration:88s;  animation-delay:-22s; }
.cl1::before { width:72px; height:72px; top:-38px; left:14px; }
.cl1::after  { width:52px; height:52px; top:-26px; left:60px; }
.cl2 { width:90px;  height:30px; top:20%; animation-duration:130s; animation-delay:-70s; }
.cl2::before { width:52px; height:52px; top:-28px; left:10px; }
.cl2::after  { width:36px; height:36px; top:-18px; left:44px; }
.cl3 { width:170px; height:54px; top:11%; animation-duration:105s; animation-delay:-45s; }
.cl3::before { width:88px; height:88px; top:-50px; left:24px; }
.cl3::after  { width:66px; height:66px; top:-36px; left:84px; }
.cl4 { width:110px; height:36px; top:26%; animation-duration:75s;  animation-delay:-58s; }
.cl4::before { width:62px; height:62px; top:-34px; left:12px; }
.cl4::after  { width:44px; height:44px; top:-22px; left:52px; }
.cl5 { width:150px; height:48px; top:5%;  animation-duration:155s; animation-delay:-105s; }
.cl5::before { width:80px; height:80px; top:-44px; left:20px; }
.cl5::after  { width:58px; height:58px; top:-30px; left:74px; }
@keyframes cloudDrift {
  from { transform: translateX(-280px); }
  to   { transform: translateX(calc(100vw + 280px)); }
}

/* ── TOP BAR ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 44px;
  z-index: 300;
  display: flex;
  align-items: center;
  padding: 0 12px;
  pointer-events: none;
}
#coins {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(0,0,0,0.2);
  border-radius: 20px;
  padding: 4px 12px 4px 8px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  pointer-events: all;
}

/* ── RIGHT PANEL ── */
#panel {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: var(--pw);
  background: #8B5E3C;
  z-index: 200;
  display: flex;
  flex-direction: row;
  transition: width 0.22s ease;
  overflow: hidden;
}
#panel.resizing { transition: none !important; }

#panel-tab {
  width: 24px;
  min-width: 24px;
  background: #6e4626;
  cursor: ew-resize;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.55);
  font-size: 13px;
  flex-shrink: 0;
  z-index: 1;
}
#panel-tab:hover { background: #623e20; }

#panel-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  min-width: 0;
  padding-top: 44px;
}

.panel-label {
  color: rgba(255,255,255,0.45);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 12px 12px 5px;
}
.panel-divider {
  height: 1px;
  background: rgba(255,255,255,0.1);
  margin: 10px 0 2px;
}

/* ── UPGRADE CARDS ── */
.upgrade-card {
  margin: 4px 10px;
  background: rgba(0,0,0,0.15);
  border-radius: 6px;
  padding: 8px 10px;
  color: #fff;
}
.upgrade-card.bought { opacity: 0.45; }
.ug-name {
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ug-desc {
  font-size: 10px;
  opacity: 0.6;
  margin-bottom: 6px;
  line-height: 1.35;
}
.ug-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}
.ug-cost { font-size: 11px; opacity: 0.8; }
.ug-btn {
  background: #5A8A3C;
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}
.ug-btn:hover:not(:disabled) { background: #4a7a2c; }
.ug-btn:disabled {
  background: rgba(0,0,0,0.22);
  color: rgba(255,255,255,0.35);
  cursor: default;
}

/* ── SHOP SEED ROWS ── */
.seed-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 12px;
  cursor: grab;
  color: #fff;
}
.seed-row:hover { background: rgba(0,0,0,0.12); }
.seed-row:active { cursor: grabbing; }
.seed-row .sr-icon { font-size: 19px; line-height: 1; }
.seed-row .sr-info { display: flex; flex-direction: column; }
.seed-row .sr-name { font-size: 12px; font-weight: 700; }
.seed-row .sr-meta { font-size: 10px; opacity: 0.6; margin-top: 1px; }

/* ── INVENTORY ICON GRID ── */
#inv-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 8px 12px 14px;
}
.inv-icon {
  position: relative;
  width: 42px;
  height: 42px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  cursor: grab;
}
.inv-icon:active { cursor: grabbing; }
.inv-badge {
  position: absolute;
  top: -5px; right: -5px;
  background: #b03020;
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  border-radius: 10px;
  padding: 1px 4px;
  min-width: 15px;
  text-align: center;
  line-height: 13px;
  pointer-events: none;
}
.inv-icon::after {
  content: attr(data-name);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: #fff;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 999;
}
.inv-icon:hover::after { opacity: 1; }
#inv-empty {
  color: rgba(255,255,255,0.28);
  font-size: 11px;
  font-style: italic;
  padding: 6px 12px;
}

#panel.drop-hi { background: #7a5030; }

/* ── GAME AREA ── */
#game-area {
  position: fixed;
  top: 44px; left: 0;
  right: var(--pw);
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: right 0.22s ease;
  z-index: 10;
}

#grass {
  background: #5A8A3C;
  border-radius: 10px;
  padding: 22px;
  position: relative;
  z-index: 2;
}

#farm-grid {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  grid-template-rows: repeat(3, 100px);
  gap: 3px;
}

.tile {
  width: 100px;
  height: 100px;
  background-color: #8B5E3C;
  background-image:
    radial-gradient(rgba(0,0,0,0.13) 1px, transparent 1px),
    radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
    radial-gradient(rgba(0,0,0,0.07) 1px, transparent 1px);
  background-size: 9px 9px, 14px 14px, 6px 6px;
  background-position: 0 0, 5px 5px, 2px 7px;
  border: 2px solid #5A8A3C;
  border-radius: 6px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: default;
}

.tile.ready { animation: gpulse 1.1s ease-in-out infinite; }
@keyframes gpulse {
  0%, 100% { border-color: #5A8A3C; box-shadow: none; }
  50%       { border-color: #7FD160; box-shadow: 0 0 7px rgba(127,209,96,0.5); }
}

.tile.drop-hi { background-color: #a07040; }

.tile .t-icon  { font-size: 36px; line-height: 1; pointer-events: none; }
.tile .t-timer { font-size: 11px; color: rgba(255,255,255,0.85); font-weight: 700; margin-top: 3px; pointer-events: none; }

.tile .t-xbtn {
  position: absolute;
  top: -13px; left: 50%;
  transform: translateX(-50%);
  width: 22px; height: 22px;
  background: rgba(180,35,35,0.9);
  color: #fff;
  border-radius: 50%;
  font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 10;
}

/* ── SELL BOX ── */
#sell-box {
  position: fixed;
  bottom: 0;
  left: calc((100vw - var(--pw)) / 2);
  transform: translateX(-50%);
  z-index: 250;
  min-width: 200px;
  height: 84px;
  background-color: #8B6343;
  background-image: repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent 17px,
    rgba(0,0,0,0.22) 17px,
    rgba(0,0,0,0.22) 19px
  );
  border: 2px solid #5a3d20;
  border-bottom: none;
  border-radius: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
#sell-box.drop-hi { background-color: #a07848; }

#sell-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #f5e6ce;
  white-space: nowrap;
  pointer-events: none;
}

#sell-queue-row {
  position: absolute;
  top: 6px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 2px;
  align-items: center;
  max-width: 92%;
  flex-wrap: nowrap;
  overflow: hidden;
  pointer-events: none;
}
.sq-icon { font-size: 16px; line-height: 1; }

#sell-cd {
  position: absolute;
  bottom: 7px; right: 10px;
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  pointer-events: none;
}

/* ── CRANK ── */
#crank-box {
  position: fixed;
  bottom: 0;
  height: 84px;
  z-index: 250;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 0 6px;
}
#crank-label {
  font-size: 12px;
  font-weight: 700;
  color: #f5e6ce;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  white-space: nowrap;
}
#crank-svg {
  cursor: pointer;
  display: block;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4));
  transform-origin: 30px 30px;
  transition: filter 0.1s;
}
#crank-svg:hover { filter: drop-shadow(0 3px 8px rgba(0,0,0,0.55)) brightness(1.12); }
#crank-svg:active { filter: drop-shadow(0 1px 3px rgba(0,0,0,0.35)) brightness(0.88); }

/* ── LOOSE CROPS ── */
.loose-crop {
  position: fixed;
  font-size: 30px;
  line-height: 1;
  cursor: grab;
  z-index: 50;
  transform: translate(-50%, -50%);
  pointer-events: all;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}
.loose-crop:active { cursor: grabbing; }

/* ── DRAG GHOST ── */
#ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 38px;
  line-height: 1;
  transform: translate(-50%, -50%);
  display: none;
}

/* ── FLOAT POPUP ── */
.fpop {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 15px;
  font-weight: 700;
  color: #FFD700;
  text-shadow: 0 1px 4px rgba(0,0,0,0.45);
  animation: floatUp 1.2s ease forwards;
  transform: translateX(-50%);
  white-space: nowrap;
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-52px); }
}
</style>
</head>
<body>

<!-- CLOUDS -->
<div id="clouds">
  <div class="cloud cl1"></div>
  <div class="cloud cl2"></div>
  <div class="cloud cl3"></div>
  <div class="cloud cl4"></div>
  <div class="cloud cl5"></div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="coins">🪙 <span id="coin-count">10</span></div>
</div>

<!-- RIGHT PANEL -->
<div id="panel">
  <div id="panel-tab"><span id="panel-arrow">›</span></div>
  <div id="panel-content">

    <div class="panel-label">Upgrades</div>
    <div id="upgrades-list"></div>

    <div class="panel-divider"></div>

    <div class="panel-label">Seeds</div>
    <div class="seed-row" data-seed="potato">
      <span class="sr-icon">🌱</span>
      <div class="sr-info">
        <span class="sr-name">Potato</span>
        <span class="sr-meta">🪙2 · 15s</span>
      </div>
    </div>
    <div class="seed-row" data-seed="carrot">
      <span class="sr-icon">🌿</span>
      <div class="sr-info">
        <span class="sr-name">Carrot</span>
        <span class="sr-meta">🪙4 · 30s</span>
      </div>
    </div>
    <div class="seed-row" data-seed="wheat">
      <span class="sr-icon">🌾</span>
      <div class="sr-info">
        <span class="sr-name">Wheat</span>
        <span class="sr-meta">🪙8 · 60s</span>
      </div>
    </div>
    <div class="seed-row" data-seed="sunflower">
      <span class="sr-icon">🌻</span>
      <div class="sr-info">
        <span class="sr-name">Sunflower</span>
        <span class="sr-meta">🪙15 · 120s</span>
      </div>
    </div>
    <div class="seed-row" data-seed="pumpkin">
      <span class="sr-icon">🎃</span>
      <div class="sr-info">
        <span class="sr-name">Pumpkin</span>
        <span class="sr-meta">🪙30 · 240s</span>
      </div>
    </div>
    <div class="seed-row" data-seed="chard">
      <span class="sr-icon">🌈</span>
      <div class="sr-info">
        <span class="sr-name">Rainbow Chard</span>
        <span class="sr-meta">🪙60 · 480s</span>
      </div>
    </div>

    <div class="panel-divider"></div>

    <div class="panel-label">Inventory</div>
    <div id="inv-grid"></div>

  </div>
</div>

<!-- GAME AREA -->
<div id="game-area">
  <div id="grass">
    <div id="farm-grid"></div>
  </div>
</div>

<!-- SELL BOX -->
<div id="sell-box">
  <div id="sell-queue-row"></div>
  <div id="sell-center">SELL</div>
  <span id="sell-cd"></span>
</div>

<!-- CRANK BOX (visible only after Wind-Up Crank upgrade) -->
<div id="crank-box">
  <div id="crank-label">⚙️ 1.00x</div>
  <svg id="crank-svg" viewBox="0 0 90 60" width="90" height="60" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="gearGrad" cx="38%" cy="33%" r="60%">
        <stop offset="0%" stop-color="#c8885a"/>
        <stop offset="100%" stop-color="#6B4432"/>
      </radialGradient>
      <radialGradient id="knobGrad" cx="35%" cy="30%" r="65%">
        <stop offset="0%" stop-color="#b07848"/>
        <stop offset="100%" stop-color="#7B4E2A"/>
      </radialGradient>
    </defs>
    <!-- Gear teeth: 8 rounded rects rotated around gear center (30,30) -->
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(0   30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(45  30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(90  30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(135 30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(180 30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(225 30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(270 30 30)"/>
    <rect x="26" y="4" width="8" height="9" rx="2" fill="#7a4a28" transform="rotate(315 30 30)"/>
    <!-- Main gear disk -->
    <circle cx="30" cy="30" r="20" fill="url(#gearGrad)" stroke="#3d2010" stroke-width="2"/>
    <!-- Spokes -->
    <line x1="30" y1="13" x2="30" y2="47" stroke="rgba(0,0,0,0.22)" stroke-width="2.5"/>
    <line x1="13" y1="30" x2="47" y2="30" stroke="rgba(0,0,0,0.22)" stroke-width="2.5"/>
    <line x1="18" y1="18" x2="42" y2="42" stroke="rgba(0,0,0,0.16)" stroke-width="2"/>
    <line x1="42" y1="18" x2="18" y2="42" stroke="rgba(0,0,0,0.16)" stroke-width="2"/>
    <!-- Center hub -->
    <circle cx="30" cy="30" r="7" fill="#3d2010" stroke="#5a3d20" stroke-width="1.5"/>
    <circle cx="30" cy="30" r="3" fill="#6B4432"/>
    <!-- Crank arm -->
    <rect x="50" y="26" width="22" height="8" rx="4" fill="#8B5E3C" stroke="#3d2010" stroke-width="2"/>
    <!-- Handle knob -->
    <circle cx="74" cy="30" r="9" fill="url(#knobGrad)" stroke="#3d2010" stroke-width="2"/>
    <circle cx="71" cy="27" r="3" fill="rgba(255,255,255,0.22)"/>
  </svg>
</div>

<!-- DRAG GHOST -->
<div id="ghost"></div>

<script>
// ════════════════════════════════════
// SEED DATA
// ════════════════════════════════════
const SEEDS = {
  potato:    { name: 'Potato',        icon: '🥔', cost: 2,  grow: 15,  sell: 6   },
  carrot:    { name: 'Carrot',        icon: '🥕', cost: 4,  grow: 30,  sell: 12  },
  wheat:     { name: 'Wheat',         icon: '🌾', cost: 8,  grow: 60,  sell: 25  },
  sunflower: { name: 'Sunflower',     icon: '🌻', cost: 15, grow: 120, sell: 45  },
  pumpkin:   { name: 'Pumpkin',       icon: '🎃', cost: 30, grow: 240, sell: 90  },
  chard:     { name: 'Rainbow Chard', icon: '🌈', cost: 60, grow: 480, sell: 200 },
};

// ════════════════════════════════════
// UPGRADE DATA
// ════════════════════════════════════
const UPGRADES = [
  { id: 'quickRoots',     name: 'Quick Roots',       desc: 'Crops grow 25% faster',                      cost: 15,  type: 'speed',     mult: 0.75 },
  { id: 'goldenHarvest',  name: 'Golden Harvest',    desc: 'Crops sell for 50% more',                    cost: 50,  type: 'value',     mult: 1.50 },
  { id: 'fertilizerI',    name: 'Fertilizer I',      desc: 'Crops grow 40% faster (stacks)',             cost: 100, type: 'speed',     mult: 0.60 },
  { id: 'marketEye',      name: 'Market Eye',        desc: 'Crops sell for 75% more (stacks)',           cost: 200, type: 'value',     mult: 1.75 },
  { id: 'fertilizerII',   name: 'Fertilizer II',     desc: 'Crops grow 60% faster (stacks)',             cost: 350, type: 'speed',     mult: 0.40 },
  { id: 'merchantTouch',  name: "Merchant's Touch",  desc: 'Crops sell for 120% more (stacks)',          cost: 600, type: 'value',     mult: 2.20 },
  { id: 'swiftMarketI',   name: 'Swift Market I',    desc: 'Sell box sells 25% faster',                  cost: 80,  type: 'sellSpeed', mult: 0.75 },
  { id: 'swiftMarketII',  name: 'Swift Market II',   desc: 'Sell box sells 40% faster (stacks)',         cost: 250, type: 'sellSpeed', mult: 0.60 },
  { id: 'swiftMarketIII', name: 'Swift Market III',  desc: 'Sell box sells 60% faster (stacks)',         cost: 700, type: 'sellSpeed', mult: 0.40 },
  { id: 'expandPlot',     name: 'Expand Plot',       desc: 'Adds a new column of 3 tiles to the right',  cost: 400, type: 'expand'               },
  { id: 'windUpCrank',    name: 'Wind-Up Crank',     desc: 'Click crank to boost sell speed; decays over time', cost: 300, type: 'crank' },
];

// ════════════════════════════════════
// STATE
// ════════════════════════════════════
let state = {
  coins:      10,
  tiles:      Array(9).fill(null),
  inventory:  {},
  sellQueue:  [],
  sellNextAt: 0,
  upgrades:   {},
  loose:      [],
  expanded:   false,
};
let nextId        = 0;
let selectedTile  = null;
let panelExpanded = true;
let panelWidth    = 220;

// Session-only crank state (intentionally not persisted)
let crankMult  = 1.0;
let crankAngle = 0;

// ════════════════════════════════════
// DRAG STATE
// ════════════════════════════════════
let drag = null;
const ghost = document.getElementById('ghost');

function startDrag(seed, source) {
  drag = { seed, source };
  ghost.textContent = SEEDS[seed].icon;
  ghost.style.display = 'block';
  deselect();
}

function endDrag() {
  drag = null;
  ghost.style.display = 'none';
  clearHighlights();
}

function moveGhost(x, y) {
  ghost.style.left = x + 'px';
  ghost.style.top  = y + 'px';
}

function clearHighlights() {
  tileEls().forEach(t => t.classList.remove('drop-hi'));
  document.getElementById('panel').classList.remove('drop-hi');
  document.getElementById('sell-box').classList.remove('drop-hi');
}

function hit(x, y, el) {
  const r = el.getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

function tileEls() { return document.querySelectorAll('.tile'); }

// ════════════════════════════════════
// PANEL RESIZE STATE
// ════════════════════════════════════
let resizing     = false;
let resizeStartX = 0;
let resizeStartW = 0;
let resizeMoved  = false;

// ════════════════════════════════════
// SAVE / LOAD
// ════════════════════════════════════
const KEY = 'blissfarm6';

function save() {
  localStorage.setItem(KEY, JSON.stringify({
    ...state, nextId, panelExpanded, panelWidth
  }));
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(KEY) || 'null');
    if (!d) return;
    state.coins      = d.coins      ?? 10;
    state.tiles      = d.tiles      ?? Array(9).fill(null);
    state.inventory  = d.inventory  ?? {};
    state.sellQueue  = d.sellQueue  ?? [];
    state.sellNextAt = d.sellNextAt ?? 0;
    state.upgrades   = d.upgrades   ?? {};
    state.loose      = d.loose      ?? [];
    state.expanded   = d.expanded   ?? false;
    nextId           = d.nextId     ?? 0;
    panelExpanded    = d.panelExpanded ?? true;
    panelWidth       = d.panelWidth    ?? 220;
  } catch (_) {}
}

// ════════════════════════════════════
// UPGRADE MULTIPLIERS
// ════════════════════════════════════
function getGrowMult() {
  let m = 1;
  UPGRADES.forEach(u => { if (u.type === 'speed' && state.upgrades[u.id]) m *= u.mult; });
  return m;
}

function getSellMult() {
  let m = 1;
  UPGRADES.forEach(u => { if (u.type === 'value' && state.upgrades[u.id]) m *= u.mult; });
  return m;
}

function getSellSpeedMult() {
  let m = 1;
  UPGRADES.forEach(u => { if (u.type === 'sellSpeed' && state.upgrades[u.id]) m *= u.mult; });
  return m;
}

// Returns effective sell interval in ms (base 10s × speed upgrades ÷ crank)
function getSellInterval() {
  return Math.max(500, 10000 * getSellSpeedMult() / crankMult);
}

// ════════════════════════════════════
// HELPERS
// ════════════════════════════════════
function remSec(td) {
  const growTime = SEEDS[td.seed].grow * getGrowMult();
  return Math.max(0, growTime - (Date.now() - td.plantedAt) / 1000);
}
function isReady(td) { return remSec(td) <= 0; }
function fmt(s)      { return Math.ceil(s) + 's'; }

// ════════════════════════════════════
// COIN UI
// ════════════════════════════════════
function updateCoins() {
  document.getElementById('coin-count').textContent = state.coins;
  renderUpgrades();
}

// ════════════════════════════════════
// TILE RENDER
// ════════════════════════════════════
function tileCount() { return state.expanded ? 12 : 9; }

function buildGrid() {
  const grid = document.getElementById('farm-grid');
  const cols = state.expanded ? 4 : 3;
  grid.style.gridTemplateColumns = `repeat(${cols}, 100px)`;

  // Extend the tiles array if expanding
  while (state.tiles.length < tileCount()) state.tiles.push(null);

  grid.innerHTML = '';
  for (let i = 0; i < tileCount(); i++) {
    const el = document.createElement('div');
    el.className = 'tile';
    el.dataset.idx = i;
    el.addEventListener('mousedown', onTileDown);
    grid.appendChild(el);
  }
}

function renderTile(idx) {
  const el = [...tileEls()][idx];
  if (!el) return;
  const td = state.tiles[idx];
  el.innerHTML = '';
  el.className = 'tile';
  if (!td) return;

  const rdy = isReady(td);
  if (rdy) el.classList.add('ready');

  const icon = document.createElement('div');
  icon.className = 't-icon';
  icon.textContent = SEEDS[td.seed].icon;
  el.appendChild(icon);

  if (!rdy) {
    const timer = document.createElement('div');
    timer.className = 't-timer';
    timer.textContent = fmt(remSec(td));
    el.appendChild(timer);

    if (selectedTile === idx) {
      const xb = document.createElement('div');
      xb.className = 't-xbtn';
      xb.textContent = '✕';
      xb.addEventListener('mousedown', e => {
        e.stopPropagation();
        state.tiles[idx] = null;
        deselect();
        renderTile(idx);
        save();
      });
      el.appendChild(xb);
    }
  }
}

function renderAllTiles() {
  for (let i = 0; i < tileCount(); i++) renderTile(i);
}

// ════════════════════════════════════
// INVENTORY
// ════════════════════════════════════
function renderInventory() {
  const grid = document.getElementById('inv-grid');
  grid.innerHTML = '';
  const keys = Object.keys(state.inventory).filter(k => (state.inventory[k] || 0) > 0);

  if (!keys.length) {
    const emp = document.createElement('div');
    emp.id = 'inv-empty';
    emp.textContent = 'Empty';
    grid.appendChild(emp);
    return;
  }

  keys.forEach(k => {
    const el = document.createElement('div');
    el.className = 'inv-icon';
    el.dataset.name = SEEDS[k].name;
    el.innerHTML = `<span style="pointer-events:none">${SEEDS[k].icon}</span>
                    <span class="inv-badge">${state.inventory[k]}</span>`;
    el.addEventListener('mousedown', e => {
      e.stopPropagation();
      if ((state.inventory[k] || 0) < 1) return;
      state.inventory[k]--;
      if (state.inventory[k] <= 0) delete state.inventory[k];
      renderInventory();
      save();
      startDrag(k, 'inventory');
      moveGhost(e.clientX, e.clientY);
    });
    grid.appendChild(el);
  });
}

function addInventory(seed) {
  state.inventory[seed] = (state.inventory[seed] || 0) + 1;
}

// ════════════════════════════════════
// UPGRADES RENDER
// ════════════════════════════════════
function renderUpgrades() {
  const container = document.getElementById('upgrades-list');
  container.innerHTML = '';
  UPGRADES.forEach(u => {
    const bought    = !!state.upgrades[u.id];
    const canAfford = state.coins >= u.cost && !bought;

    const card = document.createElement('div');
    card.className = 'upgrade-card' + (bought ? ' bought' : '');
    card.innerHTML = `
      <div class="ug-name">${u.name}</div>
      <div class="ug-desc">${u.desc}</div>
      <div class="ug-bottom">
        <span class="ug-cost">🪙${u.cost}</span>
        <button class="ug-btn" ${bought || !canAfford ? 'disabled' : ''}>${bought ? 'Owned' : 'Buy'}</button>
      </div>`;

    if (!bought) {
      card.querySelector('.ug-btn').addEventListener('click', e => {
        e.stopPropagation();
        if (state.upgrades[u.id] || state.coins < u.cost) return;
        state.coins -= u.cost;
        state.upgrades[u.id] = true;
        if (u.type === 'expand') {
          state.expanded = true;
          buildGrid();
        }
        updateCoins(); // also calls renderUpgrades, refreshing the list
        renderAllTiles();
        if (u.type === 'crank') updateCrankDisplay();
        save();
      });
    }
    container.appendChild(card);
  });
}

// ════════════════════════════════════
// SELL BOX QUEUE
// ════════════════════════════════════
function addToSellQueue(seed) {
  state.sellQueue.push(seed);
  if (state.sellQueue.length === 1) state.sellNextAt = Date.now() + getSellInterval();
  renderSellBox();
  save();
}

function renderSellBox() {
  const qRow = document.getElementById('sell-queue-row');
  qRow.innerHTML = '';
  state.sellQueue.forEach(seed => {
    const s = document.createElement('span');
    s.className = 'sq-icon';
    s.textContent = SEEDS[seed].icon;
    qRow.appendChild(s);
  });
  updateSellTimer();
}

function updateSellTimer() {
  const cd = document.getElementById('sell-cd');
  if (!state.sellQueue.length || !state.sellNextAt) { cd.textContent = ''; return; }
  const rem = Math.max(0, Math.ceil((state.sellNextAt - Date.now()) / 1000));
  cd.textContent = rem + 's';
}

function tickSellBox() {
  if (!state.sellQueue.length) return;
  if (Date.now() >= state.sellNextAt) {
    const seed  = state.sellQueue.shift();
    const coins = Math.round(SEEDS[seed].sell * getSellMult());
    state.coins += coins;
    updateCoins();
    state.sellNextAt = state.sellQueue.length ? Date.now() + getSellInterval() : 0;
    const sb = document.getElementById('sell-box');
    const r  = sb.getBoundingClientRect();
    showPop('+🪙' + coins, r.left + r.width / 2, r.top - 6);
    renderSellBox();
    save();
  } else {
    updateSellTimer();
  }
}

// ════════════════════════════════════
// CRANK
// ════════════════════════════════════
function positionCrank() {
  const box     = document.getElementById('crank-box');
  const sellBox = document.getElementById('sell-box');
  const r = sellBox.getBoundingClientRect();
  box.style.left = (r.right + 10) + 'px';
}

function updateCrankDisplay() {
  const box = document.getElementById('crank-box');
  if (!state.upgrades.windUpCrank) {
    box.style.display = 'none';
    return;
  }
  box.style.display = 'flex';
  document.getElementById('crank-label').textContent = '⚙️ ' + crankMult.toFixed(2) + 'x';
  positionCrank();
}

document.getElementById('crank-svg').addEventListener('click', () => {
  if (!state.upgrades.windUpCrank) return;
  crankMult  = crankMult * 1.10;
  crankAngle = (crankAngle + 30) % 3600;
  document.getElementById('crank-svg').style.transform = `rotate(${crankAngle}deg)`;
  updateCrankDisplay();
});

// ════════════════════════════════════
// LOOSE CROPS
// ════════════════════════════════════
function dropLoose(seed, x, y) {
  state.loose.push({ seed, id: nextId++, x, y });
  renderLoose();
  save();
}

function renderLoose() {
  document.querySelectorAll('.loose-crop').forEach(el => el.remove());
  state.loose.forEach(item => {
    const el = document.createElement('div');
    el.className = 'loose-crop';
    el.textContent = SEEDS[item.seed].icon;
    el.style.left = item.x + 'px';
    el.style.top  = item.y + 'px';
    el.dataset.id = item.id;
    el.addEventListener('mousedown', e => {
      e.stopPropagation();
      const id = parseInt(el.dataset.id);
      const i  = state.loose.findIndex(g => g.id === id);
      if (i === -1) return;
      const s = state.loose[i].seed;
      state.loose.splice(i, 1);
      renderLoose();
      save();
      startDrag(s, 'loose');
      moveGhost(e.clientX, e.clientY);
    });
    document.body.appendChild(el);
  });
}

// ════════════════════════════════════
// SELECTION
// ════════════════════════════════════
function deselect() {
  if (selectedTile !== null) {
    const prev = selectedTile;
    selectedTile = null;
    renderTile(prev);
  }
}

// ════════════════════════════════════
// TILE INTERACTION
// ════════════════════════════════════
function onTileDown(e) {
  const idx = parseInt(e.currentTarget.dataset.idx);
  const td  = state.tiles[idx];

  if (!td) { deselect(); return; }

  if (isReady(td)) {
    e.stopPropagation();
    const seed = td.seed;
    state.tiles[idx] = null;
    renderTile(idx);
    save();
    startDrag(seed, 'tile');
    moveGhost(e.clientX, e.clientY);
    return;
  }

  e.stopPropagation();
  if (selectedTile === idx) {
    deselect();
  } else {
    deselect();
    selectedTile = idx;
    renderTile(idx);
  }
}

// ════════════════════════════════════
// SHOP DRAG
// ════════════════════════════════════
document.querySelectorAll('.seed-row').forEach(row => {
  row.addEventListener('mousedown', e => {
    e.stopPropagation();
    startDrag(row.dataset.seed, 'shop');
    moveGhost(e.clientX, e.clientY);
  });
});

// ════════════════════════════════════
// PANEL TOGGLE & RESIZE
// ════════════════════════════════════
function applyPanelState() {
  const w = panelExpanded ? panelWidth + 'px' : '24px';
  document.body.style.setProperty('--pw', w);
  document.getElementById('panel-arrow').textContent = panelExpanded ? '›' : '‹';
  if (state.upgrades.windUpCrank) positionCrank();
}

const panelTabEl = document.getElementById('panel-tab');
const panelEl    = document.getElementById('panel');

panelTabEl.addEventListener('mousedown', e => {
  resizing     = true;
  resizeStartX = e.clientX;
  resizeStartW = panelWidth;
  resizeMoved  = false;
  panelEl.classList.add('resizing');
  e.preventDefault();
  e.stopPropagation();
});

// ════════════════════════════════════
// GLOBAL MOUSE EVENTS
// ════════════════════════════════════
document.addEventListener('mousemove', e => {
  if (resizing) {
    const dx = resizeStartX - e.clientX;
    if (Math.abs(dx) > 4) resizeMoved = true;
    if (resizeMoved && panelExpanded) {
      panelWidth = Math.max(160, Math.min(400, resizeStartW + dx));
      document.body.style.setProperty('--pw', panelWidth + 'px');
      if (state.upgrades.windUpCrank) positionCrank();
    }
    return;
  }

  if (!drag) return;
  moveGhost(e.clientX, e.clientY);
  clearHighlights();

  const panel   = document.getElementById('panel');
  const sellBox = document.getElementById('sell-box');

  if (drag.source === 'shop') {
    tileEls().forEach(t => {
      const i = parseInt(t.dataset.idx);
      if (!state.tiles[i] && hit(e.clientX, e.clientY, t)) t.classList.add('drop-hi');
    });
  } else {
    if (hit(e.clientX, e.clientY, sellBox)) {
      sellBox.classList.add('drop-hi');
    } else if (panelExpanded && hit(e.clientX, e.clientY, panel)) {
      panel.classList.add('drop-hi');
    }
  }
});

document.addEventListener('mouseup', e => {
  if (resizing) {
    resizing = false;
    panelEl.classList.remove('resizing');
    if (!resizeMoved) {
      panelExpanded = !panelExpanded;
      applyPanelState();
    }
    save();
    return;
  }

  if (!drag) return;

  const { seed, source } = drag;
  const panel   = document.getElementById('panel');
  const sellBox = document.getElementById('sell-box');

  if (source === 'shop') {
    let planted = false;
    tileEls().forEach(t => {
      if (planted) return;
      const i = parseInt(t.dataset.idx);
      if (!state.tiles[i] && hit(e.clientX, e.clientY, t)) {
        const cost = SEEDS[seed].cost;
        if (state.coins >= cost) {
          state.coins -= cost;
          state.tiles[i] = { seed, plantedAt: Date.now() };
          updateCoins();
          renderTile(i);
          save();
        }
        planted = true;
      }
    });
  } else {
    if (hit(e.clientX, e.clientY, sellBox)) {
      addToSellQueue(seed);
    } else if (panelExpanded && hit(e.clientX, e.clientY, panel)) {
      addInventory(seed);
      renderInventory();
      save();
    } else {
      dropLoose(seed, e.clientX, e.clientY);
    }
  }

  endDrag();
});

document.addEventListener('mousedown', () => {
  if (!drag && !resizing) deselect();
});

window.addEventListener('resize', () => {
  if (state.upgrades.windUpCrank) positionCrank();
});

// ════════════════════════════════════
// FLOAT POPUP
// ════════════════════════════════════
function showPop(text, x, y) {
  const el = document.createElement('div');
  el.className = 'fpop';
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1250);
}

// ════════════════════════════════════
// GAME LOOP + AUTO-SAVE
// ════════════════════════════════════
setInterval(() => {
  renderAllTiles();
  tickSellBox();
  // Crank decay: ÷1.05 per second, floor at 1.0
  if (state.upgrades.windUpCrank && crankMult > 1.0) {
    crankMult = Math.max(1.0, crankMult / 1.05);
    updateCrankDisplay();
  }
}, 1000);

setInterval(save, 10000);

// ════════════════════════════════════
// INIT
// ════════════════════════════════════
load();
buildGrid();
renderAllTiles();
renderInventory();
renderUpgrades();
renderSellBox();
renderLoose();
updateCoins();
applyPanelState();
updateCrankDisplay();
</script>
</body>
</html>

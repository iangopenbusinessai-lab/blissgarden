<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bliss Farm</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  --pw: 220px;
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: #87CEEB;
  font-family: system-ui, sans-serif;
  user-select: none; -webkit-user-select: none;
}

/* ── CLOUDS ── */
#clouds { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
.cloud { position:absolute; background:#fff; border-radius:60px; opacity:.78; animation:cloudDrift linear infinite; }
.cloud::before,.cloud::after { content:''; position:absolute; background:#fff; border-radius:50%; }
.cl1 { width:130px; height:42px; top:7%;  animation-duration:88s;  animation-delay:-22s; }
.cl1::before { width:72px; height:72px; top:-38px; left:14px; }
.cl1::after  { width:52px; height:52px; top:-26px; left:60px; }
.cl2 { width:90px;  height:30px; top:20%; animation-duration:130s; animation-delay:-70s; }
.cl2::before { width:52px; height:52px; top:-28px; left:10px; }
.cl2::after  { width:36px; height:36px; top:-18px; left:44px; }
.cl3 { width:170px; height:54px; top:11%; animation-duration:105s; animation-delay:-45s; }
.cl3::before { width:88px; height:88px; top:-50px; left:24px; }
.cl3::after  { width:66px; height:66px; top:-36px; left:84px; }
.cl4 { width:110px; height:36px; top:26%; animation-duration:75s;  animation-delay:-58s; }
.cl4::before { width:62px; height:62px; top:-34px; left:12px; }
.cl4::after  { width:44px; height:44px; top:-22px; left:52px; }
.cl5 { width:150px; height:48px; top:5%;  animation-duration:155s; animation-delay:-105s; }
.cl5::before { width:80px; height:80px; top:-44px; left:20px; }
.cl5::after  { width:58px; height:58px; top:-30px; left:74px; }
@keyframes cloudDrift { from{transform:translateX(-280px)} to{transform:translateX(calc(100vw + 280px))} }

/* ── TOP BAR ── */
#topbar { position:fixed; top:0; left:0; right:0; height:44px; z-index:300; display:flex; align-items:center; padding:0 12px; pointer-events:none; }
#coins { display:flex; align-items:center; gap:5px; background:rgba(0,0,0,.2); border-radius:20px; padding:4px 12px 4px 8px; color:#fff; font-size:15px; font-weight:700; pointer-events:all; }
#stage-display { position:fixed; top:0; left:0; right:var(--pw); height:44px; z-index:300; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.82); font-size:12px; font-weight:600; letter-spacing:.3px; pointer-events:none; white-space:nowrap; }

/* ── WORLD BANNER ── */
.world-banner { position:fixed; top:44px; left:0; right:var(--pw); z-index:290; pointer-events:none; background:rgba(0,0,0,0.72); color:#fff; font-size:14px; font-weight:700; text-align:center; padding:8px 16px; animation:bannerFade 4s forwards; }
@keyframes bannerFade { 0%{opacity:0;transform:translateY(-10px)} 12%{opacity:1;transform:translateY(0)} 75%{opacity:1} 100%{opacity:0} }

/* ── RIGHT PANEL ── */
#panel { position:fixed; right:0; top:0; bottom:0; width:var(--pw); background:#8B5E3C; z-index:200; display:flex; flex-direction:row; transition:width .22s ease; overflow:hidden; }
#panel.resizing { transition:none !important; }
#panel-tab { width:24px; min-width:24px; background:#6e4626; cursor:ew-resize; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.55); font-size:13px; flex-shrink:0; z-index:1; }
#panel-tab:hover { background:#623e20; }
#panel-content { flex:1; overflow-y:auto; overflow-x:hidden; display:flex; flex-direction:column; min-width:0; padding-top:44px; }
.panel-label { color:rgba(255,255,255,.45); font-size:9px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; padding:12px 12px 5px; }
.panel-divider { height:1px; background:rgba(255,255,255,.1); margin:10px 0 2px; }

/* ── UPGRADE / ITEM CARDS ── */
.upgrade-card { margin:4px 10px; background:rgba(0,0,0,.15); border-radius:6px; padding:8px 10px; color:#fff; }
.upgrade-card.bought { opacity:.45; }
.ug-name { font-size:12px; font-weight:700; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ug-desc { font-size:10px; opacity:.6; margin-bottom:6px; line-height:1.35; }
.ug-bottom { display:flex; align-items:center; justify-content:space-between; gap:6px; }
.ug-cost { font-size:11px; opacity:.8; }
.ug-btn { background:#5A8A3C; color:#fff; border:none; border-radius:4px; padding:3px 10px; font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap; }
.ug-btn:hover:not(:disabled) { background:#4a7a2c; }
.ug-btn:disabled { background:rgba(0,0,0,.22); color:rgba(255,255,255,.35); cursor:default; }
.ug-btn.active { background:#3a6aac; }

/* ── SEED ROWS ── */
.seed-row { display:flex; align-items:center; gap:9px; padding:9px 12px; color:#fff; }
.seed-row:hover { background:rgba(0,0,0,.12); }
.seed-row .sr-icon { width:48px; height:48px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.seed-row .sr-info { display:flex; flex-direction:column; flex:1; min-width:0; }
.seed-row .sr-name { font-size:12px; font-weight:700; }
.seed-row .sr-meta { font-size:10px; opacity:.6; margin-top:1px; }
.seed-buy-btn { background:#5A8A3C; color:#fff; border:none; border-radius:4px; padding:3px 9px; font-size:11px; font-weight:700; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.seed-buy-btn:hover:not(:disabled) { background:#4a7a2c; }
.seed-buy-btn:disabled { background:rgba(0,0,0,.22); color:rgba(255,255,255,.35); cursor:default; }

/* ── INVENTORY ── */
#inv-grid { display:flex; flex-wrap:wrap; gap:8px; padding:8px 12px 14px; }
.inv-icon { position:relative; width:42px; height:42px; background:rgba(0,0,0,.2); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:grab; }
.inv-icon:active { cursor:grabbing; }
.inv-badge { position:absolute; top:-5px; right:-5px; background:#b03020; color:#fff; font-size:9px; font-weight:700; border-radius:10px; padding:1px 4px; min-width:15px; text-align:center; line-height:13px; pointer-events:none; }
.inv-icon::after { content:attr(data-name); position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:rgba(0,0,0,.8); color:#fff; font-size:11px; padding:3px 8px; border-radius:4px; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .15s; z-index:999; }
.inv-icon:hover::after { opacity:1; }
#inv-empty { color:rgba(255,255,255,.28); font-size:11px; font-style:italic; padding:6px 12px; }
#panel.drop-hi { background:#7a5030; }

/* ── SEED INVENTORY SLOTS ── */
.inv-seed-slot { display:flex; flex-direction:column; align-items:center; gap:3px; }
.inv-seed-icon { position:relative; width:42px; height:42px; background:rgba(0,0,0,.2); border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:grab; border:1px solid rgba(255,255,255,.1); }
.inv-seed-icon:active { cursor:grabbing; }
.inv-seed-icon::after { content:attr(data-name); position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:rgba(0,0,0,.8); color:#fff; font-size:11px; padding:3px 8px; border-radius:4px; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .15s; z-index:999; }
.inv-seed-icon:hover::after { opacity:1; }
.inv-seed-sell { background:#5A6A2C; color:#fff; border:none; border-radius:4px; padding:2px 5px; font-size:9px; font-weight:700; cursor:pointer; white-space:nowrap; width:42px; text-align:center; }
.inv-seed-sell:hover { background:#4a5a1c; }

/* ── BAG INVENTORY SLOTS ── */
.inv-bag-slot { display:flex; flex-direction:column; align-items:center; gap:3px; }
.inv-bag-icon { position:relative; width:42px; height:42px; background:rgba(80,50,20,.4); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; border:1px solid rgba(255,200,100,.25); }
/* inv-bag-icon keeps font-size for bag emoji (non-crop) */
.inv-bag-icon::after { content:attr(data-name); position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:rgba(0,0,0,.8); color:#fff; font-size:11px; padding:3px 8px; border-radius:4px; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .15s; z-index:999; }
.inv-bag-icon:hover::after { opacity:1; }
.inv-bag-open { background:#8B6020; color:#fff; border:none; border-radius:4px; padding:2px 5px; font-size:9px; font-weight:700; cursor:pointer; white-space:nowrap; width:42px; text-align:center; }
.inv-bag-open:hover { background:#7a5010; }

/* ── GAME AREA ── */
#game-area { position:fixed; top:44px; left:0; right:var(--pw); bottom:0; display:flex; align-items:center; justify-content:center; transition:right .22s ease; z-index:10; }
#grass { background:#5A8A3C; border-radius:10px; padding:22px; position:relative; z-index:2; }
#farm-grid { display:grid; grid-template-columns:repeat(3,100px); gap:3px; }

/* ── TILES ── */
.tile { width:100px; height:100px; background-color:#8B5E3C; background-image:radial-gradient(rgba(0,0,0,.13) 1px,transparent 1px),radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px),radial-gradient(rgba(0,0,0,.07) 1px,transparent 1px); background-size:9px 9px,14px 14px,6px 6px; background-position:0 0,5px 5px,2px 7px; border:2px solid #5A8A3C; border-radius:6px; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:default; }
.tile.ready { animation:gpulse 1.1s ease-in-out infinite; }
@keyframes gpulse { 0%,100%{border-color:#5A8A3C;box-shadow:none} 50%{border-color:#7FD160;box-shadow:0 0 7px rgba(127,209,96,.5)} }
.tile.drop-hi { background-color:#a07040; }
.tile.tile-watered { border-color:#4A9FD4; }
.tile.tile-caged { box-shadow:inset 0 0 0 2px rgba(160,160,200,.55); }
.tile.tile-drowned { filter:brightness(0.65); }
.tile.tile-weed { background-color:#3a6a20; cursor:pointer; }
.tile.tile-weed:hover { background-color:#4a7a28; }
.tile.tile-thorned { background-color:#2a5a10; cursor:pointer; }
.tile.tile-thorned:hover { background-color:#3a6a18; }
.tile .t-thorned-icon { font-size:30px; line-height:1; pointer-events:none; }
.tile .t-thorned-count { font-size:11px; color:rgba(255,255,255,.85); font-weight:700; margin-top:3px; pointer-events:none; }
.tile.tile-mound { background-color:#6a4428; cursor:pointer; }
.tile.tile-mound:hover { background-color:#7a5438; }
.tile .t-mound-icon { font-size:30px; line-height:1; pointer-events:none; }
.tile .t-mound-timer { font-size:11px; color:rgba(255,255,255,.85); font-weight:700; margin-top:3px; pointer-events:none; }
.tile .t-icon  { display:flex; align-items:center; justify-content:center; pointer-events:none; }
.tile .t-timer { font-size:11px; color:rgba(255,255,255,.85); font-weight:700; margin-top:3px; pointer-events:none; }
.tile .t-xbtn  { position:absolute; top:-13px; left:50%; transform:translateX(-50%); width:22px; height:22px; background:rgba(180,35,35,.9); color:#fff; border-radius:50%; font-size:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:10; }
.tile .t-cage-rm { position:absolute; top:-13px; right:2px; width:22px; height:22px; background:rgba(30,60,140,.9); color:#fff; border-radius:50%; font-size:11px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:10; }
.tile .t-cage-icon { position:absolute; bottom:2px; right:3px; font-size:12px; opacity:.7; pointer-events:none; }
.tile .t-water-icon { position:absolute; bottom:2px; left:3px; font-size:12px; opacity:.7; pointer-events:none; }
.tile .t-drown-icon { position:absolute; bottom:2px; left:3px; font-size:12px; pointer-events:none; }
.tile .t-fert-icon { position:absolute; top:2px; right:3px; font-size:11px; opacity:.85; pointer-events:none; }
.tile .t-weed-icon { font-size:36px; line-height:1; pointer-events:none; }
.tile .t-weed-count { font-size:11px; color:rgba(255,255,255,.85); font-weight:700; margin-top:3px; pointer-events:none; }
.tile.tile-rot { background-color:#7a5428; border-color:#8a7040; }
.tile .t-rot-icon { position:absolute; top:2px; left:2px; font-size:16px; pointer-events:none; }
.tile .t-rot-timer { position:absolute; bottom:2px; left:3px; font-size:9px; color:rgba(255,200,60,.9); font-weight:700; pointer-events:none; }
.tile.tile-rotdead { background-color:#3a2a1a; cursor:default; }
.tile .t-rotdead-icon { font-size:28px; line-height:1; pointer-events:none; }
.tile .t-rotdead-timer { font-size:11px; color:rgba(255,255,255,.85); font-weight:700; margin-top:3px; pointer-events:none; }

/* ── SELL BOX ── */
#sell-box { position:fixed; bottom:0; left:calc((100vw - var(--pw)) / 2); transform:translateX(-50%); z-index:250; min-width:200px; height:84px; background-color:#8B6343; background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 17px,rgba(0,0,0,.22) 17px,rgba(0,0,0,.22) 19px); border:2px solid #5a3d20; border-bottom:none; display:flex; align-items:center; justify-content:center; }
#sell-box.drop-hi { background-color:#a07848; }
#sell-box.iron { background-color:#3a424e; background-image:radial-gradient(circle at 8px 8px,#4a5460 5px,transparent 6px),radial-gradient(circle at calc(100% - 8px) 8px,#4a5460 5px,transparent 6px),radial-gradient(circle at 8px calc(100% - 8px),#4a5460 5px,transparent 6px),radial-gradient(circle at calc(100% - 8px) calc(100% - 8px),#4a5460 5px,transparent 6px),repeating-linear-gradient(to bottom,transparent 0,transparent 17px,rgba(0,0,0,.3) 17px,rgba(0,0,0,.3) 19px); border-color:#252c38; }
#sell-box.iron #sell-center { color:#a8bcc8; text-shadow:0 1px 3px rgba(0,0,0,.6); }
#sell-box.steel { background-color:#2e3a4a; background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 17px,rgba(0,0,0,.3) 17px,rgba(0,0,0,.3) 19px),radial-gradient(circle at 30% 30%,rgba(100,130,160,.15) 0,transparent 70%); border-color:#1a2530; }
#sell-box.steel #sell-center { color:#8ab8d0; text-shadow:0 1px 3px rgba(0,0,0,.6); }
#sell-box.titanium { background-color:#2a3060; background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 17px,rgba(0,0,0,.25) 17px,rgba(0,0,0,.25) 19px),linear-gradient(135deg,rgba(80,100,180,.15) 0,transparent 50%,rgba(80,100,180,.1) 100%); border-color:#1a2050; }
#sell-box.titanium #sell-center { color:#7ab0f0; text-shadow:0 1px 4px rgba(50,80,200,.5); }
#sell-box.diamond { background-color:#1a2850; background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 17px,rgba(0,0,0,.2) 17px,rgba(0,0,0,.2) 19px),radial-gradient(circle at 50% 50%,rgba(80,160,255,.12) 0,transparent 70%); border-color:#0a30a0; box-shadow:0 0 18px rgba(80,160,255,.25); }
#sell-box.diamond #sell-center { color:#60c8ff; text-shadow:0 0 8px rgba(80,160,255,.7); }
#sell-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:13px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:#f5e6ce; white-space:nowrap; pointer-events:none; }
#sell-queue-row { position:absolute; top:6px; left:50%; transform:translateX(-50%); display:flex; gap:2px; align-items:center; max-width:92%; flex-wrap:nowrap; overflow:hidden; }
.sq-icon { cursor:grab; display:flex; align-items:center; justify-content:center; }
.sq-icon:active { cursor:grabbing; }
#sell-cd { position:absolute; bottom:7px; right:10px; font-size:10px; color:rgba(255,255,255,.5); pointer-events:none; }

/* ── CRANK ── */
#crank-box { position:fixed; bottom:0; height:84px; z-index:250; display:none; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:0 6px; }
#crank-label { font-size:12px; font-weight:700; color:#f5e6ce; text-shadow:0 1px 3px rgba(0,0,0,.5); white-space:nowrap; }
#crank-svg { cursor:pointer; display:block; filter:drop-shadow(0 3px 6px rgba(0,0,0,.4)); transform-origin:30px 30px; transition:filter .1s; }
#crank-svg:hover { filter:drop-shadow(0 3px 8px rgba(0,0,0,.55)) brightness(1.12); }
#crank-svg:active { filter:drop-shadow(0 1px 3px rgba(0,0,0,.35)) brightness(.88); }
#crank-box.iron #crank-svg { filter:drop-shadow(0 3px 7px rgba(0,0,0,.55)) grayscale(.9) brightness(.72); }
#crank-box.iron #crank-svg:hover { filter:drop-shadow(0 3px 9px rgba(0,0,0,.65)) grayscale(.9) brightness(.88); }
#crank-box.iron #crank-svg:active { filter:drop-shadow(0 1px 3px rgba(0,0,0,.4)) grayscale(.9) brightness(.55); }
#crank-box.iron #crank-label { color:#b0bcc8; }
#crank-box.steel #crank-svg { filter:drop-shadow(0 3px 7px rgba(0,0,0,.65)) grayscale(.8) brightness(.55); }
#crank-box.steel #crank-svg:hover { filter:drop-shadow(0 3px 9px rgba(0,0,0,.7)) grayscale(.8) brightness(.7); }
#crank-box.steel #crank-svg:active { filter:drop-shadow(0 1px 3px rgba(0,0,0,.5)) grayscale(.8) brightness(.4); }
#crank-box.steel #crank-label { color:#8a9aaa; }
#crank-box.titanium #crank-svg { filter:drop-shadow(0 3px 9px rgba(70,100,200,.45)) hue-rotate(200deg) saturate(1.3) brightness(.75); }
#crank-box.titanium #crank-svg:hover { filter:drop-shadow(0 3px 11px rgba(70,100,200,.6)) hue-rotate(200deg) saturate(1.5) brightness(.9); }
#crank-box.titanium #crank-svg:active { filter:drop-shadow(0 1px 4px rgba(70,100,200,.3)) hue-rotate(200deg) saturate(1.2) brightness(.6); }
#crank-box.titanium #crank-label { color:#90b0d8; }
#crank-box.diamond #crank-svg { filter:drop-shadow(0 4px 14px rgba(80,160,255,.65)) hue-rotate(210deg) saturate(2.2) brightness(1.15); }
#crank-box.diamond #crank-svg:hover { filter:drop-shadow(0 4px 18px rgba(80,160,255,.85)) hue-rotate(210deg) saturate(2.5) brightness(1.3); }
#crank-box.diamond #crank-svg:active { filter:drop-shadow(0 2px 6px rgba(80,160,255,.4)) hue-rotate(210deg) saturate(2) brightness(.9); }
#crank-box.diamond #crank-label { color:#70c0ff; }

/* ── WELL ── */
#well { position:fixed; bottom:20px; right:calc(var(--pw) + 20px); z-index:240; display:none; flex-direction:column; align-items:center; gap:4px; transition:right .22s ease; }
#well:hover { filter:brightness(1.1); }
#well.well-active svg { filter:drop-shadow(0 0 6px #4ab8ff); }
#well-label { font-size:11px; font-weight:700; color:#6cf; text-shadow:0 1px 3px rgba(0,0,0,.5); white-space:nowrap; }

/* ── LOG PANEL ── */
#log-panel { position:fixed; bottom:0; left:0; width:250px; max-height:164px; background:rgba(0,0,0,.48); border-radius:0 8px 0 0; z-index:190; display:flex; flex-direction:column; overflow:hidden; }
#log-inner { overflow-y:auto; flex:1; padding:5px 8px 6px; display:flex; flex-direction:column; gap:1px; }
#log-inner::-webkit-scrollbar { width:3px; }
#log-inner::-webkit-scrollbar-thumb { background:rgba(255,255,255,.2); border-radius:3px; }
.log-line { font-size:10.5px; color:rgba(255,255,255,.82); line-height:1.45; }

/* ── MODE INDICATOR ── */
#mode-ind { position:fixed; bottom:172px; left:8px; background:rgba(0,0,0,.65); color:#fff; font-size:11px; padding:4px 9px; border-radius:5px; display:none; z-index:270; pointer-events:none; }

/* ── LOOSE CROPS ── */
.loose-crop { position:fixed; cursor:grab; z-index:50; transform:translate(-50%,-50%); pointer-events:all; filter:drop-shadow(0 2px 4px rgba(0,0,0,.3)); display:flex; align-items:center; justify-content:center; }
.loose-crop:active { cursor:grabbing; }

/* ── GHOST ── */
#ghost { position:fixed; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); display:none; }

/* ── FLOAT POP ── */
.fpop { position:fixed; pointer-events:none; z-index:9999; font-size:15px; font-weight:700; color:#FFD700; text-shadow:0 1px 4px rgba(0,0,0,.45); animation:floatUp 1.2s ease forwards; transform:translateX(-50%); white-space:nowrap; }
@keyframes floatUp { 0%{opacity:1;transform:translateX(-50%) translateY(0)} 100%{opacity:0;transform:translateX(-50%) translateY(-52px)} }

/* ── CROW ── */
.crow-anim { position:fixed; font-size:30px; z-index:9990; pointer-events:none; animation:crowFly 3s linear forwards; left:-60px; }
@keyframes crowFly { from{left:-60px} to{left:calc(100vw + 60px)} }
.hawk-anim { position:fixed; font-size:28px; z-index:9990; pointer-events:none; animation:hawkFly 2s linear forwards; left:-60px; }
@keyframes hawkFly { from{left:-60px} to{left:calc(100vw + 60px)} }

/* ── LOCUST SWARM ── */
.locust-anim { position:fixed; font-size:20px; z-index:9990; pointer-events:none; animation:locustFly 5s linear forwards; left:-40px; }
@keyframes locustFly { from{left:-40px} to{left:calc(100vw + 40px)} }

/* ── BLIGHT STORM ── */

// sprites.png: 384×832, 3 cols (seed·sprout·grown), 13 rows (one per crop), each cell 128×128

const SPRITE_ROW = {
  potato:0, carrot:1, wheat:2, sunflower:3,
  pumpkin:4, chard:5, moonbloom:6, starfruit:7,
  thornvine:8, glowshroom:9, voidbloom:10, aetherfern:11, solarspike:12
};
const SPRITE_COL = { seed:0, sprout:1, grown:2 };

function getSpriteStyle(cropId, stage, size) {
  const row = SPRITE_ROW[cropId] ?? 0;
  const col = SPRITE_COL[stage]  ?? 0;
  const scale = size / 128;
  return {
    backgroundImage:    "url('sprites.png')",
    backgroundPosition: `${Math.round(col * -128 * scale)}px ${Math.round(row * -128 * scale)}px`,
    backgroundSize:     `${Math.round(384 * scale)}px ${Math.round(832 * scale)}px`,
    width:  size + 'px',
    height: size + 'px',
    imageRendering: 'pixelated',
    flexShrink: '0',
  };
}

function makeSpriteDiv(cropId, stage, size) {
  const el = document.createElement('div');
  Object.assign(el.style, getSpriteStyle(cropId, stage, size));
  el.style.pointerEvents = 'none';
  return el;
}

function spriteHTML(cropId, stage, size) {
  const row = SPRITE_ROW[cropId] ?? 0;
  const col = SPRITE_COL[stage]  ?? 0;
  const scale = size / 128;
  const bx = Math.round(col * -128 * scale);
  const by = Math.round(row * -128 * scale);
  const bw = Math.round(384 * scale);
  const bh = Math.round(832 * scale);
  return `<span style="display:inline-block;width:${size}px;height:${size}px;background:url('sprites.png') ${bx}px ${by}px/${bw}px ${bh}px;image-rendering:pixelated;vertical-align:middle;flex-shrink:0;pointer-events:none"></span>`;

const KEY     = 'blissfarm10';
const KEY_OLD = 'blissfarm9';

function save() {
  localStorage.setItem(KEY, JSON.stringify({ ...state, nextId, panelExpanded, panelWidth }));
}

function load() {
  try {
    let raw = localStorage.getItem(KEY);
    if (!raw) raw = localStorage.getItem(KEY_OLD);
    const d = JSON.parse(raw || 'null');
    if (!d) return;
    state.coins           = d.coins           ?? 10;
    state.coinsEarned     = d.coinsEarned     ?? 0;
    state.gameStartTime   = d.gameStartTime   ?? Date.now();
    state.milestones      = d.milestones      ?? {};
    state.stagesSeen      = d.stagesSeen      ?? {};
    state.mature          = d.mature          ?? false;
    state.tiles           = d.tiles           ?? Array(9).fill(null);
    state.inventory       = d.inventory       ?? {};
    state.seedInventory   = d.seedInventory   ?? {};
    state.bagInventory    = d.bagInventory    ?? {};
    state.sellQueue       = (d.sellQueue || []).map(item => {
      if (typeof item === 'string') return { seed: item, bonus: 1, drowned: false, fungal: false };
      return { seed: item.seed, bonus: item.bonus ?? 1, drowned: item.drowned ?? false, fungal: item.fungal ?? false };
    });
    state.sellNextAt      = d.sellNextAt      ?? 0;
    state.upgrades        = d.upgrades        ?? {};
    // Migrate old crankUpI → ironCrank
    if (state.upgrades.crankUpI && !state.upgrades.ironCrank) state.upgrades.ironCrank = true;
    state.loose           = (d.loose || []).map(item => ({
      seed: item.seed, id: item.id, x: item.x, y: item.y,
      bonus: item.bonus ?? 1.0, drowned: item.drowned ?? false, fungal: item.fungal ?? false
    }));
    state.expanded        = d.expanded        ?? false;
    state.expandedBottom  = d.expandedBottom  ?? false;
    state.expand2ndCol    = d.expand2ndCol    ?? false;
    state.expand2ndRow    = d.expand2ndRow    ?? false;
    state.expand3rdCol    = d.expand3rdCol    ?? false;
    state.expand3rdRow    = d.expand3rdRow    ?? false;
    state.items           = d.items           ?? {};
    state.cageCount       = d.cageCount       ?? 0;

    state.tilesWatered    = d.tilesWatered    ?? {};
    state.fertCharges            = d.fertCharges            ?? 0;
    state.uncommonFertCharges    = d.uncommonFertCharges    ?? 0;
    state.weeds                  = d.weeds                  ?? {};
    state.fertilizedTiles        = d.fertilizedTiles        ?? {};
    state.uncommonFertilizedTiles= d.uncommonFertilizedTiles?? {};
    state.firstWeedEver       = d.firstWeedEver       ?? false;
    state.firstCrowEver       = d.firstCrowEver       ?? false;
    state.firstHawkEver       = d.firstHawkEver       ?? false;
    state.firstMoleEver       = d.firstMoleEver       ?? false;

    state.mounds              = d.mounds              ?? {};

// ══════════════════════════════
// MULTIPLIERS
// ══════════════════════════════
function getGrowMult() {
  let m = 1;
  UPGRADES.forEach(u => { if (u.type === 'speed' && state.upgrades[u.id]) m *= u.mult; });
  return m;
}
function getSellMult() {
  let m = 1;
  UPGRADES.forEach(u => { if (u.type === 'value' && state.upgrades[u.id]) m *= u.mult; });
  return m;
}
function getSellSpeedMult() {
  let m = 1;
  UPGRADES.forEach(u => { if (u.type === 'sellSpeed' && state.upgrades[u.id]) m *= u.mult; });
  return m;
}
function getSellInterval() {
  return 10000 * getSellSpeedMult() / crankMult;
}
function canCapacity() { return (state.upgrades && state.upgrades.copperSpout) ? 2 : 1; }
function canFillTime()  { return (state.upgrades && state.upgrades.copperSpout) ? 8000 : 20000; }
function getCrankClickMult() {
  if (state.upgrades.diamondCrank)  return 1.085;
  if (state.upgrades.titaniumCrank) return 1.060;
  if (state.upgrades.steelCrank)    return 1.040;
  if (state.upgrades.ironCrank)     return 1.025;
  return 1.015;
}
function getSellAtOnce() {
  if (state.upgrades.diamondSellBox)  return 8;
  if (state.upgrades.titaniumSellBox) return 5;
  if (state.upgrades.steelSellBox)    return 3;
  if (state.upgrades.ironSellBox)     return 2;
  return 1;
}

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function waterFactor(idx) {
  return (idx !== undefined && state.tilesWatered && state.tilesWatered[idx]) ? 0.75 : 1.0;
}
function fertFactor(idx) {
  let f = 1.0;
  if (idx !== undefined && state.fertilizedTiles && state.fertilizedTiles[idx])         f *= 0.75;
  if (idx !== undefined && state.uncommonFertilizedTiles && state.uncommonFertilizedTiles[idx]) f *= 0.60;
  return f;
}
function rotFactor(idx) {
  const rot = state.rotTiles && state.rotTiles[idx];
  if (rot && rot.infectedAt !== undefined && rot.deadAt === undefined) return 1 / 0.30;
  return 1.0;
}
function remSec(td, idx) {
  const gt = SEEDS[td.seed].grow * getGrowMult() * waterFactor(idx) * fertFactor(idx) * rotFactor(idx);
  return Math.max(0, gt - (Date.now() - td.plantedAt) / 1000);
}
function isReady(td, idx) { return remSec(td, idx) <= 0; }
function fmt(s) {
  if (s <= 0) return '0s';
  if (s < 1)  return s.toFixed(1) + 's';
  if (s < 60) return Math.ceil(s) + 's';
  if (s < 3600) { const m = Math.floor(s/60), sec = Math.ceil(s%60); return `${m}m${sec>0?' '+sec+'s':''}`; }
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60); return `${h}h${m>0?' '+m+'m':''}`;
}
function fmtElapsed(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h > 0) return `${h}h ${m}m ${sec}s`;
  if (m > 0) return `${m}m ${sec}s`;
  return `${sec}s`;
}

const MILESTONE_VALS = [100, 1000, 10000, 100000, 1000000];

const STAGES = [
  { stage:0, name:'Birth',         threshold:0,          log:null },
  { stage:1, name:'Awakening',     threshold:50000,       log:'🌱 The farm stirs with new life.' },
  { stage:2, name:'Flourishing',   threshold:500000,      log:'🌿 The land is truly alive.' },
  { stage:3, name:'Abundance',     threshold:5000000,     log:'🌾 Harvests overflow the barn.' },
  { stage:4, name:'Legacy',        threshold:50000000,    log:'🏡 This farm will be remembered.' },
  { stage:5, name:'Transcendence', threshold:500000000,   log:'✨ The farm has become something beyond nature.' },
];

function getCurrentStage() {
  let current = STAGES[0];
  for (const s of STAGES) {
    if ((state.coinsEarned || 0) >= s.threshold) current = s;
  }
  return current;
}

function updateStageDisplay() {
  const s = getCurrentStage();
  document.getElementById('stage-display').textContent = `Stage ${s.stage}: ${s.name}`;
}

function addCoins(amount) {
  state.coins += amount;
  state.coinsEarned = (state.coinsEarned || 0) + amount;
  checkMilestones();
  checkMaturity();
  checkStages();
  updateStageDisplay();
  updateCoins();
}

function checkMilestones() {
  MILESTONE_VALS.forEach(m => {
    if (state.coinsEarned >= m && !state.milestones[m]) {
      state.milestones[m] = true;
      const elapsed = Date.now() - state.gameStartTime;
      log(`⏱️ Reached 🪙${m.toLocaleString()} — ${fmtElapsed(elapsed)}`);
    }
  });
}

function checkStages() {
  for (const s of STAGES) {
    if (s.stage === 0) continue;
    if ((state.coinsEarned || 0) >= s.threshold && !state.stagesSeen[s.stage]) {
      state.stagesSeen[s.stage] = true;
      showBanner(`Stage ${s.stage}: ${s.name}`);
      if (s.log) log(s.log);
      updateStageDisplay();
      save();
    }
  }
}

function checkMaturity() {
  if (!state.mature && state.coinsEarned >= 1000) {
    state.mature = true;
    log('🌿 The farm has matured. Nature has taken notice...');
    showBanner('🌿 The farm has matured. Nature is watching.');
    lastCrowCheck = Date.now();
    lastWeedCheck = Date.now();
  }
}

function updateCoins() {
  document.getElementById('coin-count').textContent = state.coins;
  renderUpgrades();
  renderItems();
  renderSeeds();
  renderSeedBags();
}

// ══════════════════════════════
// PROPORTIONAL GROW ADJUST
// ══════════════════════════════
function adjustGrowTimes(oldMult, newMult) {
  const now = Date.now();
  for (let i = 0; i < tileCount(); i++) {
    const td = state.tiles[i];
    if (!td) continue;
    const wf = waterFactor(i);
    const ff = fertFactor(i);
    const rf = rotFactor(i);
    const base = SEEDS[td.seed].grow;
    const oldGT = base * oldMult * wf * ff * rf;
    const newGT = base * newMult * wf * ff * rf;
    if (oldGT <= 0) continue;
    const elapsed = (now - td.plantedAt) / 1000;
    const oldRem  = Math.max(0, oldGT - elapsed);
    const newRem  = oldRem * (newGT / oldGT);
    td.plantedAt  = now - (newGT - newRem) * 1000;
  }
}

// ══════════════════════════════
// GRID
// ══════════════════════════════
function getGridDims() {
  let cols = 3, rows = 3;
  if (state.expanded)       cols = 4;
  if (state.expandedBottom) rows = 4;
  if (state.expand2ndCol)   cols = 5;
  if (state.expand2ndRow)   rows = 5;
  if (state.expand3rdCol)   cols = 6;
  if (state.expand3rdRow)   rows = 6;
  return { cols, rows };
}

function tileCount() {
  const { cols, rows } = getGridDims();
  return cols * rows;
}

function buildGrid() {
  const grid = document.getElementById('farm-grid');
  const { cols, rows } = getGridDims();
  grid.style.gridTemplateColumns = `repeat(${cols}, 100px)`;
  grid.style.gridTemplateRows    = `repeat(${rows}, 100px)`;
  while (state.tiles.length < tileCount()) state.tiles.push(null);
  grid.innerHTML = '';
  for (let i = 0; i < tileCount(); i++) {
    const el = document.createElement('div');
    el.className = 'tile'; el.dataset.idx = i;
    el.addEventListener('mousedown', onTileDown);
    grid.appendChild(el);
  }
}

// ══════════════════════════════
// TILE RENDER
// ══════════════════════════════
function renderTile(idx) {
  const el = [...tileEls()][idx];
  if (!el) return;
  el.innerHTML = '';
  el.className = 'tile';

  if (state.rotTiles && state.rotTiles[idx] && state.rotTiles[idx].deadAt !== undefined) {
    el.classList.add('tile-rotdead');
    const rdIcon = mk('div','t-rotdead-icon'); rdIcon.textContent = '💀'; el.appendChild(rdIcon);
    const rem = Math.max(0, (state.rotTiles[idx].deadAt - Date.now()) / 1000);
    const rdTimer = mk('div','t-rotdead-timer'); rdTimer.dataset.rotDeadIdx = idx; rdTimer.textContent = fmt(rem); el.appendChild(rdTimer);
    return;
  }

  if (state.mounds && state.mounds[idx] !== undefined) {
    el.classList.add('tile-mound');
    const mIcon = mk('div','t-mound-icon'); mIcon.textContent = '🐭'; el.appendChild(mIcon);
    const rem = Math.max(0, (state.mounds[idx] - Date.now()) / 1000);
    const mTimer = mk('div','t-mound-timer'); mTimer.dataset.moundIdx = idx; mTimer.textContent = fmt(rem); el.appendChild(mTimer);
    return;
  }

  if (state.thornedWeeds && state.thornedWeeds[idx] !== undefined) {
    el.classList.add('tile-thorned');
    const twIcon = mk('div','t-thorned-icon'); twIcon.textContent = '🌵'; el.appendChild(twIcon);
    const twCount = mk('div','t-thorned-count'); twCount.textContent = `${state.thornedWeeds[idx].clicks}/${THORNED_WEED_CLICKS}`; el.appendChild(twCount);
    return;
  }

  if (state.weeds && state.weeds[idx] !== undefined) {
    el.classList.add('tile-weed');
    const wIcon = mk('div','t-weed-icon'); wIcon.textContent = '🌿'; el.appendChild(wIcon);
    const wCount = mk('div','t-weed-count'); wCount.textContent = `${state.weeds[idx].clicks}/${WEED_CLICKS}`; el.appendChild(wCount);
    return;
  }

  const td             = state.tiles[idx];
  const isCaged        = state.cages && state.cages.includes(idx);
  const isWatered      = !!(state.tilesWatered && state.tilesWatered[idx]);
  const isFertilized   = !!(state.fertilizedTiles && state.fertilizedTiles[idx]);
  const isUFertilized  = !!(state.uncommonFertilizedTiles && state.uncommonFertilizedTiles[idx]);
  const isRotInfected  = !!(state.rotTiles && state.rotTiles[idx] && state.rotTiles[idx].infectedAt !== undefined && state.rotTiles[idx].deadAt === undefined);
  const isFungal       = !!(state.fungalTiles && state.fungalTiles[idx] !== undefined);

  if (isRotInfected) el.classList.add('tile-rot');
  if (isCaged)       el.classList.add('tile-caged');
  if (isUFertilized) el.classList.add('tile-ufertilized');
  else if (isFertilized) el.classList.add('tile-fertilized');
  if (isFungal)      el.classList.add('tile-fungal');

  if (!td) {
    if (isCaged)       { const c = mk('div','t-cage-icon');  c.textContent='🔒'; el.appendChild(c); }
    if (isUFertilized) { const f = mk('div','t-ufert-icon'); f.textContent='⚗️'; el.appendChild(f); }
    else if (isFertilized) { const f = mk('div','t-fert-icon'); f.textContent='🌿'; el.appendChild(f); }
    if (isFungal) { const fi = mk('div','t-fungal-icon'); fi.textContent='🍄'; el.appendChild(fi); }
    return;
  }

  const rdy = isReady(td, idx);
  if (rdy) {
    el.classList.add('ready');
  } else {
    if (isWatered) el.classList.add('tile-watered');
    if (td.drowned) el.classList.add('tile-drowned');
  }

  const icon = mk('div','t-icon');
  icon.appendChild(makeSpriteDiv(td.seed, rdy ? 'grown' : 'sprout', 56));
  el.appendChild(icon);

  if (!rdy) {
    const timer = mk('div','t-timer'); timer.textContent = fmt(remSec(td, idx)); el.appendChild(timer);
    if (isWatered && !td.drowned) { const w = mk('div','t-water-icon'); w.textContent='💧'; el.appendChild(w); }
    if (td.drowned) { const d = mk('div','t-drown-icon'); d.textContent='💀'; el.appendChild(d); }

    if (selectedTile === idx) {
      const xb = mk('div','t-xbtn'); xb.textContent = '✕';
      xb.addEventListener('mousedown', e => {
        e.stopPropagation();
        state.tiles[idx] = null;
        if (state.tilesWatered) delete state.tilesWatered[idx];
        if (state.rotTiles) delete state.rotTiles[idx];
        deselect(); renderTile(idx); save();
      });
      el.appendChild(xb);

      if (isCaged) {
        const cb = mk('div','t-cage-rm'); cb.textContent = '🔒'; cb.title = 'Remove cage';
        cb.addEventListener('mousedown', e => {
          e.stopPropagation();
          const ci = state.cages.indexOf(idx);
          if (ci !== -1) { state.cages.splice(ci, 1); state.cageCount = (state.cageCount||0) + 1; }
          renderTile(idx); renderItems(); log('🔒 Cage removed, returned to inventory'); save();
        });
        el.appendChild(cb);
      }
    }
  }

  if (isUFertilized)   { const f = mk('div','t-ufert-icon'); f.textContent='⚗️'; el.appendChild(f); }
  else if (isFertilized) { const f = mk('div','t-fert-icon'); f.textContent='🌿'; el.appendChild(f); }
  if (isCaged)         { const c = mk('div','t-cage-icon'); c.textContent='🔒'; el.appendChild(c); }
  if (isRotInfected) {
    const ri = mk('div','t-rot-icon'); ri.textContent = '🍂'; el.appendChild(ri);
    if (!rdy) {
      const rem = Math.max(0, 90 - (Date.now() - state.rotTiles[idx].infectedAt) / 1000);
      const rt = mk('div','t-rot-timer'); rt.dataset.rotTimerIdx = idx; rt.textContent = fmt(rem); el.appendChild(rt);
    }
  }
  if (isFungal) { const fi = mk('div','t-fungal-icon'); fi.textContent='🍄'; el.appendChild(fi); }
}

function mk(tag, cls) { const el = document.createElement(tag); if (cls) el.className = cls; return el; }
function renderAllTiles() { for (let i = 0; i < tileCount(); i++) renderTile(i); }

function renderSeeds() {
  const container = document.getElementById('seeds-list');
  container.innerHTML = '';
  BASIC_SEEDS.forEach(key => {
    const seed = SEEDS[key];

    row.innerHTML = `<span class="sr-icon">${spriteHTML(key, 'seed', 48)}</span><div class="sr-info"><span class="sr-name">${seed.name}</span><span class="sr-meta">🪙${seed.cost} - ${fmt(gt)}`;
    const btn = mk('button','seed-buy-btn');
    btn.textContent = 'Buy';
    btn.disabled = !canAfford;
    btn.addEventListener('click', e => {

      if (state.coins < seed.cost) return;
      state.coins -= seed.cost;

      state.seedInventory[key] = (state.seedInventory[key] || 0) + 1;

      log(`🌱 Bought ${seed.name} seed`);
    });
    row.appendChild(btn);
    container.appendChild(row);
  });
}

// ══════════════════════════════
// OPEN BAG
// ══════════════════════════════
function openBag(bag) {
  if (!state.bagInventory) state.bagInventory = {};
  if ((state.bagInventory[bag.id] || 0) < 1) return;
  state.bagInventory[bag.id]--;
  if (!state.seedInventory) state.seedInventory = {};
  const received = [];
  for (let i = 0; i < 3; i++) {
    const roll = Math.random();
    let cum = 0, chosen = bag.seeds[bag.seeds.length - 1];
    for (let j = 0; j < bag.seeds.length; j++) {
      cum += bag.odds[j];
      if (roll < cum) { chosen = bag.seeds[j]; break; }
    }
    state.seedInventory[chosen] = (state.seedInventory[chosen] || 0) + 1;
    received.push(SEEDS[chosen].seedIcon + ' ' + SEEDS[chosen].name);
  }
  log(`🎒 ${bag.name} opened: ${received.join(', ')}`);
  renderInventory(); save();
}

// ══════════════════════════════
// INVENTORY
// ══════════════════════════════
function renderInventory() {
  const grid = document.getElementById('inv-grid');
  grid.innerHTML = '';
  let count = 0;

  // ── Usable Items ──
  function makeItemSlot(icon, tooltip, itemType, onDown) {
    const el = mk('div','inv-icon');
    el.dataset.name = tooltip;
    el.style.cursor = 'grab';
    el.innerHTML = `<span style="pointer-events:none;font-size:22px;line-height:1">${icon}</span>`;
    el.addEventListener('mousedown', e => { e.stopPropagation(); onDown(e); });
    return el;
  }

  // Watering Can (persistent slot — empty or charged)
  if (state.items && state.items.wateringCan) {
    count++;
    const charges  = state.canCharges  || 0;
    const capacity = canCapacity();
    const filling  = !!(state.canRefillAt);
    const canFill  = charges < capacity && !filling;

    const slot = mk('div','inv-seed-slot');
    const icon = mk('div','inv-seed-icon');
    icon.style.cursor = charges > 0 ? 'grab' : 'default';
    icon.dataset.name = charges > 0
      ? `Watering Can (${charges}/${capacity}) — drag onto a growing crop`
      : filling ? 'Watering Can — filling…' : 'Watering Can — empty, click Fill';

    const iconSpan = document.createElement('span');
    iconSpan.style.cssText = `font-size:22px;line-height:1;pointer-events:none;opacity:${charges > 0 ? '1' : '0.3'}`;
    iconSpan.textContent = '💧';
    icon.appendChild(iconSpan);

    if (charges > 0) {
      const badge = mk('span','inv-badge');
      badge.textContent = charges;
      icon.appendChild(badge);
    }

    if (charges > 0) {
      icon.addEventListener('mousedown', e => {
        e.stopPropagation();
        if ((state.canCharges || 0) < 1) return;
        state.canCharges--;
        renderInventory();
        startItemDrag('water');
        moveGhost(e.clientX, e.clientY);
      });
    }

    slot.appendChild(icon);

    // Fill button or countdown timer
    if (filling) {
      const timer = mk('div','inv-seed-sell');
      timer.id = 'can-fill-timer';
      timer.style.cssText = 'background:rgba(0,0,0,.18);cursor:default;color:rgba(255,255,255,.6)';
      timer.textContent = fmt(Math.max(0, (state.canRefillAt - Date.now()) / 1000));
      slot.appendChild(timer);
    } else if (canFill) {
      const fillBtn = mk('button','inv-seed-sell');
      fillBtn.textContent = 'Fill';
      fillBtn.style.background = '#3a6aac';
      fillBtn.addEventListener('click', e => {
        e.stopPropagation();
        if ((state.canCharges || 0) >= canCapacity() || state.canRefillAt) return;
        state.canRefillAt = Date.now() + canFillTime();
        renderInventory(); renderItems(); save();
        log('💧 Watering can filling…');
      });
      slot.appendChild(fillBtn);
    }

    grid.appendChild(slot);
  }

  // Cages
  const cageHeld = state.cageCount || 0;
  if (cageHeld > 0) {
    count++;
    const el = makeItemSlot('🔒', 'Cage — drag onto a tile to place', 'cage', e => {
      state.cageCount--; renderInventory(); renderItems();
      startItemDrag('cage'); moveGhost(e.clientX, e.clientY);
    });
    el.innerHTML = `<span style="pointer-events:none;font-size:22px;line-height:1">🔒</span><span class="inv-badge">${cageHeld}</span>`;
    grid.appendChild(el);
  }

  // Common Fertilizer
  const fertHeld = state.fertCharges || 0;
  if (fertHeld > 0) {
    count++;
    const el = makeItemSlot('🌿', 'Common Fertilizer — drag onto a tile', 'fertilizer', e => {
      state.fertCharges--; renderInventory(); renderItems();
      startItemDrag('fertilizer'); moveGhost(e.clientX, e.clientY);
    });
    el.innerHTML = `<span style="pointer-events:none;font-size:22px;line-height:1">🌿</span><span class="inv-badge">${fertHeld}</span>`;
    grid.appendChild(el);
  }

  // Uncommon Fertilizer
  const ufertHeld = state.uncommonFertCharges || 0;
  if (ufertHeld > 0) {
    count++;
    const el = makeItemSlot('⚗️', 'Uncommon Fertilizer — drag onto a tile', 'uncommonFert', e => {
      state.uncommonFertCharges--; renderInventory(); renderItems();
      startItemDrag('uncommonFert'); moveGhost(e.clientX, e.clientY);
    });
    el.innerHTML = `<span style="pointer-events:none;font-size:22px;line-height:1">⚗️</span><span class="inv-badge">${ufertHeld}</span>`;
    grid.appendChild(el);
  }

  // Bags
  SEED_BAGS.forEach(bag => {
    const qty = (state.bagInventory || {})[bag.id] || 0;
    if (qty <= 0) return;
    count++;
    const slot = mk('div','inv-bag-slot');
    const icon = mk('div','inv-bag-icon');
    icon.dataset.name = `${bag.name} — click to open`;
    icon.innerHTML = `<span style="pointer-events:none">${bag.icon}</span><span class="inv-badge">${qty}</span>`;
    const openBtn = mk('button','inv-bag-open');
    openBtn.textContent = 'Open';
    openBtn.addEventListener('click', e => { e.stopPropagation(); openBag(bag); });
    slot.appendChild(icon);
    slot.appendChild(openBtn);
    grid.appendChild(slot);
  });

  // Seeds
  const seedInv = state.seedInventory || {};
  Object.entries(seedInv).forEach(([key, qty]) => {
    if (qty <= 0 || !SEEDS[key]) return;
    count++;
    const seed = SEEDS[key];
    const slot = mk('div','inv-seed-slot');
    const icon = mk('div','inv-seed-icon');
    icon.dataset.name = `${seed.name} seed — drag to plant`;
    icon.innerHTML = `${spriteHTML(key, 'seed', 40)}<span class="inv-badge">${qty}</span>`;
    icon.addEventListener('mousedown', e => {
      e.stopPropagation();
      if ((state.seedInventory[key] || 0) < 1) return;
      state.seedInventory[key]--;
      if (state.seedInventory[key] <= 0) delete state.seedInventory[key];
      renderInventory(); save();
      startDrag(key, 'seedInventory'); moveGhost(e.clientX, e.clientY);
    });
    const sellBtn = mk('button','inv-seed-sell');
    const price = SEED_SELL_PRICES[key] || 0;
    sellBtn.textContent = `Sell 🪙${price}`;
    sellBtn.title = `Sell ${seed.name} seed for 🪙${price}`;
    sellBtn.addEventListener('click', e => {
      e.stopPropagation();
      if ((state.seedInventory[key] || 0) < 1) return;
      state.seedInventory[key]--;
      if (state.seedInventory[key] <= 0) delete state.seedInventory[key];
      addCoins(price);
      log(`🌱 Sold ${seed.name} seed for 🪙${price}`);
      renderInventory(); save();
    });
    slot.appendChild(icon);
    slot.appendChild(sellBtn);
    grid.appendChild(slot);
  });

  // Harvested crops
  Object.entries(state.inventory).forEach(([key, qty]) => {
    if (qty <= 0 || !SEEDS[key]) return;
    count++;
    const el = mk('div','inv-icon');
    el.dataset.name = SEEDS[key].name;
    el.innerHTML = `${spriteHTML(key, 'grown', 40)}<span class="inv-badge">${qty}</span>`;
    el.addEventListener('mousedown', e => {
      e.stopPropagation();
      if ((state.inventory[key] || 0) < 1) return;
      state.inventory[key]--;
      if (state.inventory[key] <= 0) delete state.inventory[key];
      renderInventory(); save();
      startDrag(key, 'inventory'); moveGhost(e.clientX, e.clientY);
    });
    grid.appendChild(el);
  });

  if (count === 0) {
    const e = mk('div'); e.id = 'inv-empty'; e.textContent = 'Empty'; grid.appendChild(e);
  }
}

function addInventory(seed) { state.inventory[seed] = (state.inventory[seed] || 0) + 1; }

// ══════════════════════════════
// UPGRADES
// ══════════════════════════════
function renderUpgrades() {
  const container = document.getElementById('upgrades-list');
  container.innerHTML = '';
  const sorted = [...UPGRADES].sort((a,b) => a.cost - b.cost);
  const currentStage = getCurrentStage().stage;
  sorted.forEach(u => {
    if (u.stage2 && currentStage < 2) return;
    if (u.stage3 && currentStage < 3) return;
    if (u.chain !== null && u.chain !== undefined && !state.upgrades[u.chain]) return;
    const bought    = !!state.upgrades[u.id];
    if (bought && state.hideBoughtUpgrades) return;
    const canAfford = state.coins >= u.cost && !bought;
    const card = mk('div','upgrade-card' + (bought ? ' bought' : ''));
    card.innerHTML = `<div class="ug-name">${u.name}</div><div class="ug-desc">${u.desc}</div><div class="ug-bottom"><span class="ug-cost">🪙${u.cost.toLocaleString()}</span><button class="ug-btn"${bought||!canAfford?' disabled':''}>${bought?'Owned':'Buy'}</button></div>`;
    if (!bought) {
      card.querySelector('.ug-btn').addEventListener('click', e => {
        e.stopPropagation();
        if (state.upgrades[u.id] || state.coins < u.cost) return;
        if (u.type === 'speed') {
          const oldMult = getGrowMult();
          state.coins -= u.cost;
          state.upgrades[u.id] = true;
          adjustGrowTimes(oldMult, getGrowMult());
        } else {
          state.coins -= u.cost;
          state.upgrades[u.id] = true;
        }
        // Post-purchase effects
        if (u.type === 'expand')       { state.expanded = true;       buildGrid(); renderAllTiles(); showBanner('🌱 The farm has expanded.'); }
        if (u.type === 'expandBottom') { state.expandedBottom = true;  buildGrid(); renderAllTiles(); showBanner('🌱 The farm has expanded.'); }
        if (u.type === 'expand2ndCol') { state.expand2ndCol = true;    buildGrid(); renderAllTiles(); showBanner('🌱 The farm has expanded.'); }
        if (u.type === 'expand2ndRow') { state.expand2ndRow = true;    buildGrid(); renderAllTiles(); showBanner('🌱 The farm has expanded.'); }
        if (u.type === 'expand3rdCol') { state.expand3rdCol = true;    buildGrid(); renderAllTiles(); showBanner('🌱 The farm has expanded.'); }
        if (u.type === 'expand3rdRow') { state.expand3rdRow = true;    buildGrid(); renderAllTiles(); showBanner('🌱 The farm has expanded.'); }
        if (u.type === 'ironSellBox' || u.type === 'steelSellBox' || u.type === 'titaniumSellBox' || u.type === 'diamondSellBox') {
          updateSellBoxStyle();
          showBanner(`⚙️ ${u.name} activated.`);
        }
        if (u.type === 'crank' || u.type === 'crankUp') updateCrankDisplay();
        log(`⬆️ ${u.name} purchased`);
        updateCoins();
        renderAllTiles();
        save();
      });
    }
    container.appendChild(card);
  });
}

// ══════════════════════════════
// SELL BOX
// ══════════════════════════════
function addToSellQueue(seed, bonus = 1.0, drowned = false, fungal = false) {
  state.sellQueue.push({ seed, bonus, drowned, fungal });
  if (state.sellQueue.length === 1) state.sellNextAt = Date.now() + getSellInterval();
  renderSellBox(); save();
}

function renderSellBox() {
  const qRow = document.getElementById('sell-queue-row');
  qRow.innerHTML = '';
  state.sellQueue.forEach((item, idx) => {
    const s = mk('span','sq-icon');
    s.appendChild(makeSpriteDiv(item.seed, 'grown', 24));
    s.addEventListener('mousedown', e => {
      if (drag) return;
      e.stopPropagation();
      state.sellQueue.splice(idx, 1);
      if (idx === 0 && state.sellQueue.length > 0) state.sellNextAt = Date.now() + getSellInterval();
      else if (state.sellQueue.length === 0)        state.sellNextAt = 0;
      renderSellBox(); save();
      startDrag(item.seed, 'sell-queue', item.bonus || 1.0, item.drowned || false);
      moveGhost(e.clientX, e.clientY);
    });
    qRow.appendChild(s);
  });
  updateSellTimer();
}

function updateSellTimer() {
  const cd = document.getElementById('sell-cd');
  if (!state.sellQueue.length || !state.sellNextAt) { cd.textContent = ''; return; }
  cd.textContent = fmt(Math.max(0, (state.sellNextAt - Date.now()) / 1000));
}

function tickSellBox() {
  if (!state.sellQueue.length) return;
  if (Date.now() >= state.sellNextAt) {
    const maxSell = getSellAtOnce();
    let totalCoins = 0, sold = 0;
    for (let s = 0; s < maxSell && state.sellQueue.length > 0; s++) {
      const item = state.sellQueue.shift();
      let coins;
      if (item.fungal) {
        coins = 0;
      } else if (item.drowned) {
        coins = Math.round(SEEDS[item.seed].sell * (item.bonus || 1));
      } else {
        coins = Math.round(SEEDS[item.seed].sell * getSellMult() * (item.bonus || 1));
      }
      log(`${SEEDS[item.seed].icon} ${SEEDS[item.seed].name} sold for 🪙${coins}${item.fungal ? ' (fungal)' : ''}`);
      totalCoins += coins;
      sold++;
    }
    if (sold > 0) {
      const sb = document.getElementById('sell-box');
      const r  = sb.getBoundingClientRect();
      showPop('+🪙' + totalCoins, r.left + r.width / 2, r.top - 6);
      addCoins(totalCoins);
    }
    state.sellNextAt = state.sellQueue.length ? Date.now() + getSellInterval() : 0;
    renderSellBox(); save();
  }
}

// ══════════════════════════════
// CRANK
// ══════════════════════════════
function positionCrank() {
  const box = document.getElementById('crank-box');
  const r   = document.getElementById('sell-box').getBoundingClientRect();
  box.style.left = (r.right + 10) + 'px';
}

function updateCrankDisplay() {
  const box = document.getElementById('crank-box');
  if (!state.upgrades.windUpCrank) { box.style.display = 'none'; return; }
  box.style.display = 'flex';
  document.getElementById('crank-label').textContent = '⚙️ ' + crankMult.toFixed(2) + 'x';
  box.classList.remove('iron','steel','titanium','diamond');
  if (state.upgrades.diamondCrank)       box.classList.add('diamond');
  else if (state.upgrades.titaniumCrank) box.classList.add('titanium');
  else if (state.upgrades.steelCrank)    box.classList.add('steel');
  else if (state.upgrades.ironCrank)     box.classList.add('iron');
  positionCrank();
}

function updateCrankLabel() {
  if (!state.upgrades.windUpCrank) return;
  document.getElementById('crank-label').textContent = '⚙️ ' + crankMult.toFixed(2) + 'x';
}

document.getElementById('crank-svg').addEventListener('click', () => {
  if (!state.upgrades.windUpCrank) return;
  crankMult  = crankMult * getCrankClickMult();
  crankAngle = (crankAngle + 30) % 3600;
  document.getElementById('crank-svg').style.transform = `rotate(${crankAngle}deg)`;
  updateCrankLabel();
});

// ══════════════════════════════
// WELL & WATERING
// ══════════════════════════════
function updateWell() {
  document.getElementById('well').style.display = 'none';
}

function canTick() {
  if (!state.items || !state.items.wateringCan) return;
  if (!state.canRefillAt) return;
  if (Date.now() >= state.canRefillAt) {
    state.canCharges  = Math.min(canCapacity(), (state.canCharges || 0) + 1);
    state.canRefillAt = 0;
    renderInventory(); renderItems(); save();
  } else {
    const el = document.getElementById('can-fill-timer');
    if (el) el.textContent = fmt(Math.max(0, (state.canRefillAt - Date.now()) / 1000));
  }
}

document.getElementById('well').addEventListener('mousedown', e => {
  e.stopPropagation(); // well is display-only; water is applied via inventory drag
});

function applyWater(idx) {
  const td = state.tiles[idx];
  if (!td || isReady(td, idx)) return;
  if (state.tilesWatered && state.tilesWatered[idx]) {
    drownTile(idx);
    return;
  }
  const baseGT  = SEEDS[td.seed].grow * getGrowMult() * fertFactor(idx);
  const newGT   = baseGT * 0.75;
  const elapsed = (Date.now() - td.plantedAt) / 1000;
  const oldRem  = Math.max(0, baseGT - elapsed);
  const newRem  = oldRem * 0.75;
  td.plantedAt  = Date.now() - (newGT - newRem) * 1000;
  td.sellBonus  = 1.25;
  if (!state.tilesWatered) state.tilesWatered = {};
  state.tilesWatered[idx] = true;
  renderTile(idx); renderInventory(); renderItems();
  log(`💧 ${SEEDS[td.seed].name} watered (+25% value, +25% speed)`);
  save();
}

function drownTile(idx) {
  const td = state.tiles[idx];
  if (!td) return;
  const growMult = getGrowMult();
  const base = SEEDS[td.seed].grow;
  const ff = fertFactor(idx);
  const currentGT = base * growMult * ff * 0.75;
  const drownedGT = base * growMult * ff;
  const elapsed = (Date.now() - td.plantedAt) / 1000;
  const currentRem = Math.max(0, currentGT - elapsed);
  const newRem = currentRem * (drownedGT / currentGT);
  td.plantedAt = Date.now() - (drownedGT - newRem) * 1000;
  td.drowned = true;
  td.sellBonus = 0.25;
  delete state.tilesWatered[idx];
  renderTile(idx); renderInventory(); renderItems();
  log(`💀 ${SEEDS[td.seed].name} was drowned! Value severely reduced.`);
  save();
}

// ══════════════════════════════
// MODE INDICATOR (unused — items now use drag)

function updateModeIndicator() {
  document.getElementById('mode-ind').style.display = 'none';
  document.body.style.cursor = '';
}

// ══════════════════════════════
// LOOSE CROPS
// ══════════════════════════════
function dropLoose(seed, x, y, bonus = 1.0, drowned = false, fungal = false) {
  state.loose.push({ seed, id: nextId++, x, y, bonus, drowned, fungal });
  renderLoose(); save();
}

function renderLoose() {
  document.querySelectorAll('.loose-crop').forEach(el => el.remove());
  state.loose.forEach(item => {
    const el = mk('div','loose-crop');
    el.appendChild(makeSpriteDiv(item.seed, 'grown', 48));
    el.style.left = item.x + 'px'; el.style.top = item.y + 'px';
    el.dataset.id = item.id;
    el.addEventListener('mousedown', e => {
      e.stopPropagation();
      const i = state.loose.findIndex(g => g.id === item.id);
      if (i === -1) return;
      const s = state.loose[i].seed, b = state.loose[i].bonus || 1.0, dr = state.loose[i].drowned || false, fg = state.loose[i].fungal || false;
      state.loose.splice(i, 1); renderLoose(); save();
      startDrag(s, 'loose', b, dr, fg); moveGhost(e.clientX, e.clientY);
    });
    document.body.appendChild(el);
  });
}

// ══════════════════════════════
// CROW
// ══════════════════════════════
function crowTick() {
  if (!state.mature) return;
  const stage = getCurrentStage().stage;
  if (stage >= 3) return;
  const now = Date.now();
  if (now - lastCrowCheck < 10000) return;
  lastCrowCheck = now;
  let chance = stage >= 2 ? 0.08 : 0.05;
  if (state.upgrades.scarecrowCoat)  chance *= 0.70;
  if (state.upgrades.ironGreenhouse) chance *= 0.80;
  if (Math.random() < chance) crowAttack();
}

function crowAttack() {
  const cageBlock = state.upgrades.scarecrowCoat ? Math.min(1, 0.75 + 0.30) : 0.75;
  let target = null;
  if (state.loose.length > 0) {
    const sorted = [...state.loose].sort((a,b) => SEEDS[b.seed].sell - SEEDS[a.seed].sell);
    target = { type:'loose', item: sorted[0] };
  }
  if (!target) {
    const cands = [];
    for (let i = 0; i < tileCount(); i++) {
      if (!state.tiles[i] || !isReady(state.tiles[i], i)) continue;
      if (state.cages.includes(i) && Math.random() < cageBlock) continue;
      cands.push(i);
    }
    if (cands.length) target = { type:'tile', idx: cands[Math.floor(Math.random()*cands.length)] };
  }
  if (!target) {
    const cands = [];
    for (let i = 0; i < tileCount(); i++) {
      if (!state.tiles[i] || isReady(state.tiles[i], i)) continue;
      if (state.cages.includes(i) && Math.random() < cageBlock) continue;
      cands.push(i);
    }
    if (cands.length) target = { type:'tile', idx: cands[Math.floor(Math.random()*cands.length)] };
  }
  if (!target) return;

  if (!state.firstCrowEver) {
    state.firstCrowEver = true;
    showBanner('🐦‍⬛ A crow has found your farm.');
  }

  let cropName;
  if (target.type === 'loose') {
    cropName = SEEDS[target.item.seed].name;
    const i = state.loose.findIndex(l => l.id === target.item.id);
    if (i !== -1) state.loose.splice(i, 1);
    renderLoose();
  } else {
    cropName = SEEDS[state.tiles[target.idx].seed].name;
    state.tiles[target.idx] = null;
    if (state.tilesWatered) delete state.tilesWatered[target.idx];
    if (state.rotTiles) delete state.rotTiles[target.idx];
    renderTile(target.idx);
  }
  log(`🐦 A crow snatched a ${cropName}!`);
  animateCrow(); save();
}

function animateCrow() {
  const el = mk('div','crow-anim');
  el.textContent = '🐦‍⬛';
  el.style.top = (15 + Math.random() * 55) + 'vh';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ══════════════════════════════
// HAWK (Stage 2+)
// ══════════════════════════════
function hawkTick() {
  if (!state.mature) return;
  const stage = getCurrentStage().stage;
  if (stage < 2) return;
  const now = Date.now();
  const interval = stage >= 3 ? 10000 : 15000;
  if (now - lastHawkCheck < interval) return;
  lastHawkCheck = now;
  let chance = stage >= 3 ? 0.06 : 0.05;
  if (state.upgrades.ironGreenhouse) chance *= 0.80;
  if (Math.random() < chance) hawkAttack();
}

function hawkAttack() {
  const targets = [];
  // Loose crops
  state.loose.forEach(item => targets.push({ type:'loose', item, val: SEEDS[item.seed].sell }));
  // Ready tiles
  for (let i = 0; i < tileCount(); i++) {
    if (!state.tiles[i] || !isReady(state.tiles[i], i)) continue;
    if (state.cages.includes(i) && Math.random() < 0.40) continue;
    targets.push({ type:'tile', idx:i, val: SEEDS[state.tiles[i].seed].sell });
  }
  // Growing tiles
  for (let i = 0; i < tileCount(); i++) {
    if (!state.tiles[i] || isReady(state.tiles[i], i)) continue;
    if (state.cages.includes(i) && Math.random() < 0.40) continue;
    targets.push({ type:'tile', idx:i, val: SEEDS[state.tiles[i].seed].sell });
  }
  targets.sort((a, b) => b.val - a.val);
  const toSteal = targets.slice(0, state.upgrades.hawkNet ? 1 : 2);
  if (!toSteal.length) return;

  if (!state.firstHawkEver) {
    state.firstHawkEver = true;
    showBanner('🦅 A hawk circles your farm!');
  }

  let stolen = 0;
  toSteal.forEach(t => {
    if (t.type === 'loose') {
      const i = state.loose.findIndex(l => l.id === t.item.id);
      if (i !== -1) { log(`🦅 A hawk snatched a ${SEEDS[t.item.seed].name}!`); state.loose.splice(i, 1); stolen++; }
    } else {
      if (state.tiles[t.idx]) {
        log(`🦅 A hawk snatched a ${SEEDS[state.tiles[t.idx].seed].name}!`);
        state.tiles[t.idx] = null;
        if (state.tilesWatered) delete state.tilesWatered[t.idx];
        if (state.rotTiles) delete state.rotTiles[t.idx];
        renderTile(t.idx); stolen++;
      }
    }
  });
  if (stolen > 0) { renderLoose(); animateHawk(); save(); }
}

function animateHawk() {
  const el = mk('div','hawk-anim');
  el.textContent = '🦅';
  el.style.top = (10 + Math.random() * 50) + 'vh';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

// ══════════════════════════════
// MOLE (Stage 2+)
// ══════════════════════════════
function moleTick() {
  if (!state.mature || getCurrentStage().stage < 2) return;
  const now = Date.now();
  if (now - lastMoleCheck < 45000) return;
  lastMoleCheck = now;
  let moleChance = state.upgrades.groundMesh ? 0.08 * 0.60 : 0.08;
  if (state.upgrades.ironGreenhouse) moleChance *= 0.80;
  if (Math.random() < moleChance) moleAttack();
}

function moleAttack() {
  const cands = [];
  for (let i = 0; i < tileCount(); i++) {
    if (!state.tiles[i] || isReady(state.tiles[i], i)) continue;
    if (state.cages.includes(i) && Math.random() < 0.60) continue;
    cands.push(i);
  }
  if (!cands.length) return;

  if (!state.firstMoleEver) {
    state.firstMoleEver = true;
    showBanner('🐭 Moles have been spotted tunneling!');
  }

  const idx = cands[Math.floor(Math.random() * cands.length)];
  const td = state.tiles[idx];
  const cropName = SEEDS[td.seed].name;
  const cx = window.innerWidth / 2 + (Math.random() - 0.5) * 200;
  const cy = window.innerHeight / 2 + (Math.random() - 0.5) * 200;
  dropLoose(td.seed, cx, cy, td.sellBonus || 1.0, td.drowned || false);
  state.tiles[idx] = null;
  if (state.tilesWatered) delete state.tilesWatered[idx];
  if (state.rotTiles) delete state.rotTiles[idx];
  if (!state.mounds) state.mounds = {};
  state.mounds[idx] = Date.now() + (state.upgrades.quickSoil ? 5000 : 20000);
  log(`🐭 A mole uprooted a ${cropName}! It fell loose nearby.`);
  renderTile(idx); save();
}

function moundTick() {
  if (!state.mounds) return;
  let changed = false;
  const now = Date.now();
  Object.keys(state.mounds).forEach(k => {
    const idx = parseInt(k);
    if (now >= state.mounds[idx]) { delete state.mounds[idx]; renderTile(idx); changed = true; }
  });
  if (changed) save();
}

// ══════════════════════════════
// ROOT ROT (Stage 3+)
// ══════════════════════════════
function rotTick() {
  if (!state.rotTiles) return;
  const now = Date.now();
  let changed = false;
  Object.keys(state.rotTiles).forEach(k => {
    const idx = parseInt(k);
    const rot = state.rotTiles[idx];
    if (rot.deadAt !== undefined) {
      if (now >= rot.deadAt) { delete state.rotTiles[idx]; renderTile(idx); changed = true; }
    } else if (rot.infectedAt !== undefined) {
      const td = state.tiles[idx];
      if (!td) { delete state.rotTiles[idx]; changed = true; return; }
      if (isReady(td, idx)) return;
      if (now - rot.infectedAt >= 90000) {
        const cropName = SEEDS[td.seed].name;
        state.tiles[idx] = null;
        if (state.tilesWatered) delete state.tilesWatered[idx];
        state.rotTiles[idx] = { deadAt: now + 30000 };
        log(`💀 ${cropName} died from root rot.`);
        renderTile(idx); changed = true;
      }
    }
  });
  if (changed) save();
}

function rootRotSpawnTick() {
  if (!state.mature || getCurrentStage().stage < 3) return;
  const now = Date.now();
  if (now - lastRotCheck < 180000) return;
  lastRotCheck = now;
  let rotChance = 0.10;
  if (state.upgrades.soilTreatment)  rotChance *= 0.60;
  if (state.upgrades.ironGreenhouse) rotChance *= 0.80;
  if (Math.random() < rotChance) rootRotInfect();
}

function rootRotInfect() {
  const cands = [];
  for (let i = 0; i < tileCount(); i++) {
    const td = state.tiles[i];
    if (!td || isReady(td, i)) continue;
    const rot = state.rotTiles && state.rotTiles[i];
    if (rot && rot.infectedAt !== undefined) continue;
    cands.push(i);
  }
  if (!cands.length) return;

  if (!state.firstRotEver) {
    state.firstRotEver = true;
    showBanner('🍂 Root rot has reached your farm.');
  }

  const idx = cands[Math.floor(Math.random() * cands.length)];
  const td = state.tiles[idx];
  const oldGT = SEEDS[td.seed].grow * getGrowMult() * waterFactor(idx) * fertFactor(idx);
  const newGT = oldGT / 0.30;
  if (oldGT > 0) {
    const elapsed = (Date.now() - td.plantedAt) / 1000;
    const oldRem = Math.max(0, oldGT - elapsed);
    const newRem = oldRem * (newGT / oldGT);
    td.plantedAt = Date.now() - (newGT - newRem) * 1000;
  }
  if (!state.rotTiles) state.rotTiles = {};
  state.rotTiles[idx] = { infectedAt: Date.now() };
  log(`🍂 Root rot infected your ${SEEDS[td.seed].name}!`);
  renderTile(idx); save();
}

// ══════════════════════════════
// LOCUST SWARM (Stage 3+)
// ══════════════════════════════
function locustTick() {
  if (!state.mature || getCurrentStage().stage < 3) return;
  const now = Date.now();
  if (now - lastLocustCheck < 30000) return;
  lastLocustCheck = now;
  let chance = 0.03;
  if (state.items && state.items.scarecrow) chance *= 0.50;
  if (state.upgrades.locustWard)            chance *= 0.50;
  if (state.upgrades.ironGreenhouse)        chance *= 0.80;
  if (Math.random() < chance) locustAttack();
}

function locustAttack() {
  if (!state.firstLocustEver) {
    state.firstLocustEver = true;
    showBanner('🪲 Locusts have descended on your farm.');
  }

  // Destroy all loose crops
  if (state.loose.length > 0) {
    state.loose = [];
    renderLoose();
  }

  // Each growing tile loses 30% of current progress
  const now = Date.now();
  for (let i = 0; i < tileCount(); i++) {
    const td = state.tiles[i];
    if (!td || isReady(td, i)) continue;
    const wf = waterFactor(i);
    const ff = fertFactor(i);
    const rf = rotFactor(i);
    const gt = SEEDS[td.seed].grow * getGrowMult() * wf * ff * rf;
    const elapsed = (now - td.plantedAt) / 1000;
    const progress = Math.min(1, elapsed / gt);
    const setback = state.upgrades.cropShield ? 0.15 : 0.30;
    const newProgress = Math.max(0, progress - setback);
    td.plantedAt = now - newProgress * gt * 1000;
  }

  log('🪲 A locust swarm devastated the farm!');
  renderAllTiles();
  animateLocust();
}

function animateLocust() {
  const { top: farmTop, height: farmH } = document.getElementById('game-area').getBoundingClientRect();
  const rows = 8;
  for (let r = 0; r < rows; r++) {
    const el = mk('div', 'locust-anim');
    el.textContent = '🪲';
    el.style.top = (farmTop + (r / (rows - 1)) * farmH * 0.85) + 'px';
    el.style.animationDelay = (r * 0.12) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5500);
  }
}

// ══════════════════════════════
// BLIGHT STORM (Stage 3+)
// ══════════════════════════════
function blightTick() {
  if (!state.mature || getCurrentStage().stage < 3) return;
  const now = Date.now();
  if (now - lastBlightCheck < 300000) return;
  lastBlightCheck = now;
  let blightChance = 0.15;
  if (state.upgrades.weathervane)    blightChance *= 0.60;
  if (state.upgrades.ironGreenhouse) blightChance *= 0.80;
  if (Math.random() < blightChance) blightAttack();
}

function blightAttack() {
  if (!state.firstBlightEver) {
    state.firstBlightEver = true;
    showBanner('🌪️ Blight storms are rolling in.');
  }

  // Strip all watered tiles
  if (state.tilesWatered) {
    const waterKeys = Object.keys(state.tilesWatered);
    waterKeys.forEach(k => { delete state.tilesWatered[k]; });
  }

  // 25% chance each fertilized tile loses its fertilizer (immune with Soil Anchor)
  if (state.fertilizedTiles && !state.upgrades.soilAnchor) {
    Object.keys(state.fertilizedTiles).forEach(k => {
      if (Math.random() < 0.25) delete state.fertilizedTiles[k];
    });
  }

  log('🌪️ A blight storm stripped your soil!');
  renderAllTiles();
  animateBlight();
}

function animateBlight() {
  const el = mk('div', 'blight-cloud');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ══════════════════════════════
// FUNGAL BLOOM (Stage 3+)
// ══════════════════════════════
function fungalSpawnTick() {
  if (!state.mature || getCurrentStage().stage < 3) return;
  const now = Date.now();
  if (now - lastFungalCheck < 240000) return;
  lastFungalCheck = now;
  let fungalChance = 0.08;
  if (state.upgrades.antifungalSpray) fungalChance *= 0.50;
  if (state.upgrades.ironGreenhouse)  fungalChance *= 0.80;
  if (Math.random() < fungalChance) fungalBloom();
}

function fungalBloom() {
  const cands = [];
  for (let i = 0; i < tileCount(); i++) {
    if (state.fungalTiles && state.fungalTiles[i] !== undefined) continue;
    if (state.weeds && state.weeds[i] !== undefined) continue;
    if (state.thornedWeeds && state.thornedWeeds[i] !== undefined) continue;
    if (state.mounds && state.mounds[i] !== undefined) continue;
    if (state.rotTiles && state.rotTiles[i] && state.rotTiles[i].deadAt !== undefined) continue;
    cands.push(i);
  }
  if (!cands.length) return;

  if (!state.firstFungalEver) {
    state.firstFungalEver = true;
    showBanner('🍄 A fungal bloom has taken root.');
  }

  if (!state.fungalTiles) state.fungalTiles = {};
  const idx = cands[Math.floor(Math.random() * cands.length)];
  state.fungalTiles[idx] = { spawnedAt: Date.now() };
  log('🍄 Fungal bloom appeared!');
  renderTile(idx); save();
}

function fungalSpreadTick() {
  if (!state.fungalTiles) return;
  if (state.upgrades.containment) return;
  const total = Object.keys(state.fungalTiles).length;
  if (total === 0 || total >= 4) return;
  const now = Date.now();
  if (now - lastFungalSpreadCheck < 30000) return;
  lastFungalSpreadCheck = now;
  fungalSpread();
}

function fungalSpread() {
  if (!state.fungalTiles) return;
  const fungalIdxs = Object.keys(state.fungalTiles).map(Number);
  if (fungalIdxs.length >= 4) return;
  const { cols } = getGridDims();
  const tc = tileCount();
  const adjSet = new Set();
  fungalIdxs.forEach(idx => {
    const r = Math.floor(idx / cols), c = idx % cols;
    [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc]) => {
      if (nr < 0 || nc < 0 || nc >= cols) return;
      const ni = nr * cols + nc;
      if (ni >= tc) return;
      if (state.fungalTiles[ni] !== undefined) return;
      if (state.weeds && state.weeds[ni] !== undefined) return;
      if (state.thornedWeeds && state.thornedWeeds[ni] !== undefined) return;
      if (state.mounds && state.mounds[ni] !== undefined) return;
      if (state.rotTiles && state.rotTiles[ni] && state.rotTiles[ni].deadAt !== undefined) return;
      adjSet.add(ni);
    });
  });
  if (!adjSet.size) return;
  const adjArr = [...adjSet];
  const target = adjArr[Math.floor(Math.random() * adjArr.length)];
  state.fungalTiles[target] = { spawnedAt: Date.now() };
  log('🍄 Fungal bloom spread.');
  renderTile(target); save();
}

// ══════════════════════════════
// THORNED WEED TICK (Stage 2+)
// ══════════════════════════════
function thornedWeedTick() {
  if (!state.thornedWeeds) return;
  if (state.upgrades.herbicideII) return;
  const stage = getCurrentStage().stage;
  if (stage < 2) return;
  const spreadMs = stage >= 3 ? 30000 : 60000;
  const now = Date.now();
  const toSpread = [];
  Object.keys(state.thornedWeeds).forEach(k => {
    const idx = parseInt(k);
    if (now - state.thornedWeeds[idx].spawnedAt >= spreadMs) toSpread.push(idx);
  });
  if (!toSpread.length) return;
  toSpread.forEach(idx => {
    delete state.thornedWeeds[idx];
    renderTile(idx);
    const { cols } = getGridDims();
    const tc = tileCount();
    const r = Math.floor(idx / cols), c = idx % cols;
    const adj = [];
    [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc]) => {
      if (nr < 0 || nc < 0 || nc >= cols) return;
      const ni = nr * cols + nc;
      if (ni >= tc) return;
      if (!state.tiles[ni] &&
          !(state.weeds && state.weeds[ni] !== undefined) &&
          !(state.thornedWeeds && state.thornedWeeds[ni] !== undefined) &&
          !(state.mounds && state.mounds[ni] !== undefined)) adj.push(ni);
    });
    if (adj.length) {
      const target = adj[Math.floor(Math.random() * adj.length)];
      if (!state.weeds) state.weeds = {};
      state.weeds[target] = { clicks: 0 };
      log('🌿 A thorned weed spread to an adjacent tile!');
      renderTile(target);
    }
  });
  save();
}

// ══════════════════════════════
// MASTER FARMER AUTO-CLEAR
// ══════════════════════════════
function masterFarmerTick() {
  if (!state.upgrades.masterFarmer) return;
  const now = Date.now();
  const MS = 10000;
  let changed = false;
  if (state.weeds) {
    Object.keys(state.weeds).forEach(k => {
      const idx = parseInt(k);
      if (now - (state.weeds[idx].spawnedAt || now - MS) >= MS) {
        delete state.weeds[idx]; renderTile(idx); changed = true;
      }
    });
  }
  if (state.thornedWeeds) {
    Object.keys(state.thornedWeeds).forEach(k => {
      const idx = parseInt(k);
      if (now - (state.thornedWeeds[idx].spawnedAt || now - MS) >= MS) {
        delete state.thornedWeeds[idx]; renderTile(idx); changed = true;
      }
    });
  }
  if (changed) save();
}

// ══════════════════════════════
// WEEDS
// ══════════════════════════════
function weedTick() {
  if (!state.mature) return;
  const now = Date.now();
  if (now - lastWeedCheck < 8000) return;
  lastWeedCheck = now;
  let chance = getCurrentStage().stage >= 3 ? 0.18 : 0.12;
  if (state.upgrades.ironGreenhouse) chance *= 0.80;
  if (Math.random() < chance) weedSpawn();
}

function weedSpawn() {
  const tc = tileCount();
  const empty = [];
  for (let i = 0; i < tc; i++) {
    if (!state.tiles[i] &&
        !(state.weeds && state.weeds[i] !== undefined) &&
        !(state.thornedWeeds && state.thornedWeeds[i] !== undefined) &&
        !(state.mounds && state.mounds[i] !== undefined) &&
        !(state.fungalTiles && state.fungalTiles[i] !== undefined)) empty.push(i);
  }
  if (!empty.length) return;

  const stage = getCurrentStage().stage;
  let thornedChance = 0.30;
  if (state.upgrades.herbicideI) thornedChance *= 0.75;
  const spawnThorned = stage >= 3 || (stage >= 2 && Math.random() < thornedChance);
  if (spawnThorned) {
    // Thorned weed — cage 60% protection
    const cands = empty.filter(i => !state.cages.includes(i) || Math.random() > 0.60);
    if (!cands.length) return;
    const idx = cands[Math.floor(Math.random() * cands.length)];
    if (!state.thornedWeeds) state.thornedWeeds = {};
    state.thornedWeeds[idx] = { clicks: 0, spawnedAt: Date.now() };
    if (!state.firstThornedEver) {
      state.firstThornedEver = true;
      showBanner('🌵 Thorned weeds are appearing!');
    }
    log('🌵 A thorned weed sprouted! (50 clicks to clear)');
    renderTile(idx); save();
  } else {
    const idx = empty[Math.floor(Math.random() * empty.length)];
    if (!state.weeds) state.weeds = {};
    state.weeds[idx] = { clicks: 0, spawnedAt: Date.now() };
    if (!state.firstWeedEver) {
      state.firstWeedEver = true;
      showBanner('🌿 Weeds are beginning to appear.');
    }
    log('🌿 A weed sprouted!');
    renderTile(idx); save();
  }
}

// SELECTION

function deselect() {
